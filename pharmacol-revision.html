<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pharmacology Revision Bank</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}.wrap{max-width:860px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:16px}.home{text-align:center;padding:34px 16px}.home h1{margin:0 0 8px;color:#244c85;font-size:26px}.muted{color:#5f6876;font-size:14px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{font-weight:700;color:#244c85}.bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:12px 0}.fill{height:100%;background:#147a5c;transition:width .3s}.q{font-size:18px;line-height:1.5;margin:12px 0}.opts{display:grid;gap:8px}.opt{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;text-align:left;cursor:pointer;line-height:1.45;font:inherit}.opt:hover{background:#f4f7fb;border-color:#244c85}.opt.correct{background:#e9f6f1;border-color:#147a5c;color:#0b5b43}.opt.wrong{background:#fff0f0;border-color:#b32d2e;color:#8a2020}.btn{border:1px solid #cbd3df;border-radius:6px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block;margin:4px}.btn.primary{background:#244c85;border-color:#244c85;color:#fff}.btn.green{background:#147a5c;border-color:#147a5c;color:#fff}.btn.orange{background:#e67e22;border-color:#e67e22;color:#fff}.score{text-align:center;padding:34px 16px}.score-big{font-size:44px;font-weight:700;color:#147a5c;margin:8px 0}.review{display:grid;gap:10px;margin-top:16px;text-align:left}.review-item{border:1px solid #d9deea;border-radius:8px;padding:12px;line-height:1.45}.review-item.was-wrong{border-left:4px solid #b32d2e}
  </style>
</head>
<body>
<main class="wrap"><div id="app"></div></main>
<script>
const QUESTIONS=[
  {"question":"The following statements are true for drug's therapeutic index EXCEPT:","options":["It is the relation between the lethal dose in 50% of animals to the curative dose in 50% of them","The lower the TI, the safer will be the drug","It should be done to any drug before it's being approved for human use","For theoretically useful drugs, it must be greater than 1","It could be applied in animal testing"],"answer":1},
  {"question":"A drug is said to be reversible antagonist when:","options":["It blocks receptors by making covalent bonds with them","The duration of blockade is too long","Increasing the dose of the agonist will reverse the block","The response curve is not parallel to that of agonist alone","Termination of the drug effect depends on synthesis of new receptors"],"answer":2},
  {"question":"The interaction that may occur between acidic and basic drugs is called:","options":["Chemical antagonism","Physical antagonism","Physiological antagonism","Biological antagonism","Receptor antagonism"],"answer":0},
  {"question":"Hemolysis that may occur with sulfonamides therapy may be due to:","options":["Pseudocholinestrase deficiency","Methemoglobin reductase deficiency","G-6-PD deficiency","Vitamin K epoxide reductase deficiency","Monoamine oxidase deficiency"],"answer":2},
  {"question":"Failure of some children with rickets to respond to therapeutic doses of vitamin D is most likely due to:","options":["Differences in sex","Differences in body weight","Genetic variation","Tolerance","Intolerance"],"answer":2},
  {"question":"Which of the following drugs will be absorbed to the LEAST extent in the stomach:","options":["Ampicillin (pKa = 2.5)","Aspirin (pKa = 3.5)","Warfarin (pKa = 5.0)","Phenobarbital (pKa = 7.4)","Propranolol (pKa = 9.4)"],"answer":4},
  {"question":"The following statements are true for Vd of drugs EXCEPT:","options":["It can exceed the volume of water in the body","Drugs with large Vd can be removed by dialysis","Would be expected to be 5L if the drug is confined to the blood","Highly lipid-soluble drugs would be expected to have large Vd","It can help in calculation of the total amount of the drug in the body"],"answer":1},
  {"question":"The bioavailability of a drug:","options":["Is defined as the actual blood concentration required to produce a pharmacological effect","Will be unaffected by changes in formulation","May be affected by liver damage","Must be 100% for a drug given by mouth and is completely absorbed","Is a term applied only to oral administration"],"answer":2},
  {"question":"All the following are phase I biotransformation reactions EXCEPT:","options":["Sulfate conjugation","Xanthine oxidation","Nitroreduction","Ester hydrolysis","Oxidative deamination"],"answer":0},
  {"question":"Metabolism of drugs can lead to all the following results EXCEPT:","options":["Conversion of active compound into inactive metabolites","Conversion of active compound into active metabolites","Conversion of inactive compound into active metabolites","Conversion of non-toxic compound into toxic metabolites","Conversion of water-soluble compound into lipid-soluble metabolites"],"answer":4},
  {"question":"Drugs X and Y have the same mechanism of diuretic action. Drug X 5mg = Drug Y 500mg. This suggests:","options":["Drug Y is less efficacious than drug X","Drug X is about 100 times more potent than drug Y","Toxicity of drug X is less than that of drug Y","Drug X is a safer drug than drug Y","Drug X will have a shorter duration of action than drug Y"],"answer":1},
  {"question":"Which term best describes the antagonism of leukotriene's bronchoconstrictor effect by terbutaline in asthma?","options":["Pharmacologic antagonist","Partial agonist","Physiologic antagonist","Chemical antagonist","Noncompetitive antagonist"],"answer":2},
  {"question":"Which provides information about the largest response a drug can produce, regardless of dose?","options":["Drug potency","Maximal efficacy","Mechanism of receptor action","Therapeutic index","Therapeutic window"],"answer":1},
  {"question":"If two drugs with the same effect, taken together, produce an effect equal to the sum of the individual effects, it is called:","options":["Antagonism","Potentiation","Synergism","Additive effect","Supersensitivity"],"answer":3},
  {"question":"A pro-drug is:","options":["The prototype member of a class of drugs","The oldest member of a class of drugs","An inactive drug transformed in the body to an active metabolite","A drug stored in body tissues gradually released in circulation","Ionized drug trapped in breast milk"],"answer":2},
  {"question":"Half-life of a drug may be helpful to determine:","options":["Elimination of the drug","Level of absorption","Rate of absorption through the GIT","Time to reach the steady state","Distribution into body systems"],"answer":3},
  {"question":"For intravenous (IV) dosages, what is the bioavailability assumed to be?","options":["0%","25%","50%","75%","100%"],"answer":4},
  {"question":"Which of the following can produce a therapeutic response? A drug that is:","options":["Bound to plasma albumin","Concentrated in the bile","Concentrated in the urine","Not absorbed from the GI tract","Unbound to plasma proteins"],"answer":4},
  {"question":"Which can be used as a relative indicator of the margin of safety of a drug?","options":["T.I.","LD50","ED50","EC50","TD50"],"answer":0},
  {"question":"Which route of administration is most likely to subject a drug to first pass metabolism?","options":["Intravenous","Sublingual","Oral","Inhalation","Intramuscular"],"answer":2},
  {"question":"If a drug was given by constant infusion rate, which factor determines time to reach steady-state concentration?","options":["Apparent volume of distribution","Bioavailability","Clearance","Half-life","Infusion rate (mg of drug/min)"],"answer":3},
  {"question":"The FDA assigns letters A, B, C, D, and X to drugs. To which does this classification apply?","options":["Amount of dosage reduction needed as serum creatinine clearances fall","Fetal risk when given to pregnant women","Amount of dosage reduction needed in presence of liver dysfunction","Relative margins of therapeutic index","The number of uses for a drug"],"answer":1},
  {"question":"Tolerance and drug resistance can be a consequence of:","options":["Change in receptors, loss of them or exhaustion of mediators","Increased receptor sensitivity","Decreased metabolic degradation","Decreased renal tubular secretion","Activation of a drug after hepatic 1st pass"],"answer":0},
  {"question":"Cholinergic stimulation causes:","options":["Urine retention","Bronchodilatation","Sweating","Tachycardia","Reduced gut motility"],"answer":2},
  {"question":"The following is correct about the action of sympathomimetics:","options":["Adrenaline has almost exclusively β-adrenoceptor agonist actions","Noradrenaline has an approximately equal mix of α- and β-adrenoceptor actions","Salbutamol has predominantly α-adrenoceptor agonist actions","Phenylepherine has predominantly β-adrenoceptor agonist actions","Adrenaline acts on α-receptors as well as β-adrenoceptors"],"answer":4},
  {"question":"The statements about the action of sympathomimetics are correct EXCEPT:","options":["Adrenaline infusion causes rise in both systolic and diastolic BP with tachycardia","Noradrenaline infusion causes rise in both systolic and diastolic BP with bradycardia","Noradrenaline is given by i.m. injection","Salbutamol causes fall of BP with tachycardia","Phenylepherine causes rise of BP with bradycardia"],"answer":2},
  {"question":"For the treatment of acute anaphylactic shock, adrenaline must be given by:","options":["Inhalation","Subcutaneous","Intravenous","Intramuscular","Intracardiac"],"answer":3},
  {"question":"Salbutamol can be used in the management of:","options":["Parkinson's disease","Bronchial asthma","Depression","Hypertension","Bradycardia"],"answer":1},
  {"question":"Nasal decongestants carry the risk of cerebral stroke in which condition:","options":["Arterial hypertension","Allergic rhinitis","Epistaxis","Benign prostatic hypertrophy","Sinusitis"],"answer":0},
  {"question":"The therapeutic action of beta-blockers in angina pectoris is primarily due to:","options":["Reduced production of catecholamines","Dilatation of the coronary vessels","Decreased myocardial oxygen requirement","Increased peripheral resistance","Increased sensitivity to catecholamines"],"answer":2},
  {"question":"Beta-blockers are contraindicated in bronchial asthma because:","options":["They produce bradycardia and fall in COP","They increase bronchial secretions","They decrease pulmonary blood flow","They increase airway resistance and narrowing","They inhibit the respiratory center and impair ventilation"],"answer":3},
  {"question":"All the following are known contraindications for atropine EXCEPT:","options":["Closed angle glaucoma","Senile prostatic enlargement","Paralytic ileus","Postpartum urine retention","Acute cystitis"],"answer":4},
  {"question":"A muscarinic blocker used as standard treatment of motion sickness is:","options":["Pirenzepine","Oxybutynine","Atropine","Scopolamine","Tolterodine"],"answer":3},
  {"question":"Which is the most likely complication of insulin therapy?","options":["Dilutional hyponatremia","Hypoglycemia","Increased bleeding tendency","Pancreatitis","Severe hypertension"],"answer":1},
  {"question":"A 24-year-old woman with type 1 diabetes wishes to try tight control. Which regimen is most appropriate?","options":["Morning mixed insulin lispro and aspart","Evening mixed regular insulin and glargine","Regular insulin with NPH at mealtimes","Morning glargine plus lispro at mealtimes","Morning NPH and evening regular insulin"],"answer":3},
  {"question":"Which of the following is side effect of cortisone:","options":["Increased blood glucose","Increased blood pressure","Osteoporosis","All of the above"],"answer":3},
  {"question":"All of the following are antihypertensive drugs except:","options":["Beta blockers","Alpha blockers","Nitrates","Captopril"],"answer":2},
  {"question":"Which of the following is used in heart failure:","options":["Morphine","Cortisone","Aspirin","Digitalis"],"answer":3},
  {"question":"Which of the following is indication of atropine:","options":["Preanaesthetic","Heart failure","Hypertension","Ischemia"],"answer":0},
  {"question":"Which of the following is indication of perazosin:","options":["Hypertension","Prostatic enlargement","All","None"],"answer":2},
  {"question":"Which of the following is indication of corticosteroids:","options":["Hypertension","Diabetes","Anti inflammatory","Osteoporosis"],"answer":2},
  {"question":"Gastric lavage means:","options":["Stomach wash","Stomach feeding","Stomach resection","Non of the above"],"answer":0},
  {"question":"Adrenaline is the drug of choice in treating:","options":["Anaphylactic shock","Septic shock","Neurogenic shock","Hypovolemic shock"],"answer":0},
  {"question":"Atropine side effect includes:","options":["Blurred vision","Dry mouth","Urine retention","All of the above"],"answer":3},
  {"question":"All anticoagulant drugs are correctly matched with their mechanism EXCEPT:","options":["Warfarin - inhibits synthesis of vitamin K-dependent clotting factors","Heparin - increases the activity of antithrombin III","Bivalirudin - selectively inhibits thrombin action","LMWH - selectively inhibit factor IX","Fondaparinux - selectively inhibits factor X"],"answer":3},
  {"question":"The major untoward effect of heparin is:","options":["Bleeding","Crossing the placenta","Elevation of hepatic transaminases","Allergic reactions","Inhibition of aldosterone synthesis"],"answer":0},
  {"question":"All of the following statements are true EXCEPT:","options":["Heparin acts both in vitro and in vivo","Coumarin (warfarin) acts in vivo only","Heparin can enter the placenta causing fetal bleeding","Coumarin (warfarin) is considered a vitamin K antagonist","Heparin must be administered parenterally"],"answer":2},
  {"question":"All of the following are recognized adverse effects of heparin EXCEPT:","options":["Osteoporosis","Alopecia","Thrombocytopenia","Allergy","Fetal cleft palate"],"answer":4},
  {"question":"Protamine sulfate mechanism to stop heparin-induced bleeding:","options":["Degrades the heparin","Inactivates antithrombin","Activates the coagulation cascade","Activates tissue-plasminogen activator","Ionically combines with heparin"],"answer":4},
  {"question":"Absorption of iron:","options":["Is greater in anemic man than in normal one","Is decreased by ascorbic acid","Is more efficient when it is in ferric form","Takes place mostly in the ileum","Is enhanced by co-administration of desferroxamine"],"answer":0},
  {"question":"Which of the following drugs used to treat traumatic epistaxis:","options":["Perazosin","Adrenaline","Atropine","Phenylephrine"],"answer":1},
  {"question":"Which of the following drugs used in treating heart failure:","options":["Propranolol","Diphenhydramine","Digitalis","Carbimazole"],"answer":2},
  {"question":"Adrenaline is added to local anesthesia because:","options":["Decrease side effects of local anaesthesia","Increase elimination of local anaesthesia","Increase duration of action of local anaesthesia","Non of the above"],"answer":2},
  {"question":"Which of the following is safe contraception during lactation:","options":["Combined pills","Estrogen only pills","Progesterone only pills","All of the above"],"answer":2},
  {"question":"Atropine is added to preanaesthetic medications because:","options":["Decrease all body secretions","Inhibit respiratory center","Increase heart rate","Increase urine volume"],"answer":0},
  {"question":"Which drug is preferred in treating hypertension with prostatic enlargement?","options":["Adrenaline","Propranolol","Atropine","Perazosin"],"answer":3},
  {"question":"Which of the following is anticoagulant both in vivo and in vitro:","options":["Warfarin","Heparin","Aspirin small dose","Clopidogrel"],"answer":1},
  {"question":"Which is the most dangerous complication of insulin:","options":["Hypoglycemia","Allergy","Lipodystrophy","Hypokalemia"],"answer":0},
  {"question":"All of the following are phase 1 metabolism except:","options":["Oxidation","Hydrolysis","Reduction","Glucuronidation"],"answer":3},
  {"question":"The amount of drug reaching systemic circulation is called:","options":["First pass metabolism","Drug distribution","Bioavailability","Drug half life"],"answer":2}
];
const PART1_URL="pharmacol-part1.html",PART2_URL="pharmacol-part2.html";
let current=0,answers={},bank=[],originalBank=[];const app=document.getElementById('app');
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function wrongCount(){return Object.values(answers).filter(x=>!x.correct).length}
function home(){current=0;answers={};app.innerHTML=`<section class="card home"><h1>💊 Pharmacology Revision Bank</h1><p class="muted">${QUESTIONS.length} MCQ questions</p><button class="btn primary" onclick="start(20)">20 questions</button><button class="btn primary" onclick="start('all')">All questions (${QUESTIONS.length})</button></section>`}
function start(count,questions){current=0;answers={};const pool=shuffle(questions||QUESTIONS);bank=count==='all'?pool:pool.slice(0,Math.min(Number(count),pool.length));originalBank=[...bank];render()}
function render(){const q=bank[current];const ans=answers[current];const done=Object.keys(answers).length;app.innerHTML=`<section class="card"><div class="row"><div><div class="title">💊 Pharmacology Revision</div><div class="muted">Question ${current+1} of ${bank.length}</div></div><div class="muted">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${Math.round(done/bank.length*100)}%"></div></div><div class="q">${esc(q.question)}</div><div class="opts">${q.options.map((o,i)=>`<div class="opt${ans?(ans.idx===i?(ans.correct?' correct':' wrong'):(i===q.answer?' correct':'')):''}" onclick="check(${i})">${esc(o)}</div>`).join('')}</div>${ans?`<div style="margin-top:12px">${ans.correct?'✅ Correct!':'❌ Wrong. Correct answer highlighted.'}</div>`:''}</section><div style="display:flex;gap:8px;margin-top:12px;justify-content:space-between;flex-wrap:wrap"><button class="btn" onclick="home()">🏠 Home</button><div style="display:flex;gap:6px;flex-wrap:wrap">${current>0?`<button class="btn" onclick="back()">← Back</button>`:''}${current<bank.length-1&&ans?`<button class="btn primary" onclick="next()">Next →</button>`:''}${current===bank.length-1&&ans?`<button class="btn green" onclick="finish()">Finish ✓</button>`:''}</div></div>`}
function check(idx){if(answers[current])return;answers[current]={idx,correct:idx===bank[current].answer};render()}
function back(){if(current>0){current--;render()}}
function next(){if(current<bank.length-1){current++;render()}}
function finish(){
  const s=score(),t=Object.keys(answers).length,wrong=wrongCount();
  const wrongQs=[];for(let i=0;i<bank.length;i++){const a=answers[i];if(a&&!a.correct)wrongQs.push({i,q:bank[i],a})}
  let reviewHtml='';
  if(wrongQs.length>0){reviewHtml=`<div class="review"><h3 style="color:#b32d2e">❌ Wrong Answers (${wrongQs.length})</h3>${wrongQs.map(w=>`<div class="review-item was-wrong"><strong>Q${w.i+1}:</strong> ${esc(w.q.question)}<br><span style="color:#0b5b43">✓ ${esc(w.q.options[w.q.answer])}</span><br><span style="color:#8a2020">✗ ${esc(w.q.options[w.a.idx])}</span></div>`).join('')}</div>`}
  app.innerHTML=`<section class="card score"><h1>🏆 Finished!</h1><div class="score-big">${s} / ${t}</div><p class="muted">${Math.round(s/t*100)}%</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px"><button class="btn primary" onclick="home()">🏠 Home</button><button class="btn green" onclick="retryAll()">🔄 Retry All</button>${wrong>0?`<button class="btn orange" onclick="retryWrong()">🔁 Retry Wrong (${wrong})</button>`:''}<a class="btn" href="${PART1_URL}">📋 Part 1</a><a class="btn" href="${PART2_URL}">📋 Part 2</a></div></section>${reviewHtml}`}
function retryAll(){start('all',originalBank)}
function retryWrong(){const w=[];for(let i=0;i<bank.length;i++){const a=answers[i];if(a&&!a.correct)w.push(bank[i])}if(w.length>0)start('all',w)}
home();
</script>
</body>
</html>
