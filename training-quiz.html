<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Training Quiz</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}
    .wrap{max-width:860px;margin:0 auto;padding:16px}
    .card{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:16px}
    .home{text-align:center;padding:34px 16px}
    .home h1{margin:0 0 8px;color:#244c85;font-size:26px}
    .muted{color:#5f6876;font-size:14px}
    .row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}
    .title{font-weight:700;color:#244c85}
    .bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:12px 0}
    .fill{height:100%;background:#147a5c;transition:width .3s}
    .q{font-size:18px;line-height:1.5;margin:12px 0}
    .opts{display:grid;gap:8px}
    .opt{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;text-align:left;cursor:pointer;line-height:1.45;font:inherit}
    .opt:hover{background:#f4f7fb;border-color:#244c85}
    .opt.correct{background:#e9f6f1;border-color:#147a5c;color:#0b5b43}
    .opt.wrong{background:#fff0f0;border-color:#b32d2e;color:#8a2020}
    .btn{border:1px solid #cbd3df;border-radius:6px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block;margin:4px}
    .btn.primary{background:#244c85;border-color:#244c85;color:#fff}
    .btn.green{background:#147a5c;border-color:#147a5c;color:#fff}
    .btn.orange{background:#e67e22;border-color:#e67e22;color:#fff}
    .score{text-align:center;padding:34px 16px}
    .score-big{font-size:44px;font-weight:700;color:#147a5c;margin:8px 0}
    .review{display:grid;gap:10px;margin-top:16px;text-align:left}
    .review-item{border:1px solid #d9deea;border-radius:8px;padding:12px;line-height:1.45}
    .review-item.was-wrong{border-left:4px solid #b32d2e}
    .dataset-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:22px;text-align:left}
    .dataset-card{border:1px solid #d9deea;border-radius:8px;padding:16px;background:#fbfcff}
    .dataset-card h3{margin:0 0 6px;color:#244c85;font-size:18px}
    .dataset-card p{margin:0 0 12px;color:#5f6876;font-size:14px;line-height:1.4}
  </style>
</head>
<body>
<main class="wrap"><div id="app"></div></main>
<script>
const QUESTIONS = [
  {"question":"Hypertension is often called a silent disease because:","options":["It always causes severe pain","Many patients have no symptoms","It only affects elderly people","It only occurs during stress"],"answer":1},
  {"question":"Stage 2 hypertension is defined as:","options":["BP 120–129/<80 mmHg","BP 130–139/80–89 mmHg","BP ≥140/90 mmHg","BP <120/80 mmHg"],"answer":2},
  {"question":"Which of the following is a risk factor for myocardial ischemia?","options":["Smoking","Regular exercise","Low cholesterol","Hypoglycemia"],"answer":0},
  {"question":"Acute Kidney Injury (AKI) usually develops:","options":["Over many years","Slowly and irreversibly","Over hours or days","Only in children"],"answer":2},
  {"question":"Which condition is considered a major cause of chronic kidney disease?","options":["Asthma","Diabetes mellitus","Migraine","Pneumonia"],"answer":1},
  {"question":"Which method is considered the most accurate for diagnosing hypertension?","options":["Chest X-ray","ECG","Ambulatory blood pressure monitoring","Ultrasound"],"answer":2},
  {"question":"CKD stage 5 is defined by:","options":["GFR >90 ml/min","GFR 60–89 ml/min","GFR 30–59 ml/min","GFR <15 ml/min"],"answer":3},
  {"question":"Peritoneal dialysis works by using the:","options":["Heart as a filter","Liver as a filter","Peritoneal membrane as a natural filter","Lungs as a filter"],"answer":2},
  {"question":"Which of the following is considered normal blood pressure?","options":["140/90 mmHg","130/85 mmHg","<120/<80 mmHg","150/95 mmHg"],"answer":2},
  {"question":"Which condition may cause secondary hypertension?","options":["Renal disorders","Seasonal allergy","Migraine","Appendicitis"],"answer":0},
  {"question":"Which symptom may occur in severe hypertension?","options":["Nosebleeds","Hair loss","Jaundice","Hematuria"],"answer":0},
  {"question":"Which complication can result from long-standing hypertension?","options":["Chronic kidney disease","Cataract","Peptic ulcer","Pancreatitis"],"answer":0},
  {"question":"What is the most common cause of myocardial ischemia?","options":["Viral infection","Coronary artery atherosclerosis","Pulmonary fibrosis","Valve prolapse"],"answer":1},
  {"question":"Which risk factor is associated with myocardial ischemia?","options":["High HDL cholesterol","Physical inactivity","Low LDL cholesterol","Underweight"],"answer":1},
  {"question":"Which imaging test may be used in the diagnostic approach to chest pain?","options":["Coronary angiography","Colonoscopy","Bone scan","Liver biopsy"],"answer":0},
  {"question":"A 58-year-old diabetic smoker presents with exertional chest tightness relieved by rest. ECG at rest is normal. What is the next most appropriate investigation?","options":["Colonoscopy","Stress ECG","Liver biopsy","Thyroid ultrasound"],"answer":1},
  {"question":"Which combination of findings is most suggestive of myocardial ischemia?","options":["Headache and nosebleeds","Chest heaviness radiating to the left arm with exertion","Fatigue with elevated creatinine","Polyuria and polydipsia"],"answer":1},
  {"question":"A 67-year-old man with hypertension and hyperlipidaemia develops chest discomfort while climbing stairs. The pain radiates to his jaw and improves after resting for several minutes. What is the most likely diagnosis?","options":["Gastroenteritis","Myocardial ischemia (stable angina)","Pneumothorax","Acute appendicitis"],"answer":1},
  {"question":"Diabetes mellitus is the leading cause of CKD worldwide.","options":["True","False"],"answer":0},
  {"question":"A patient with GFR 35 ml/min is classified as CKD stage 3.","options":["True","False"],"answer":0},
  {"question":"Urinary obstruction is a cause of post-renal AKI.","options":["True","False"],"answer":0},
  {"question":"ECG is usually the first investigation for suspected myocardial ischemia.","options":["True","False"],"answer":0},
  {"question":"A patient with BP 135/85 mmHg is classified as:","options":["Normal","Elevated","Stage 1 hypertension","Stage 2 hypertension"],"answer":2},
  {"question":"Hypertension is best described as:","options":["Symptomatic disease","Acute condition","Silent disease","Infectious disease"],"answer":2},
  {"question":"Most accurate method to diagnose hypertension:","options":["Single office reading","Home BP monitoring","Ambulatory BP monitoring","ECG"],"answer":2},
  {"question":"BP ≥180/120 mmHg indicates:","options":["Stage 2 HTN","Hypertensive urgency","Hypertensive crisis","Normal variation"],"answer":2},
  {"question":"Most common type of hypertension:","options":["Secondary","Essential","Malignant","Renovascular"],"answer":1},
  {"question":"Which is NOT a complication of hypertension?","options":["Stroke","CKD","Asthma","Heart failure"],"answer":2},
  {"question":"First-line lifestyle advice for hypertension:","options":["Increase salt intake","Smoking","Exercise","Sleep deprivation"],"answer":2},
  {"question":"Chest pain relieved by rest is typical of:","options":["MI","Stable angina","Pericarditis","Pneumonia"],"answer":1},
  {"question":"Most common cause of myocardial ischemia:","options":["Infection","Atherosclerosis","Trauma","Congenital defect"],"answer":1},
  {"question":"First investigation for suspected myocardial ischemia:","options":["MRI","ECG","CT Abdomen","Ultrasound"],"answer":1},
  {"question":"Major risk factor for myocardial ischemia:","options":["Low LDL","Smoking","Exercise","Low BP"],"answer":1},
  {"question":"AKI is characterized by:","options":["Gradual decline","Irreversible damage","Rapid deterioration","No symptoms"],"answer":2},
  {"question":"AKI due to decreased blood flow:","options":["Intrinsic","Post-renal","Pre-renal","Chronic"],"answer":2},
  {"question":"Most common cause of CKD:","options":["Hypertension","Diabetes mellitus","Infection","Trauma"],"answer":1},
  {"question":"GFR 35 ml/min corresponds to:","options":["Stage 2","Stage 3","Stage 4","Stage 5"],"answer":1},
  {"question":"Which is NOT a kidney function?","options":["Electrolyte balance","BP regulation","Insulin secretion","Erythropoietin production"],"answer":2},
  {"question":"Common symptom of AKI:","options":["Polyuria","Oliguria","Weight loss","Hyperactivity"],"answer":1},
  {"question":"Definitive treatment for ESRD:","options":["Diuretics","Dialysis","Transplantation","Antibiotics"],"answer":2}
];

const PART1_COUNT = 22;
let current = 0;
let answers = {};
let bank = [];
let originalBank = [];
let currentLabel = "Part 1";
const app = document.getElementById("app");

function shuffle(a){return [...a].sort(() => Math.random() - .5)}
function esc(s){return String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c]))}
function score(){return Object.values(answers).filter(x => x.correct).length}
function wrongCount(){return Object.values(answers).filter(x => !x.correct).length}
function getSet(which){
  if(which === "part1") return QUESTIONS.slice(0, PART1_COUNT);
  if(which === "part2") return QUESTIONS.slice(PART1_COUNT);
  return QUESTIONS;
}

function home(){
  current = 0;
  answers = {};
  app.innerHTML = `<section class="card home">
    <h1>🩺 Training Quiz</h1>
    <p class="muted">Simple quiz style like the medicine bank</p>
    <div class="dataset-grid">
      <div class="dataset-card">
        <h3>Part 1</h3>
        <p>${PART1_COUNT} questions</p>
        <button class="btn primary" onclick="startSet('part1', 20)">20 questions</button>
        <button class="btn primary" onclick="startSet('part1', 'all')">All questions</button>
      </div>
      <div class="dataset-card">
        <h3>Part 2</h3>
        <p>${QUESTIONS.length - PART1_COUNT} questions</p>
        <button class="btn primary" onclick="startSet('part2', 20)">20 questions</button>
        <button class="btn primary" onclick="startSet('part2', 'all')">All questions</button>
      </div>
      <div class="dataset-card">
        <h3>Full Bank</h3>
        <p>${QUESTIONS.length} questions</p>
        <button class="btn primary" onclick="startSet('all', 20)">20 questions</button>
        <button class="btn primary" onclick="startSet('all', 'all')">All questions</button>
      </div>
    </div>
  </section>`;
}

function startSet(which, count, providedQuestions){
  current = 0;
  answers = {};
  if(which === "part1") currentLabel = "Part 1";
  else if(which === "part2") currentLabel = "Part 2";
  else currentLabel = "Full Bank";
  const pool = shuffle(providedQuestions || getSet(which));
  bank = count === "all" ? pool : pool.slice(0, Math.min(Number(count), pool.length));
  originalBank = [...bank];
  render();
}

function render(){
  const q = bank[current];
  const ans = answers[current];
  const done = Object.keys(answers).length;
  app.innerHTML = `<section class="card">
    <div class="row">
      <div>
        <div class="title">🩺 Training Quiz</div>
        <div class="muted">${currentLabel} • Question ${current + 1} of ${bank.length}</div>
      </div>
      <div class="muted">Score ${score()} / ${done}</div>
    </div>
    <div class="bar"><div class="fill" style="width:${Math.round(done / bank.length * 100)}%"></div></div>
    <div class="q">${esc(q.question)}</div>
    <div class="opts">${q.options.map((o, idx) => `<div class="opt${ans ? (ans.idx === idx ? (ans.correct ? " correct" : " wrong") : (idx === q.answer ? " correct" : "")) : ""}" onclick="check(${idx})">${esc(o)}</div>`).join("")}</div>
    ${ans ? `<div style="margin-top:12px">${ans.correct ? "✅ Correct!" : "❌ Wrong. Correct answer highlighted."}</div>` : ""}
  </section>
  <div style="display:flex;gap:8px;margin-top:12px;justify-content:space-between;flex-wrap:wrap">
    <button class="btn" onclick="home()">🏠 Home</button>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${current > 0 ? `<button class="btn" onclick="back()">← Back</button>` : ""}
      ${current < bank.length - 1 && ans ? `<button class="btn primary" onclick="next()">Next →</button>` : ""}
      ${current === bank.length - 1 && ans ? `<button class="btn green" onclick="finish()">Finish ✓</button>` : ""}
    </div>
  </div>`;
}

function check(idx){
  if(answers[current]) return;
  answers[current] = {idx, correct: idx === bank[current].answer};
  render();
}

function back(){
  if(current > 0){
    current--;
    render();
  }
}

function next(){
  if(current < bank.length - 1){
    current++;
    render();
  }
}

function finish(){
  const s = score();
  const t = Object.keys(answers).length;
  const wrong = wrongCount();
  const wrongQs = [];
  for(let idx = 0; idx < bank.length; idx++){
    const a = answers[idx];
    if(a && !a.correct) wrongQs.push({idx, q: bank[idx], a});
  }
  let reviewHtml = "";
  if(wrongQs.length > 0){
    reviewHtml = `<div class="review"><h3 style="color:#b32d2e">❌ Wrong Answers (${wrongQs.length})</h3>${wrongQs.map(w => `<div class="review-item was-wrong"><strong>Q${w.idx + 1}:</strong> ${esc(w.q.question)}<br><span style="color:#0b5b43">✓ ${esc(w.q.options[w.q.answer])}</span><br><span style="color:#8a2020">✗ Your answer: ${esc(w.q.options[w.a.idx])}</span></div>`).join("")}</div>`;
  }
  app.innerHTML = `<section class="card score">
    <h1>🏆 Finished!</h1>
    <div class="score-big">${s} / ${t}</div>
    <p class="muted">${Math.round(s / t * 100)}%</p>
    <div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px">
      <button class="btn primary" onclick="home()">🏠 Home</button>
      <button class="btn green" onclick="retryAll()">🔄 Retry All</button>
      ${wrong > 0 ? `<button class="btn orange" onclick="retryWrong()">🔁 Retry Wrong Only (${wrong})</button>` : ""}
    </div>
  </section>${reviewHtml}`;
}

function retryAll(){
  startSet(currentLabel === "Part 1" ? "part1" : currentLabel === "Part 2" ? "part2" : "all", "all", originalBank);
}

function retryWrong(){
  const wrongQs = [];
  for(let idx = 0; idx < bank.length; idx++){
    const a = answers[idx];
    if(a && !a.correct) wrongQs.push(bank[idx]);
  }
  if(wrongQs.length > 0){
    startSet(currentLabel === "Part 1" ? "part1" : currentLabel === "Part 2" ? "part2" : "all", "all", wrongQs);
  }
}

home();
</script>
</body>
</html>
