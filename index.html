<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Adult Nursing Full Bank Quiz</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}body{font-family:Arial,sans-serif;font-size:14px;color:#333;background:#fff}#app{padding:20px;max-width:740px;margin:0 auto}.cover{text-align:center;padding:55px 20px;background:#f5f5f5;border-radius:8px;margin-bottom:20px}.cover h1{font-size:28px;color:#534AB7;margin-bottom:10px}.cover p{font-size:14px;color:#666;margin:6px 0}.cover .actions{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:18px}.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;gap:10px}.header h2{font-size:18px;color:#185FA5}.header span{font-size:13px;color:#666}.progress{height:6px;background:#eee;border-radius:3px;margin:15px 0;overflow:hidden}.progress-fill{height:100%;background:#1D9E75;transition:width .3s}.q-card{background:white;border:1px solid #ddd;border-radius:8px;padding:16px;margin-bottom:12px}.q-num{font-size:12px;color:#185FA5;font-weight:bold;margin-bottom:8px}.q-text{font-size:15px;font-weight:500;margin-bottom:10px;line-height:1.5}.q-tf{display:flex;gap:8px}.q-tf button{flex:1;padding:10px;border:1px solid #ddd;background:white;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500}.q-tf button:hover,.opt:hover{background:#f9f9f9;border-color:#999}.q-tf button.correct,.opt.correct{background:#EAF3DE;color:#3B6D11;border-color:#3B6D11}.q-tf button.wrong,.opt.wrong{background:#FCEBEB;color:#A32D2D;border-color:#A32D2D}.opts{margin-top:10px}.opt{padding:10px;border:1px solid #ddd;border-radius:6px;margin-bottom:6px;cursor:pointer;background:white}.feedback{margin-top:12px;padding:10px;border-radius:6px;font-size:13px}.feedback.ok{background:#EAF3DE;color:#3B6D11}.feedback.err{background:#FCEBEB;color:#A32D2D}.nav{display:flex;justify-content:space-between;align-items:center;margin-top:20px;gap:8px;flex-wrap:wrap}.btn{padding:10px 20px;border:1px solid #ddd;background:white;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;color:#333}.btn.primary{background:#534AB7;color:white;border-color:#534AB7}.btn.green{background:#1D9E75;color:white;border-color:#1D9E75}.btn:hover{background:#f9f9f9}.btn.primary:hover{background:#463ea0}.btn.green:hover{background:#168763}.btn:disabled{opacity:.5;cursor:default}.score-card{text-align:center;padding:40px 20px;background:#f5f5f5;border-radius:8px}.score-card h3{font-size:20px;margin-bottom:15px}.score-big{font-size:48px;font-weight:bold;color:#1D9E75;margin:10px 0}.score-label{font-size:14px;color:#666;margin-bottom:20px}.timer{font-weight:bold;color:#A15C00}.tools{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:14px}.list{margin-top:14px;text-align:left}.match-row{background:#fff;border:1px solid #ddd;border-radius:8px;padding:10px;margin-bottom:8px;line-height:1.45}.small{font-size:12px;color:#666}.top-links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}@media(max-width:640px){#app{padding:12px}.cover{padding:35px 14px}.cover h1{font-size:23px}.q-tf,.nav{flex-direction:column}.btn{width:100%}}
  </style>
</head>
<body>
<div id="app"></div>
<script src="data.js"></script>
<script>
const RAW=window.BANK_DATA.questions;
const QUIZ=RAW.filter(q=>q.section==='mcq'||q.section==='true_false').map(q=>({uid:q.uid,ch:q.chapter,num:q.number,type:q.section,title:q.chapter_title,q:q.question,o:q.section==='true_false'?['True','False']:Object.values(q.options||{}),a:q.section==='true_false'?(q.answer==='T'?0:1):'ABCD'.indexOf(q.correct_answer),exp:q.explanation||''}));
const MATCHING=RAW.filter(q=>q.section==='matching');
let bank=[],current=0,answers={},timeLeft=60,timer=null,mode='cover';
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function pct(){return bank.length?Math.round(Object.keys(answers).length/bank.length*100):0}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function wrongQuestions(){return bank.filter(q=>!answers[q.uid]||!answers[q.uid].correct)}
function cover(){clearInterval(timer);mode='cover';document.getElementById('app').innerHTML=`<div class="cover"><h1>Adult Nursing Full Bank Quiz</h1><p>Complete corrected question bank</p><p>MCQ + True / False quiz with 1 minute per question</p><p class="small">Quiz questions: ${QUIZ.length} | Matching: ${MATCHING.length} | Total records: ${RAW.length}</p><div class="actions"><button class="btn primary" onclick="startAll()">Start Full Quiz</button><button class="btn" onclick="startChapter()">Choose Chapter</button><button class="btn" onclick="showMatching()">Matching Review</button></div><div class="top-links"><a href="bot_questions.json"><button class="btn">JSON</button></a><a href="nursing_smart_bank.pdf"><button class="btn">PDF</button></a></div></div>`}
function startAll(){bank=shuffle(QUIZ);current=0;answers={};render()}
function startChapter(){const chapters=[...new Set(QUIZ.map(q=>q.ch))];document.getElementById('app').innerHTML=`<div class="cover"><h1>Choose Chapter</h1><div class="actions">${chapters.map(ch=>`<button class="btn primary" onclick="startFiltered(${ch})">Chapter ${ch}</button>`).join('')}</div><div class="tools"><button class="btn" onclick="cover()">Back</button></div></div>`}
function startFiltered(ch){bank=shuffle(QUIZ.filter(q=>q.ch===ch));current=0;answers={};render()}
function startTimer(){clearInterval(timer);const q=bank[current];if(!q||answers[q.uid])return;timeLeft=60;timer=setInterval(()=>{timeLeft--;const el=document.getElementById('timer');if(el)el.textContent=timeLeft;if(timeLeft<=0){clearInterval(timer);if(!answers[q.uid]){answers[q.uid]={choice:null,correct:false,timeout:true};render();setTimeout(next,900)}}},1000)}
function render(){mode='quiz';if(current>=bank.length){finish();return}const q=bank[current], ans=answers[q.uid], progress=pct();let options='';if(q.type==='true_false'){options=`<div class="q-tf">${q.o.map((o,i)=>optionButton(q,i,o,ans,true)).join('')}</div>`}else{options=`<div class="opts">${q.o.map((o,i)=>optionButton(q,i,String.fromCharCode(65+i)+'. '+o,ans,false)).join('')}</div>`}document.getElementById('app').innerHTML=`<div class="header"><h2>Adult Nursing Question Bank</h2><span>Q${current+1}/${bank.length} | <span class="timer">⏱ <span id="timer">${ans?'done':timeLeft}</span>s</span></span></div><div class="progress"><div class="progress-fill" style="width:${progress}%"></div></div><div class="q-card"><div class="q-num">Chapter ${q.ch} - Question ${q.num}</div><div class="q-text">${escapeHtml(q.q)}</div>${options}<div id="fb">${ans?feedback(q,ans):''}</div></div><div class="nav"><button class="btn" onclick="prev()" ${current===0?'disabled':''}>← Previous</button><span class="small">Score: ${score()} / ${Object.keys(answers).length}</span><button class="btn primary" onclick="next()" ${ans?'':'disabled'}>Next →</button></div>`;if(!ans)startTimer()}
function optionButton(q,i,label,ans,isTf){let cls=isTf?'':'opt';if(isTf)cls='';if(ans&&i===q.a)cls+=(cls?' ':'')+'correct';if(ans&&ans.choice===i&&i!==q.a)cls+=(cls?' ':'')+'wrong';return `<${isTf?'button':'div'} class="${cls}" onclick="answer(${i})" ${ans&&isTf?'disabled':''}>${escapeHtml(label)}</${isTf?'button':'div'}>`}
function answer(i){const q=bank[current];if(answers[q.uid])return;clearInterval(timer);const ok=i===q.a;answers[q.uid]={choice:i,correct:ok,timeout:false};render();if(ok)setTimeout(next,700)}
function feedback(q,ans){return `<div class="feedback ${ans.correct?'ok':'err'}">${ans.timeout?'Time ended. ':ans.correct?'✓ Correct!':'✗ Incorrect.'} Correct answer: ${escapeHtml(q.o[q.a]||'')}</div>`}
function next(){const q=bank[current];if(q&&!answers[q.uid])return;current++;render()}function prev(){clearInterval(timer);current=Math.max(0,current-1);render()}
function finish(){clearInterval(timer);const total=bank.length, good=score(), wrong=wrongQuestions();document.getElementById('app').innerHTML=`<div class="score-card"><h3>Quiz Complete!</h3><div class="score-big">${good}/${total}</div><div class="score-label">${Math.round(good/total*100)||0}% Correct | Wrong: ${wrong.length}</div><div class="tools"><button class="btn primary" onclick="retryAll()">Retry Full Quiz</button><button class="btn green" onclick="retryWrong()" ${wrong.length?'':'disabled'}>Retry Wrong Only</button><button class="btn" onclick="cover()">Home</button></div><div class="list">${wrong.slice(0,80).map(q=>`<div class="match-row">Ch${q.ch} Q${q.num}. ${escapeHtml(q.q)}</div>`).join('')}</div></div>`}
function retryAll(){current=0;answers={};bank=shuffle(bank);render()}function retryWrong(){const wrong=wrongQuestions();bank=shuffle(wrong);current=0;answers={};render()}
function showMatching(){clearInterval(timer);const groups={};MATCHING.forEach(q=>(groups[q.chapter_title]??=[]).push(q));document.getElementById('app').innerHTML=`<div class="header"><h2>Matching Review</h2><button class="btn" onclick="cover()">Home</button></div>${Object.entries(groups).map(([name,items])=>`<div class="q-card"><div class="q-num">${escapeHtml(name)}</div>${items.map(x=>`<div class="match-row">${escapeHtml(x.question)}</div>`).join('')}</div>`).join('')}`}
function escapeHtml(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
cover();
</script>
</body>
</html>
