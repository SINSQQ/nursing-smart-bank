  <!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Communication in Health – أداة المراجعة والاختبار</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
  <style>
    /* ========== CSS Variables ========== */
    :root {
      --bg: #080c14;
      --bg2: #0d1220;
      --card-bg: #111827;
      --card-border: #1e3a5f;
      --card-border-glow: rgba(56, 139, 253, 0.25);
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --gold: #f59e0b;
      --gold-light: #fcd34d;
      --text: #e2e8f0;
      --text-secondary: #94a3b8;
      --correct-bg: #052e16;
      --correct-border: #16a34a;
      --correct-text: #86efac;
      --wrong-bg: #2d0b0b;
      --wrong-border: #dc2626;
      --wrong-text: #fca5a5;
      --nav-dot-default: #334155;
      --nav-dot-correct: #16a34a;
      --nav-dot-wrong: #dc2626;
      --nav-dot-skipped: #d97706;
      --overlay-bg: rgba(0,0,0,0.82);
      --shadow: 0 8px 32px rgba(0,0,0,0.7);
      --font: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      --mono: 'IBM Plex Mono', monospace;
      --transition: 0.25s ease;
      --radius: 14px;
      direction: rtl;
    }
    body.light-mode {
      --bg: #f0f4f8;
      --bg2: #e2e8f0;
      --card-bg: #ffffff;
      --card-border: #93c5fd;
      --card-border-glow: rgba(59,130,246,0.15);
      --accent: #2563eb;
      --accent2: #1d4ed8;
      --gold: #d97706;
      --gold-light: #f59e0b;
      --text: #1e293b;
      --text-secondary: #475569;
      --correct-bg: #dcfce7;
      --correct-border: #16a34a;
      --correct-text: #166534;
      --wrong-bg: #fee2e2;
      --wrong-border: #dc2626;
      --wrong-text: #991b1b;
      --nav-dot-default: #cbd5e1;
      --overlay-bg: rgba(0,0,0,0.4);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      transition: background var(--transition), color var(--transition);
      padding-top: 70px;
      min-height: 100vh;
      line-height: 1.7;
    }

    /* Subtle grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(59,130,246,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(59,130,246,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ========== Fixed Header ========== */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 62px;
      background: rgba(8,12,20,0.95);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--card-border);
      display: flex;
      align-items: center;
      padding: 0 16px;
      z-index: 1000;
      box-shadow: 0 2px 20px rgba(0,0,0,0.5);
      gap: 8px;
      flex-wrap: wrap;
    }
    body.light-mode .header {
      background: rgba(240,244,248,0.95);
    }

    .header-logo {
      font-family: var(--mono);
      font-size: 0.75rem;
      color: var(--accent);
      font-weight: 600;
      letter-spacing: 0.05em;
      white-space: nowrap;
      margin-left: auto;
      opacity: 0.7;
    }

    .mode-btns { display: flex; gap: 4px; }

    .mode-btn {
      background: transparent;
      border: 1px solid var(--card-border);
      color: var(--text-secondary);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 700;
      font-family: var(--font);
      transition: all var(--transition);
      white-space: nowrap;
      font-size: 0.82rem;
      letter-spacing: 0.02em;
    }
    .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
    .mode-btn.active-mode {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      box-shadow: 0 0 16px rgba(59,130,246,0.4);
    }

    .sep { width: 1px; height: 28px; background: var(--card-border); flex-shrink:0; }

    .icon-btn {
      background: transparent;
      border: 1px solid transparent;
      color: var(--text-secondary);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 8px;
      transition: all var(--transition);
      flex-shrink: 0;
    }
    .icon-btn:hover {
      background: rgba(59,130,246,0.1);
      border-color: var(--card-border);
      color: var(--text);
    }

    #progress-counter {
      font-family: var(--mono);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent2);
      display: none;
      background: rgba(59,130,246,0.1);
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--card-border);
      white-space: nowrap;
    }

    #finish-btn {
      background: linear-gradient(135deg, #dc2626, #991b1b);
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 700;
      font-family: var(--font);
      font-size: 0.82rem;
      display: none;
      transition: all var(--transition);
      white-space: nowrap;
      box-shadow: 0 0 12px rgba(220,38,38,0.3);
    }
    #finish-btn:hover { background: linear-gradient(135deg, #ef4444, #b91c1c); box-shadow: 0 0 20px rgba(220,38,38,0.5); }

    #translate-panel {
      display: none;
      position: fixed;
      top: 70px; right: 12px;
      z-index: 1002;
      background: var(--card-bg);
      padding: 14px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      border: 1px solid var(--card-border);
      width: 300px;
      max-width: 92vw;
    }
    #translate-panel h4 {
      color: var(--accent2);
      font-size: 0.85rem;
      margin-bottom: 10px;
      font-family: var(--mono);
      border-bottom: 1px solid var(--card-border);
      padding-bottom: 8px;
    }
    #translate-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.88rem;
      resize: vertical;
      min-height: 70px;
      outline: none;
      direction: auto;
    }
    body.light-mode #translate-input {
      background: #f8fafc;
      color: #1e293b;
    }
    #translate-input:focus { border-color: var(--accent); }
    .translate-lang-row {
      display: flex;
      gap: 6px;
      margin: 8px 0;
      align-items: center;
    }
    .translate-lang-row select {
      flex: 1;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--card-border);
      border-radius: 6px;
      padding: 6px 8px;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.82rem;
      cursor: pointer;
      outline: none;
    }
    body.light-mode .translate-lang-row select { background: #f8fafc; color:#1e293b; }
    #translate-go-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      font-family: var(--font);
      font-size: 0.82rem;
      font-weight: 700;
      transition: background var(--transition);
      white-space: nowrap;
    }
    #translate-go-btn:hover { background: var(--accent2); }
    #translate-output {
      background: rgba(59,130,246,0.06);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 0.88rem;
      color: var(--text);
      min-height: 50px;
      line-height: 1.6;
      display: none;
      direction: auto;
    }
    #translate-spinner {
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.82rem;
      display: none;
      padding: 6px 0;
    }

    /* ========== Main Container ========== */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 24px 16px 60px;
      position: relative;
      z-index: 1;
    }

    /* ========== Question Cards ========== */
    .question-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 24px 22px;
      margin-bottom: 18px;
      box-shadow: var(--shadow);
      transition: all var(--transition);
      scroll-margin-top: 80px;
      position: relative;
      overflow: hidden;
    }
    .question-card::before {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 3px; height: 100%;
      background: linear-gradient(180deg, var(--accent), transparent);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .question-card:hover::before { opacity: 1; }
    .question-card.answered::before { opacity: 1; background: linear-gradient(180deg, var(--gold), transparent); }

    .q-header {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 16px;
    }
    .q-num {
      font-family: var(--mono);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent);
      background: rgba(59,130,246,0.1);
      border: 1px solid var(--card-border);
      padding: 3px 8px;
      border-radius: 6px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-top: 3px;
    }
    .question-text {
      font-size: 1rem;
      line-height: 1.75;
      font-weight: 600;
      color: var(--text);
    }

    .options { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }

    .option {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.08);
      padding: 11px 16px;
      border-radius: 10px;
      cursor: pointer;
      transition: all var(--transition);
      color: var(--text);
      font-size: 0.93rem;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    body.light-mode .option {
      background: #f8fafc;
      border-color: #e2e8f0;
    }
    .opt-letter {
      font-family: var(--mono);
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-secondary);
      background: var(--nav-dot-default);
      border-radius: 4px;
      padding: 2px 6px;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all var(--transition);
    }
    .option:hover:not(.disabled) {
      border-color: var(--accent);
      background: rgba(59,130,246,0.07);
      transform: translateX(-3px);
    }
    .option:hover:not(.disabled) .opt-letter {
      background: var(--accent);
      color: #fff;
    }
    .option.selected-correct {
      background: var(--correct-bg) !important;
      border-color: var(--correct-border) !important;
      color: var(--correct-text);
    }
    .option.selected-correct .opt-letter { background: var(--correct-border); color:#fff; }
    .option.selected-wrong {
      background: var(--wrong-bg) !important;
      border-color: var(--wrong-border) !important;
      color: var(--wrong-text);
    }
    .option.selected-wrong .opt-letter { background: var(--wrong-border); color:#fff; }
    .option.correct-show {
      background: var(--correct-bg);
      border-color: var(--correct-border);
      color: var(--correct-text);
    }
    .option.correct-show .opt-letter { background: var(--correct-border); color:#fff; }
    .option.disabled { pointer-events: none; }

    .explanation {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(245,158,11,0.07);
      border-right: 3px solid var(--gold);
      border-radius: 6px;
      font-size: 0.86rem;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .explanation strong { color: var(--gold); }

    /* T/F Buttons */
    .true-false-btns {
      display: flex;
      gap: 14px;
      justify-content: center;
      margin-top: 14px;
      flex-wrap: wrap;
    }
    .tf-btn {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.1);
      padding: 12px 36px;
      border-radius: 30px;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 700;
      font-family: var(--font);
      transition: all var(--transition);
      color: var(--text);
      min-width: 120px;
      text-align: center;
    }
    body.light-mode .tf-btn { background: #f1f5f9; border-color: #cbd5e1; }
    .tf-btn:hover:not(.disabled) { border-color: var(--accent); background: rgba(59,130,246,0.1); transform: translateY(-2px); }
    .tf-btn.selected-correct { background: var(--correct-bg) !important; border-color: var(--correct-border) !important; color: var(--correct-text); }
    .tf-btn.selected-wrong { background: var(--wrong-bg) !important; border-color: var(--wrong-border) !important; color: var(--wrong-text); }
    .tf-btn.correct-show { background: var(--correct-bg); border-color: var(--correct-border); color: var(--correct-text); }
    .tf-btn.disabled { pointer-events: none; opacity: 0.7; }

    /* Action Buttons */
    .btn-group { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-top: 14px; }

    .skip-btn, .next-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: transparent;
      border: 1px dashed var(--text-secondary);
      color: var(--text-secondary);
      padding: 8px 22px;
      border-radius: 22px;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.88rem;
      font-family: var(--font);
      font-weight: 600;
    }
    .next-btn {
      border-style: solid;
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(59,130,246,0.07);
    }
    .skip-btn:hover { border-color: var(--gold); color: var(--gold); }
    .next-btn:hover { background: var(--accent); color: #fff; box-shadow: 0 0 14px rgba(59,130,246,0.4); }

    /* ========== Section Divider ========== */
    .section-divider {
      border: 1px dashed var(--card-border);
      border-radius: 10px;
      padding: 12px 20px;
      margin: 28px 0;
      text-align: center;
      color: var(--text-secondary);
      font-size: 0.85rem;
      background: rgba(59,130,246,0.03);
      letter-spacing: 0.05em;
    }
    .section-divider span { color: var(--gold); font-weight: 700; }

    /* ========== Flashcard ========== */
    .flashcard-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 40px;
      padding: 0 10px;
    }
    .flashcard-counter {
      font-family: var(--mono);
      font-size: 0.78rem;
      color: var(--text-secondary);
      background: rgba(59,130,246,0.08);
      border: 1px solid var(--card-border);
      padding: 4px 14px;
      border-radius: 20px;
    }
    .flashcard-box {
      padding: 32px 40px;
      border-radius: 18px;
      font-size: 1.2rem;
      font-weight: 700;
      text-align: center;
      width: 100%;
      max-width: 640px;
      box-shadow: var(--shadow);
      transition: transform 0.3s, box-shadow 0.3s;
      line-height: 1.7;
    }
    .flashcard-box:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(0,0,0,0.5); }
    .flashcard-question {
      background: linear-gradient(135deg, #1e293b, #0f172a);
      color: var(--text);
      border: 1px solid var(--card-border);
    }
    body.light-mode .flashcard-question { background: linear-gradient(135deg, #f0f9ff, #e0f2fe); color: #0c4a6e; }
    .flashcard-answer {
      background: linear-gradient(135deg, var(--correct-bg), #052e16);
      color: var(--correct-text);
      border: 1px solid var(--correct-border);
    }
    body.light-mode .flashcard-answer { background: linear-gradient(135deg, #dcfce7, #bbf7d0); color: #166534; }
    .flashcard-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      opacity: 0.6;
      display: block;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    /* ========== Navigation Overlay ========== */
    .overlay {
      position: fixed;
      inset: 0;
      background: var(--overlay-bg);
      z-index: 2000;
      display: none;
      justify-content: center;
      align-items: center;
      backdrop-filter: blur(4px);
    }
    .nav-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 18px;
      padding: 20px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      max-width: 480px;
      max-height: 80vh;
      overflow-y: auto;
      justify-content: center;
      box-shadow: 0 24px 60px rgba(0,0,0,0.8);
    }
    .nav-panel-header {
      width: 100%;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-secondary);
      font-family: var(--mono);
      margin-bottom: 8px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--card-border);
    }
    .nav-legend {
      width: 100%;
      display: flex;
      gap: 14px;
      justify-content: center;
      flex-wrap: wrap;
      padding: 10px 0 4px;
      border-top: 1px solid var(--card-border);
      margin-top: 4px;
    }
    .nav-legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.72rem;
      color: var(--text-secondary);
    }
    .nav-legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .nav-dot {
      width: 36px; height: 36px;
      border-radius: 8px;
      background: var(--nav-dot-default);
      border: none;
      color: white;
      font-weight: 700;
      font-family: var(--mono);
      cursor: pointer;
      transition: transform 0.15s, background var(--transition), box-shadow 0.15s;
      font-size: 0.78rem;
    }
    .nav-dot.correct { background: var(--nav-dot-correct); }
    .nav-dot.wrong { background: var(--nav-dot-wrong); }
    .nav-dot.skipped { background: var(--nav-dot-skipped); }
    .nav-dot:hover { transform: scale(1.15); box-shadow: 0 0 12px rgba(59,130,246,0.5); }
    .nav-dot.current { box-shadow: 0 0 0 2px #fff, 0 0 0 4px var(--accent); }
    body.light-mode .nav-dot { color: #fff; }

    /* ========== Results Panel ========== */
    .results-panel {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 32px 28px;
      text-align: center;
      box-shadow: var(--shadow);
      max-width: 500px;
      width: 92%;
    }
    .results-title {
      font-size: 1.5rem;
      font-weight: 900;
      color: var(--text);
      margin-bottom: 6px;
    }
    .results-score {
      font-size: 3.5rem;
      font-family: var(--mono);
      font-weight: 700;
      margin: 14px 0;
      line-height: 1;
    }
    .score-label { font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 20px; }
    .results-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin: 20px 0;
    }
    .stat-box {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      padding: 12px 8px;
    }
    body.light-mode .stat-box { background: #f8fafc; }
    .stat-num {
      font-family: var(--mono);
      font-size: 1.6rem;
      font-weight: 700;
      display: block;
    }
    .stat-lbl { font-size: 0.72rem; color: var(--text-secondary); display: block; margin-top: 2px; }
    .stat-correct .stat-num { color: var(--correct-border); }
    .stat-wrong .stat-num { color: var(--wrong-border); }
    .stat-skip .stat-num { color: var(--nav-dot-skipped); }
    .results-bar {
      height: 8px;
      background: var(--nav-dot-default);
      border-radius: 4px;
      overflow: hidden;
      margin: 16px 0;
    }
    .results-bar-fill {
      height: 100%;
      border-radius: 4px;
      background: linear-gradient(90deg, var(--correct-border), #22c55e);
      transition: width 1s ease;
    }
    .results-actions {
      margin-top: 20px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .results-actions button {
      background: rgba(59,130,246,0.1);
      color: var(--accent2);
      border: 1px solid var(--card-border);
      padding: 9px 16px;
      border-radius: 22px;
      cursor: pointer;
      transition: all var(--transition);
      font-size: 0.84rem;
      font-weight: 600;
      font-family: var(--font);
    }
    .results-actions button:hover { background: var(--accent); color: #fff; border-color: var(--accent); }
    #close-results-btn { background: rgba(255,255,255,0.04); color: var(--text-secondary); }
    #close-results-btn:hover { background: rgba(255,255,255,0.1); color: var(--text); }

    /* ========== Toast ========== */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text);
      padding: 10px 22px;
      border-radius: 22px;

    // ---------- Audio (Web Audio API with autoResume) ----------
    let audioCtx = null;
    let soundEnabled = true;

    function getCtx() {
      if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      // Resume if suspended (browser autoplay policy)
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }
      return audioCtx;
    }

    function playClick(freq = 660, dur = 0.08) {
      if (!soundEnabled) return;
      try {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = freq;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.12, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + dur);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + dur);
      } catch (e) {
        // silent fail
      }
    }

    function snd(freq, dur) { playClick(freq, dur); }

    // Unlock audio on first user gesture
    function unlockAudio() {
      try { getCtx(); } catch(e) {}
      document.removeEventListener('click', unlockAudio);
      document.removeEventListener('touchend', unlockAudio);
    }
    document.addEventListener('click', unlockAudio);
    document.addEventListener('touchend', unlockAudio);

      { id:"tf-Q", text:"Leaning in and providing eye contact are effective nonverbal ways to show care.", ans:true, exp:"These behaviors convey empathy and attentiveness." },
      { id:"tf-R", text:"Nurses should avoid making personal connections with patients to maintain professionalism.", ans:false, exp:"Therapeutic relationships require genuine connection within professional boundaries." },
      { id:"tf-S", text:"Being open-minded and avoiding judgment improves verbal communication.", ans:true, exp:"Open-mindedness fosters dialogue and trust." },
      { id:"tf-V", text:"Smiling is a simple but powerful nonverbal communication tool in healthcare.", ans:true, exp:"Smiling conveys warmth and approachability." }
    ];

    // Assign types
    mcqQuestions.forEach(q => q.type = 'mcq');
    tfQuestions.forEach(q => q.type = 'tf');
    const allQuestions = [...mcqQuestions, ...tfQuestions];
    const totalQ = allQuestions.length;

    // ---------- State ----------
    let currentMode = 'review';
    let testAnswers = new Array(totalQ).fill(null);
    let selectedOptionIndex = new Array(totalQ).fill(-1);
    let currentQIdx = 0;
    let testFinished = false;

    // ---------- DOM ----------
    const mainContent = document.getElementById('main-content');
    const modeBtns = document.querySelectorAll('.mode-btn');
    const finishBtn = document.getElementById('finish-btn');
    const progressCounter = document.getElementById('progress-counter');
    const navOverlay = document.getElementById('nav-overlay');
    const navPanel = document.getElementById('nav-panel');
    const resultsOverlay = document.getElementById('results-overlay');
    const resultsPanel = document.getElementById('results-panel');
    // translate panel handled by id directly

    // ---------- Helpers ----------
    function updateProgress() {
      const answered = testAnswers.filter(a => a === 'correct' || a === 'wrong').length;
      progressCounter.textContent = `${answered} / ${totalQ}`;
    }

    function resetTest() {
      testAnswers = new Array(totalQ).fill(null);
      selectedOptionIndex = new Array(totalQ).fill(-1);
      testFinished = false;
      currentQIdx = 0;
      updateProgress();
    }

    // ---------- RENDER: Review ----------
    function renderReview() {
      let html = '';
      allQuestions.forEach((q, idx) => {
        const qType = q.type === 'tf' ? 'T/F' : `Q${q.id}`;
        html += `<div class="question-card" id="q-${idx}">
          <div class="q-header">
            <span class="q-num">${qType}</span>
            <div class="question-text">${q.text}</div>
          </div>`;

        if (q.type === 'mcq') {
          html += '<div class="options">';
          q.opts.forEach((opt, oi) => {
            const isCorrect = oi === q.ans;
            html += `<div class="option${isCorrect ? ' correct-show' : ''}">
              <span class="opt-letter">${LETTERS[oi]}</span>
              <span>${isCorrect ? '✅ ' : ''}${opt}</span>
            </div>`;
          });
          html += '</div>';
        } else {
          html += '<div class="true-false-btns">';
          html += `<div class="tf-btn${q.ans === true ? ' correct-show' : ''}">${q.ans === true ? '✅ ' : ''}صح (True)</div>`;
          html += `<div class="tf-btn${q.ans === false ? ' correct-show' : ''}">${q.ans === false ? '✅ ' : ''}خطأ (False)</div>`;
          html += '</div>';
        }

        html += `<div class="explanation">📝 ${q.exp}</div>`;
        html += '</div>';

        if ((idx + 1) % 25 === 0 && idx + 1 < totalQ) {
          html += `<div class="section-divider">✦ <span>صلى الله على نبينا محمد</span> ✦  —  Section ${Math.floor((idx+1)/25) + 1}</div>`;
        }
      });
      mainContent.innerHTML = html;
    }

    // ---------- RENDER: Test (single question) ----------
    function renderTestQ(index) {
      if (index < 0 || index >= totalQ) { showResults(); return; }
      currentQIdx = index;
      const q = allQuestions[index];
      const answered = testAnswers[index] !== null;
      const qType = q.type === 'tf' ? 'T/F' : `Q${q.id}`;

      let html = `<div class="question-card${answered ? ' answered' : ''}" id="q-${index}">
        <div class="q-header">
          <span class="q-num">${qType}</span>
          <div class="question-text">${q.text}</div>
        </div>`;

      if (q.type === 'mcq') {
        html += '<div class="options">';
        q.opts.forEach((opt, oi) => {
          let cls = 'option';
          if (answered) {
            cls += ' disabled';
            if (oi === q.ans) cls += ' selected-correct';
            else if (selectedOptionIndex[index] === oi) cls += ' selected-wrong';
          }
          html += `<div class="${cls}" data-opt="${oi}">
            <span class="opt-letter">${LETTERS[oi]}</span>
            <span>${oi === q.ans && answered ? '✅ ' : ''}${opt}</span>
          </div>`;
        });
        html += '</div>';
      } else {
        let tCls = 'tf-btn', fCls = 'tf-btn';
        if (answered) {
          tCls += ' disabled'; fCls += ' disabled';
          if (q.ans === true) tCls += ' selected-correct'; else tCls += (selectedOptionIndex[index] === 0 ? ' selected-wrong' : '');
          if (q.ans === false) fCls += ' selected-correct'; else fCls += (selectedOptionIndex[index] === 1 ? ' selected-wrong' : '');
        }
        html += `<div class="true-false-btns">
          <div class="${tCls}" data-opt="0">${q.ans === true && answered ? '✅ ' : ''}صح (True)</div>
          <div class="${fCls}" data-opt="1">${q.ans === false && answered ? '✅ ' : ''}خطأ (False)</div>
        </div>`;
      }

      if (answered) {
        html += `<div class="explanation">📝 ${q.exp}</div>`;
      }

      html += '<div class="btn-group">';
      if (!answered) {
        html += '<button class="skip-btn">⏭ تخطي</button>';
      } else if (index < totalQ - 1) {
        html += '<button class="next-btn">التالي ⏭</button>';
      } else {
        html += '<button class="next-btn">📊 عرض النتائج</button>';
      }
      html += '</div></div>';
      mainContent.innerHTML = html;

      if (!answered) {
        document.querySelectorAll('.option:not(.disabled), .tf-btn:not(.disabled)').forEach(el => {
          el.addEventListener('click', function () {
            if (testAnswers[index] !== null) return;
            handleAnswer(index, parseInt(this.dataset.opt));
          });
        });
        document.querySelector('.skip-btn')?.addEventListener('click', () => {
          if (testAnswers[index] !== null) return;
          testAnswers[index] = 'skipped';
          selectedOptionIndex[index] = -1;
          updateProgress();
          snd(440, 0.06);
          moveNext();
        });
      } else {
        document.querySelector('.next-btn')?.addEventListener('click', () => {
          if (index < totalQ - 1) moveNext(); else showResults();
        });
      }
      updateNavCurrent(index);
    }

    function handleAnswer(index, optIdx) {
      if (testAnswers[index] !== null) return;
      const q = allQuestions[index];
      let correct = false;
      if (q.type === 'mcq') correct = (optIdx === q.ans);
      else correct = (optIdx === 0 && q.ans === true) || (optIdx === 1 && q.ans === false);
      testAnswers[index] = correct ? 'correct' : 'wrong';
      selectedOptionIndex[index] = optIdx;
      updateProgress();
      snd(correct ? 880 : 220, 0.1);
      renderTestQ(index);
    }

    function moveNext() {
      if (currentQIdx < totalQ - 1) {
        currentQIdx++;
        renderTestQ(currentQIdx);
        setTimeout(() => {
          const card = document.getElementById(`q-${currentQIdx}`);
          if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 60);
      } else showResults();
    }

    // ---------- Results ----------
    function showResults() {
      testFinished = true;
      const correct = testAnswers.filter(a => a === 'correct').length;
      const wrong = testAnswers.filter(a => a === 'wrong').length;
      const skipped = testAnswers.filter(a => a === 'skipped').length;
      const percent = totalQ > 0 ? Math.round((correct / totalQ) * 100) : 0;
      const grade = percent >= 90 ? '🏆 ممتاز' : percent >= 75 ? '⭐ جيد جداً' : percent >= 60 ? '✅ جيد' : '📚 تحتاج مراجعة';
      const scoreColor = percent >= 75 ? 'var(--correct-border)' : percent >= 60 ? 'var(--gold)' : 'var(--wrong-border)';

      resultsPanel.innerHTML = `
        <div class="results-title">📊 نتائج الاختبار</div>
        <div class="results-score" style="color:${scoreColor}">${percent}%</div>
        <div class="score-label">${grade} — ${correct} من ${totalQ} إجابة صحيحة</div>
        <div class="results-bar"><div class="results-bar-fill" id="bar-fill" style="width:0%"></div></div>
        <div class="results-stats">
          <div class="stat-box stat-correct">
            <span class="stat-num">${correct}</span>
            <span class="stat-lbl">✅ صحيح</span>
          </div>
          <div class="stat-box stat-wrong">
            <span class="stat-num">${wrong}</span>
            <span class="stat-lbl">❌ خطأ</span>
          </div>
          <div class="stat-box stat-skip">
            <span class="stat-num">${skipped}</span>
            <span class="stat-lbl">⏭ متخطى</span>
          </div>
        </div>
        <div class="results-actions">
          <button id="rew-wrong">🔍 الخاطئة</button>
          <button id="rew-skipped">🔍 المتخطاة</button>
          <button id="rew-all">📚 مراجعة الكل</button>
          <button id="close-results-btn">✖ إغلاق</button>
        </div>`;

      resultsOverlay.style.display = 'flex';
      setTimeout(() => {
        const fill = document.getElementById('bar-fill');
        if (fill) fill.style.width = percent + '%';
      }, 100);

      document.getElementById('rew-wrong').addEventListener('click', () => reviewFiltered('wrong'));
      document.getElementById('rew-skipped').addEventListener('click', () => reviewFiltered('skipped'));
      document.getElementById('rew-all').addEventListener('click', () => reviewFiltered('all'));
      document.getElementById('close-results-btn').addEventListener('click', () => {
        resultsOverlay.style.display = 'none';
        switchMode('review');
      });
    }

    function reviewFiltered(filter) {
      resultsOverlay.style.display = 'none';
      switchMode('review');
      setTimeout(() => {
        let first = null;
        allQuestions.forEach((q, idx) => {
          const card = document.getElementById(`q-${idx}`);
          if (!card) return;
          const status = testAnswers[idx];
          const match = filter === 'all' || (filter === 'wrong' && status === 'wrong') || (filter === 'skipped' && status === 'skipped');
          if (match) {
            card.style.border = '2px solid var(--gold)';
            card.style.boxShadow = '0 0 18px rgba(245,158,11,0.3)';
            if (!first) first = card;
          } else {
            card.style.border = '';
            card.style.boxShadow = '';
          }
        });
        if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
        const count = filter === 'all' ? totalQ : testAnswers.filter(a => a === filter).length;
        showToast(`تم تحديد ${count} سؤال`);
      }, 300);
    }

    // ---------- Flashcard ----------
    function renderFlashcard(index) {
      if (index >= totalQ) {
        mainContent.innerHTML = `<div class="flashcard-container">
          <div class="flashcard-box flashcard-answer" style="font-size:1.4rem;">🎉 أحسنت! راجعت جميع البطاقات</div>
          <div class="btn-group">
            <button class="next-btn" id="restart-fc">🔄 إعادة البدء</button>
          </div>
        </div>`;
        document.getElementById('restart-fc')?.addEventListener('click', () => renderFlashcard(0));
        return;
      }
      currentQIdx = index;
      const q = allQuestions[index];
      const ansText = q.type === 'mcq' ? `${LETTERS[q.ans]}) ${q.opts[q.ans]}` : (q.ans ? 'True (صح) ✅' : 'False (خطأ) ✅');

      mainContent.innerHTML = `<div class="flashcard-container">
        <div class="flashcard-counter">${index + 1} / ${totalQ}</div>
        <div class="flashcard-box flashcard-question">
          <span class="flashcard-label">السؤال</span>
          ${q.text}
        </div>
        <div class="flashcard-box flashcard-answer">
          <span class="flashcard-label">الإجابة الصحيحة</span>
          ${ansText}
        </div>
        <div class="btn-group">
          ${index > 0 ? '<button class="skip-btn" id="prev-fc">⏮ السابق</button>' : ''}
          <button class="next-btn" id="next-fc">${index < totalQ - 1 ? 'التالي ⏭' : '🎉 إنهاء'}</button>
        </div>
      </div>`;

      document.getElementById('next-fc')?.addEventListener('click', () => { snd(660, 0.06); renderFlashcard(index + 1); });
      document.getElementById('prev-fc')?.addEventListener('click', () => { snd(440, 0.06); renderFlashcard(index - 1); });
      updateNavCurrent(index);
    }

    // ---------- Navigation Panel ----------
    function renderNavPanel() {
      // Keep header, rebuild dots
      const header = navPanel.querySelector('.nav-panel-header');
      navPanel.innerHTML = '';
      if (header) navPanel.appendChild(header);
      else {
        const h = document.createElement('div');
        h.className = 'nav-panel-header';
        h.textContent = 'انتقل إلى سؤال — Click to jump';
        navPanel.appendChild(h);
      }

      allQuestions.forEach((q, idx) => {
        const dot = document.createElement('button');
        dot.className = 'nav-dot';
        dot.textContent = idx + 1;
        dot.dataset.index = idx;
        if (currentMode === 'test') {
          const s = testAnswers[idx];
          if (s === 'correct') dot.classList.add('correct');
          else if (s === 'wrong') dot.classList.add('wrong');
          else if (s === 'skipped') dot.classList.add('skipped');
        }
        if ((currentMode === 'test' || currentMode === 'flashcard') && idx === currentQIdx) {
          dot.classList.add('current');
        }
        dot.addEventListener('click', function () {
          const i = parseInt(this.dataset.index);
          navOverlay.style.display = 'none';
          snd(660, 0.06);
          if (currentMode === 'test') { currentQIdx = i; renderTestQ(i); flashHighlight(`q-${i}`); }
          else if (currentMode === 'flashcard') renderFlashcard(i);
          else {
            const card = document.getElementById(`q-${i}`);
            if (card) { card.scrollIntoView({ behavior: 'smooth', block: 'center' }); flashHighlight(`q-${i}`); }
          }
        });
        navPanel.appendChild(dot);
      });

      // Legend
      const legend = document.createElement('div');
      legend.className = 'nav-legend';
      legend.innerHTML = `
        <div class="nav-legend-item"><div class="nav-legend-dot" style="background:var(--nav-dot-correct)"></div>صحيح</div>
        <div class="nav-legend-item"><div class="nav-legend-dot" style="background:var(--nav-dot-wrong)"></div>خطأ</div>
        <div class="nav-legend-item"><div class="nav-legend-dot" style="background:var(--nav-dot-skipped)"></div>متخطى</div>
        <div class="nav-legend-item"><div class="nav-legend-dot" style="background:var(--nav-dot-default)"></div>لم يُجب</div>`;
      navPanel.appendChild(legend);
    }

    function updateNavCurrent(index) {
      navPanel.querySelectorAll('.nav-dot').forEach(d => {
        d.classList.remove('current');
        if (currentMode === 'test') {
          const i = parseInt(d.dataset.index);
          d.classList.remove('correct','wrong','skipped');
          const s = testAnswers[i];
          if (s === 'correct') d.classList.add('correct');
          else if (s === 'wrong') d.classList.add('wrong');
          else if (s === 'skipped') d.classList.add('skipped');
        }
      });
      const active = navPanel.querySelector(`.nav-dot[data-index="${index}"]`);
      if (active) active.classList.add('current');
    }

    function flashHighlight(id) {
      setTimeout(() => {
        const el = document.getElementById(id);
        if (el) {
          el.style.transition = '0.2s';
          el.style.boxShadow = '0 0 30px rgba(59,130,246,0.5)';
          el.style.borderColor = 'var(--accent)';
          setTimeout(() => { el.style.boxShadow = ''; el.style.borderColor = ''; }, 600);
        }
      }, 80);
    }

    // ---------- Mode Switch ----------
    function switchMode(mode) {
      currentMode = mode;
      modeBtns.forEach(btn => btn.classList.toggle('active-mode', btn.dataset.mode === mode));

      if (mode === 'test') {
        finishBtn.style.display = 'inline-block';
        progressCounter.style.display = 'inline';
        if (testAnswers.every(a => a === null) || testFinished) resetTest();
        renderTestQ(currentQIdx);
        updateProgress();
      } else {
        finishBtn.style.display = 'none';
        progressCounter.style.display = 'none';
        if (mode === 'review') renderReview();
        else if (mode === 'flashcard') { currentQIdx = 0; renderFlashcard(0); }
      }
      renderNavPanel();
    }

    // ---------- Event Listeners ----------
    modeBtns.forEach(btn => {
      btn.addEventListener('click', () => { snd(660, 0.06); switchMode(btn.dataset.mode); });
    });

    finishBtn.addEventListener('click', () => {
      if (currentMode === 'test' && !testFinished) { snd(440, 0.08); showResults(); }
    });

    document.getElementById('nav-btn').addEventListener('click', () => {
      renderNavPanel();
      navOverlay.style.display = 'flex';
      snd(660, 0.06);
    });

    navOverlay.addEventListener('click', e => { if (e.target === navOverlay) navOverlay.style.display = 'none'; });
    resultsOverlay.addEventListener('click', e => { if (e.target === resultsOverlay) resultsOverlay.style.display = 'none'; });

    // (Escape handled below in translate panel section)
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowRight' && currentMode === 'flashcard') { snd(660,0.06); renderFlashcard(currentQIdx + 1); }
      if (e.key === 'ArrowLeft' && currentMode === 'flashcard' && currentQIdx > 0) { snd(440,0.06); renderFlashcard(currentQIdx - 1); }
    });

    document.getElementById('theme-btn').addEventListener('click', function () {
      document.body.classList.toggle('light-mode');
      this.textContent = document.body.classList.contains('light-mode') ? '☀️' : '🌙';
      snd(660, 0.06);
    });

    document.getElementById('sound-btn').addEventListener('click', function () {
      soundEnabled = !soundEnabled;
      this.textContent = soundEnabled ? '🔊' : '🔇';
      if (soundEnabled) snd(660, 0.06);
    });

    document.getElementById('translate-btn').addEventListener('click', function () {
      const panel = document.getElementById('translate-panel');
      const isOpen = panel.style.display === 'block';
      panel.style.display = isOpen ? 'none' : 'block';
      snd(660, 0.06);
    });

    // ---------- Translation Panel ----------
    (function buildTranslatePanel() {
      const panel = document.getElementById('translate-panel');
      panel.innerHTML = `
        <h4>🌍 الترجمة الفورية</h4>
        <textarea id="translate-input" placeholder="اكتب النص هنا للترجمة..."></textarea>
        <div class="translate-lang-row">
          <select id="translate-from">
            <option value="ar">العربية</option>
            <option value="en">English</option>
            <option value="auto" selected>اكتشاف تلقائي</option>
          </select>
          <span style="color:var(--text-secondary);font-size:0.8rem;">→</span>
          <select id="translate-to">
            <option value="en" selected>English</option>
            <option value="ar">العربية</option>
            <option value="fr">Français</option>
            <option value="tr">Türkçe</option>
            <option value="ur">اردو</option>
            <option value="fa">فارسی</option>
            <option value="de">Deutsch</option>
            <option value="es">Español</option>
          </select>
          <button id="translate-go-btn">ترجم</button>
        </div>
        <div id="translate-spinner">⏳ جاري الترجمة...</div>
        <div id="translate-output"></div>`;

      async function doTranslate() {
        const text = document.getElementById('translate-input').value.trim();
        const from = document.getElementById('translate-from').value;
        const to = document.getElementById('translate-to').value;
        const output = document.getElementById('translate-output');
        const spinner = document.getElementById('translate-spinner');
        if (!text) { showToast('أدخل نصاً للترجمة'); return; }
        output.style.display = 'none';
        spinner.style.display = 'block';
        try {
          const langPair = (from === 'auto' ? 'autodetect' : from) + '|' + to;
          const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${langPair}`;
          const res = await fetch(url);
          const data = await res.json();
          spinner.style.display = 'none';
          if (data.responseStatus === 200) {
            output.textContent = data.responseData.translatedText;
            output.style.display = 'block';
          } else {
            output.textContent = '⚠️ فشلت الترجمة. حاول مرة أخرى.';
            output.style.display = 'block';
          }
        } catch (e) {
          spinner.style.display = 'none';
          output.textContent = '⚠️ تأكد من اتصال الإنترنت وحاول مرة أخرى.';
          output.style.display = 'block';
        }
      }

      document.getElementById('translate-go-btn').addEventListener('click', doTranslate);
      document.getElementById('translate-input').addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.ctrlKey) doTranslate();
      });
    })();

    // ---------- Close translate panel when clicking outside ----------
    document.addEventListener('click', function(e) {
      const panel = document.getElementById('translate-panel');
      const btn = document.getElementById('translate-btn');
      if (panel.style.display === 'block' && !panel.contains(e.target) && e.target !== btn) {
        panel.style.display = 'none';
      }
    });

    // Fix Escape key to also close translate panel
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') {
        navOverlay.style.display = 'none';
        resultsOverlay.style.display = 'none';
        document.getElementById('translate-panel').style.display = 'none';
      }
    });

    // ---------- Init ----------
    switchMode('review');
    renderNavPanel();

  })();
  </script>
</body>
