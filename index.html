<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Nursing Smart Bank</title><style>
:root{font-family:Arial,Tahoma,sans-serif;color:#17202a;background:#f5f7fb}*{box-sizing:border-box}body{margin:0}.top{position:sticky;top:0;background:#fff;border-bottom:1px solid #d8dee9;padding:14px 18px;z-index:2}.title{font-size:22px;font-weight:700}.sub{color:#526070;font-size:13px;margin-top:4px}.toolbar{display:grid;grid-template-columns:1fr repeat(3,auto);gap:8px;margin-top:12px}input,select,button{font:inherit;border:1px solid #c9d1dc;border-radius:6px;padding:9px 10px;background:#fff}button{cursor:pointer;background:#1f6feb;color:#fff;border-color:#1f6feb}.wrap{max-width:1160px;margin:0 auto;padding:18px}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px}.stat{background:#fff;border:1px solid #dde3ec;border-radius:8px;padding:12px}.stat b{display:block;font-size:22px}.card{background:#fff;border:1px solid #dde3ec;border-radius:8px;padding:14px;margin:10px 0}.meta{display:flex;gap:8px;flex-wrap:wrap;color:#526070;font-size:12px;margin-bottom:8px}.tag{border:1px solid #d0d7e2;border-radius:99px;padding:3px 7px}.flag{background:#fff3cd;color:#7a4d00;border-color:#f3d27a}.q{font-weight:700;line-height:1.35}.opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}.opt{border:1px solid #e0e6ef;border-radius:6px;padding:8px}.answer{margin-top:10px;color:#0f6b3f;font-weight:700}.actions{display:flex;gap:8px;margin-top:10px}.actions button{background:#fff;color:#1f2937;border-color:#c9d1dc}.actions button.bad{color:#b42318}.actions button.good{color:#087443}.hidden{display:none}@media(max-width:760px){.toolbar,.stats,.opts{grid-template-columns:1fr}.top{position:static}}
</style></head><body><div class="top"><div class="title">بنك تمريض بالغين - مراجعة ذكية</div><div class="sub">فلترة الأسئلة، تحديد الخطأ، إعادة بنك بالأسئلة الخطأ، وتصدير JSON.</div><div class="toolbar"><input id="search" placeholder="بحث في السؤال..."><select id="chapter"><option value="">كل الفصول</option></select><select id="filter"><option value="all">كل الأسئلة</option><option value="review">أسئلة تحتاج مراجعة</option><option value="wrong">الأسئلة الخطأ عندي</option><option value="complete">أسئلة كاملة فقط</option></select><button id="exportWrong">تصدير الخطأ</button></div></div><main class="wrap"><section class="stats" id="stats"></section><section id="list"></section></main><script src="data.js"></script><script>
const D=window.BANK_DATA;let wrong=new Set(JSON.parse(localStorage.getItem('wrongQuestions')||'[]'));let reviewMark=new Set(JSON.parse(localStorage.getItem('reviewQuestions')||'[]'));
const $=s=>document.querySelector(s);const list=$('#list'), chapter=$('#chapter'), filter=$('#filter'), search=$('#search');
for(const c of D.summary.chapters){let o=document.createElement('option');o.value=c.chapter;o.textContent=`Chapter ${c.chapter} - ${c.title}`;chapter.appendChild(o)}
function save(){localStorage.setItem('wrongQuestions',JSON.stringify([...wrong]));localStorage.setItem('reviewQuestions',JSON.stringify([...reviewMark]))}
function stats(rows){$('#stats').innerHTML=`<div class=stat><b>${D.summary.total_question_records}</b>كل السجلات</div><div class=stat><b>${D.summary.source_zip_pages_count}</b>صفحات ZIP</div><div class=stat><b>${D.summary.needs_review_count}</b>مراجعة مصدر</div><div class=stat><b>${wrong.size}</b>غلط عندك</div>`}
function row(q){let flags=[...(q.review_flags||[])]; if(wrong.has(q.uid))flags.push('wrong_bank'); if(reviewMark.has(q.uid))flags.push('manual_review');
let opts=q.options?`<div class=opts>${Object.entries(q.options).map(([k,v])=>`<div class=opt><b>${k}.</b> ${v||''}</div>`).join('')}</div>`:'';
let ans=q.correct_answer||q.answer;return `<article class=card><div class=meta><span class=tag>Ch ${q.chapter}</span><span class=tag>${q.section_name||q.section}</span><span class=tag>#${q.number??''}</span>${flags.map(f=>`<span class="tag flag">${f}</span>`).join('')}</div><div class=q>${q.question||''}</div>${opts}${ans?`<div class=answer>Answer: ${ans}</div>`:''}${q.explanation?`<div class=sub>${q.explanation}</div>`:''}<div class=actions><button class=good onclick="wrong.delete('${q.uid}');save();render()">صح عندي</button><button class=bad onclick="wrong.add('${q.uid}');save();render()">حطه في بنك الغلط</button><button onclick="reviewMark.add('${q.uid}');save();render()">مراجعة</button></div></article>`}
function render(){let rows=D.questions.filter(q=>{if(chapter.value&&String(q.chapter)!==chapter.value)return false;let s=search.value.trim().toLowerCase();if(s&&!JSON.stringify(q).toLowerCase().includes(s))return false;if(filter.value==='review'&&!(q.review_flags||[]).length&&!reviewMark.has(q.uid))return false;if(filter.value==='wrong'&&!wrong.has(q.uid))return false;if(filter.value==='complete'&&(q.review_flags||[]).includes('missing_options'))return false;return true});stats(rows);list.innerHTML=rows.map(row).join('')||'<div class=card>لا توجد نتائج</div>'}
$('#exportWrong').onclick=()=>{let rows=D.questions.filter(q=>wrong.has(q.uid));let blob=new Blob([JSON.stringify({exported_at:new Date().toISOString(),questions:rows},null,2)],{type:'application/json'});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='wrong_questions_bank.json';a.click()}
chapter.onchange=filter.onchange=search.oninput=render;render();
</script></body></html>
