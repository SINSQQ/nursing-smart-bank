<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pharmacology Quiz - Part 2</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}.wrap{max-width:860px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:16px}.home{text-align:center;padding:34px 16px}.home h1{margin:0 0 8px;color:#244c85;font-size:26px}.muted{color:#5f6876;font-size:14px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{font-weight:700;color:#244c85}.bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:12px 0}.fill{height:100%;background:#147a5c;transition:width .3s}.q{font-size:18px;line-height:1.5;margin:12px 0}.opts{display:grid;gap:8px}.opt{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;text-align:left;cursor:pointer;line-height:1.45;font:inherit}.opt:hover{background:#f4f7fb;border-color:#244c85}.opt.correct{background:#e9f6f1;border-color:#147a5c;color:#0b5b43}.opt.wrong{background:#fff0f0;border-color:#b32d2e;color:#8a2020}.btn{border:1px solid #cbd3df;border-radius:6px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block;margin:4px}.btn.primary{background:#244c85;border-color:#244c85;color:#fff}.btn.green{background:#147a5c;border-color:#147a5c;color:#fff}.score{text-align:center;padding:34px 16px}.score-big{font-size:44px;font-weight:700;color:#147a5c;margin:8px 0}
  </style>
</head>
<body>
<main class="wrap"><div id="app"></div></main>
<script>
const QUESTIONS=[
  {"question":"The following statements are true for drug's therapeutic index EXCEPT:","options":["It is the relation between the lethal dose in 50% of animals to the curative dose in 50% of them","The lower the TI, the safer will be the drug.","It should be done to any drug before it's being approved for human use","For theoretically useful drugs, it must be greater than 1","It could be applied in animal testing"],"answer":1},
  {"question":"A drug is said to be reversible antagonist when:","options":["It blocks the receptors by making covalent bonds with them","The duration of blockade is too long","Increasing the dose of the agonist will reverse the block","The response curve of the agonist in presence of this drug is not parallel to that of the agonist alone"],"answer":2},
  {"question":"Hemolysis that may occur with sulfonamides therapy may be due to:","options":["Pseudocholinestrase deficiency","Methemoglobin reductase deficiency","G-6-PD deficiency","Vitamin K epoxide reductase deficiency","Monoamine oxidase deficiency"],"answer":2},
  {"question":"Failure of some children with rickets to respond to therapeutic doses of vitamin D is most likely to be due to:","options":["Differences in sex","Differences in body weight","Genetic variation","Tolerance","Intolerance"],"answer":2},
  {"question":"Metabolism (biotransformation) of drugs can lead to all the following results EXCEPT:","options":["Conversion of active compound into inactive metabolites","Conversion of active compound into active metabolites","Conversion of inactive compound into active metabolites","Conversion of non-toxic compound into toxic metabolites","Conversion of water-soluble compound into lipid-soluble metabolites"],"answer":4},
  {"question":"Drugs X and Y have the same mechanism of diuretic action. Drug X in a dose of 5mg produces the same magnitude of diuresis as 500 mg of drug Y. This suggests that:","options":["Drug Y is less efficacious than drug X","Drug X is about 100 times more potent than drug Y.","Toxicity of drug X is less than that of drug Y.","Drug X is a safer drug than drug Y.","Drug X will have a shorter duration of action than drug Y."],"answer":1},
  {"question":"Which of the following terms best describes the antagonism of leukotriene's bronchoconstrictor effect by terbutaline in a patient with asthma?","options":["Pharmacologic antagonist","Partial agonist","Physiologic antagonist","Chemical antagonist","Noncompetitive antagonist"],"answer":2},
  {"question":"If a drug was given by a constant infusion rate, which factor determines how long it will take to reach steady-state concentration?","options":["Apparent volume of distribution","Bioavailability","Clearance","Half-life","Infusion rate (mg of drug/min)"],"answer":3},
  {"question":"The FDA assigns the letters A, B, C, D, and X to drugs. To which does this classification apply?","options":["Amount of dosage reduction needed as serum creatinine clearances fall","Fetal risk when given to pregnant women","Amount of dosage reduction needed in presence of liver dysfunction","Relative margins of therapeutic index","The number of uses for a drug"],"answer":1},
  {"question":"Tolerance and drug resistance can be a consequence of:","options":["Change in receptors, loss of them or exhaustion of mediators","Increased receptor sensitivity","Decreased metabolic degradation","Decreased renal tubular secretion","Activation of a drug after hepatic 1st pass"],"answer":0},
  {"question":"Cholinergic stimulation causes:","options":["Urine retention","Bronchodilatation","Sweating","Tachycardia","Reduced gut motility"],"answer":2},
  {"question":"The following is correct about the action of sympathomimetics:","options":["Adrenaline has almost exclusively β-adrenoceptor agonist actions","Noradrenaline has an approximately equal mix of α- and β-adrenoceptor agonist actions","Salbutamol has predominantly α-adrenoceptor agonist actions","Phenylepherine has predominantly β-adrenoceptor agonist actions","Adrenaline acts on α-receptors as well as β-adrenoceptors."],"answer":4},
  {"question":"The statements about the action of sympathomimetics are correct EXCEPT:","options":["Adrenaline infusion causes rise in both systolic and diastolic blood pressure with tachycardia","Noradrenaline infusion causes rise in both systolic and diastolic blood pressure with bradycardia","Noradrenaline is given by i.m. injection.","Salbutamol causes fall of blood pressure with tachycardia","Phenylepherine causes rise of blood pressure with bradycardia"],"answer":2},
  {"question":"For the treatment of acute anaphylactic shock, adrenaline must be given by:","options":["Inhalation","Subcutaneous","Intravenous","Intramuscular","Intracardiac"],"answer":3},
  {"question":"Salbutamol can be used in the management of:","options":["Parkinson's disease","Bronchial asthma","Depression","Hypertension","Bradycardia"],"answer":1},
  {"question":"Nasal decongestants carry the risk of cerebral stroke in which condition:","options":["Arterial hypertension","Allergic rhinitis","Epistaxis","Benign prostatic hypertrophy","Sinusitis"],"answer":0},
  {"question":"The therapeutic action of beta-blockers in angina pectoris is primarily due to:","options":["Reduced production of catecholamines","Dilatation of the coronary vessels","Decreased myocardial oxygen requirement","Increased peripheral resistance","Increased sensitivity to catecholamines"],"answer":2},
  {"question":"Beta-blockers are contraindicated in bronchial asthma because:","options":["They produce bradycardia and fall in COP","They increase bronchial secretions","They decrease pulmonary blood flow","They increase airway resistance and narrowing","They inhibit the respiratory center and impair ventilation"],"answer":3},
  {"question":"Excessive bradycardia induced by beta-blockers is best treated by:","options":["Dopamine","Epinephrine","Isoprenaline","Neostigmine","Atropine"],"answer":4},
  {"question":"Essential tremors can be best decreased by which beta blocker?","options":["Atenolol","Propranolol","Betaxolol","Nebivolol","Bisoprolol"],"answer":1},
  {"question":"All the following are known contraindications for the use of atropine EXCEPT:","options":["Closed angle glaucoma","Senile prostatic enlargement","Paralytic ileus","Postpartum urine retention","Acute cystitis"],"answer":4},
  {"question":"Which of the following is the most likely complication of insulin therapy?","options":["Dilutional hyponatremia","Hypoglycemia","Increased bleeding tendency","Pancreatitis","Severe hypertension"],"answer":1},
  {"question":"A 24-year-old woman with type 1 diabetes wishes to try tight control. Which regimen is most appropriate?","options":["Morning injections of mixed insulin lispro and insulin aspart","Evening injections of mixed regular insulin and insulin glargine","Morning and evening injections of regular insulin, supplemented by small amounts of NPH insulin at mealtimes","Morning injections of insulin glargine, supplemented by small amounts of insulin lispro at mealtimes","Morning injection of NPH insulin and evening injection of regular insulin"],"answer":3},
  {"question":"Which drug produces a permanent reduction in thyroid activity?","options":["131 I (Radioactive Iodine)","Methimazole","Propylthiouracil","Thiocyanate","Thyroglobulin"],"answer":0},
  {"question":"Which of the following is an important effect of insulin?","options":["Increased conversion of amino acids into glucose","Increased gluconeogenesis","Increased glucose transport into cells","Inhibition of lipoprotein lipase","Stimulation of glycogenolysis"],"answer":2},
  {"question":"A patient using NSAIDs develops a bleeding ulcer. What drug is designed to selectively treat ulcers of this type?","options":["Famotidine","Bismuth","Aluminium hydroxide","Misoprostol","Muscarinic antagonists"],"answer":3},
  {"question":"Which antiulcer medication is contraindicated during pregnancy?","options":["Carbenoxolone","Aluminum hydroxide","Ranitidine","Misoprostol","Lansoperazole"],"answer":3},
  {"question":"Sildenafil should not be prescribed if the patient is also taking:","options":["An angiotensin-converting enzyme inhibitor","A beta-adrenergic blocker","A nitrovasodilator (e.g., nitroglycerin)","A statin-type antihypercholesterolemic drug","A potassium sparing diuretics"],"answer":2},
  {"question":"When glyceryl trinitrate tablets are prescribed for angina, the patient should be told:","options":["To take it to prevent pain","To take it at the onset of pain","That if throbbing headache occur the patient should take another","That if he feels faint he should stand up perfectly","To keep the tablet in a warm humid place"],"answer":1},
  {"question":"All anticoagulant drugs are correctly matched with their mechanism EXCEPT:","options":["Warfarin - inhibits synthesis of vitamin K-dependent clotting factors","Heparin - increases the activity of antithrombin III","Bivalirudin - selectively inhibits thrombin action","LMWH - selectively inhibit factor IX.","Fondaparinux - selectively inhibits factor X."],"answer":3},
  {"question":"The major untoward effect of heparin is:","options":["Bleeding","Crossing the placenta","Elevation of hepatic transaminases","Allergic reactions","Inhibition of aldosterone synthesis"],"answer":0},
  {"question":"All of the following statements are true EXCEPT:","options":["Heparin acts both in vitro and in vivo","Coumarin (warfarin) acts in vivo only","Heparin can enter the placenta causing fetal bleeding","Coumarin (warfarin) is considered a vitamin K antagonist","Heparin must be administered parenterally"],"answer":2},
  {"question":"All of the following are recognized adverse effects of heparin EXCEPT:","options":["Osteoporosis","Alopecia","Thrombocytopenia","Allergy","Fetal cleft palate."],"answer":4},
  {"question":"Protamine sulfate mechanism to stop heparin-induced bleeding:","options":["Degrades the heparin","Inactivates antithrombin","Activates the coagulation cascade","Activates tissue-plasminogen activator","Ionically combines with heparin."],"answer":4},
  {"question":"Absorption of iron:","options":["Is greater in anemic man than in normal one","Is decreased by ascorbic acid","Is more efficient when it is in ferric form","Takes place mostly in the ileum","Is enhanced by co-administration of desferroxamine"],"answer":0},
  {"question":"In the treatment of iron deficiency anemia:","options":["Therapy with iron should last for 6 months to replenish iron stores","Parenteral iron is usually preferred than oral iron","The patient is advised to take oral iron on an empty stomach.","Black stool is a strong indication for discontinuation of oral iron.","Metabolic alkalosis is the major feature of acute iron toxicity"],"answer":2},
  {"question":"Vitamin B12:","options":["Is normally absorbed in the upper small intestine","Therapy by mouth is the first choice in pernicious anemia","Is good trial therapy in undiagnosed anemias","Its deficiency can lead to anemia and neurological symptoms","Is the first choice for the treatment of aplastic anemia."],"answer":3},
  {"question":"Which of the following is side effect of cortisone:","options":["increased blood glucose","increased blood pressure","osteoporosis","all of the above"],"answer":3},
  {"question":"All of the following are antihypertensive drugs except:","options":["beta blockers","alpha blockers","nitrates","captopril"],"answer":2},
  {"question":"Which of the following is used in heart failure:","options":["morphine","cortisone","aspirin","digitalis"],"answer":3},
  {"question":"Which of the following is indication of atropine:","options":["preanaesthetic","heart failure","hypertension","ischemia"],"answer":0},
  {"question":"Which of the following is indication of perazosin:","options":["hypertension","prostatic enlargement","all","none"],"answer":2},
  {"question":"Which of the following is indication of corticosteroids:","options":["hypertension","diabetes","anti inflammatory","osteoporosis"],"answer":2},
  {"question":"Gastric lavage means:","options":["stomach wash","stomach feeding","stomach resection","non of the above"],"answer":0},
  {"question":"Adrenaline is the drug of choice in treating:","options":["anaphylactic shock","septic shock","neurogenic shock","hypovolemic shock"],"answer":0},
  {"question":"Atropine side effect includes:","options":["blurred vision","dry mouth","urine retention","all of the above"],"answer":3},
  {"question":"Which of the following drugs used to treat traumatic epistaxis:","options":["perazosin","adrenaline","atropine","phenylephrine"],"answer":1},
  {"question":"Which of the following drugs used in treating heart failure:","options":["propranolol","diphenhydramine","digitalis","carbimazole"],"answer":2},
  {"question":"Adrenaline is added to local anesthesia because:","options":["decrease side effects of local anaesthesia","increase elimination of local anaesthesia","increase duration of action of local anaesthesia","non of the above"],"answer":2},
  {"question":"Which of the following is safe contraception during lactation:","options":["combined pills","estrogen only pills","progesterone only pills","all of the above"],"answer":2},
  {"question":"Atropine is added to preanaesthetic medications because:","options":["decrease all body secretions","inhibit respiratory center","increase heart rate","increase urine volume"],"answer":0},
  {"question":"Which drug is preferred in treating hypertension with prostatic enlargement?","options":["adrenaline","propranolol","atropine","perazosin"],"answer":3},
  {"question":"Which of the following is anticoagulant both in vivo and in vitro:","options":["warfarin","heparin","aspirin small dose","clopidogrel"],"answer":1},
  {"question":"Which is the most dangerous complication of insulin:","options":["hypoglycemia","allergy","lipodystrophy","hypokalemia"],"answer":0},
  {"question":"All of the following are phase 1 metabolism except:","options":["oxidation","hydrolysis","reduction","glucuronidation"],"answer":3},
  {"question":"The amount of drug reaching systemic circulation is called:","options":["first pass metabolism","drug distribution","bioavailability","drug half life"],"answer":2}
];
let current=0,answers={},bank=[];const app=document.getElementById('app');
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function home(){current=0;answers={};app.innerHTML=`<section class="card home"><h1>Pharmacology Quiz - Part 2</h1><p class="muted">${QUESTIONS.length} MCQ questions</p><button class="btn primary" onclick="start(20)">20 questions</button><button class="btn primary" onclick="start('all')">All questions</button></section>`}
function start(count){current=0;answers={};const pool=shuffle(QUESTIONS);bank=count==='all'?pool:pool.slice(0,Math.min(Number(count),pool.length));render()}
function render(){const q=bank[current];const ans=answers[current];const done=Object.keys(answers).length;app.innerHTML=`<section class="card"><div class="row"><div><div class="title">Pharmacology Part 2</div><div class="muted">Question ${current+1} of ${bank.length}</div></div><div class="muted">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${Math.round(done/bank.length*100)}%"></div></div><div class="q">${esc(q.question)}</div><div class="opts">${q.options.map((o,i)=>`<div class="opt${ans?(ans.idx===i?(ans.correct?' correct':' wrong'):(i===q.answer?' correct':'')):''}" onclick="check(${i})">${esc(o)}</div>`).join('')}</div>${ans?`<div style="margin-top:12px">${ans.correct?'✅ Correct!':'❌ Wrong. Correct answer highlighted.'}</div>`:''}</section><div style="display:flex;gap:8px;margin-top:12px;justify-content:space-between"><button class="btn" onclick="home()" ${current>0?'':'disabled'}>Home</button><div>${current>0?`<button class="btn" onclick="back()">← Back</button>`:''}${current<bank.length-1&&ans?`<button class="btn primary" onclick="next()">Next →</button>`:''}${current===bank.length-1&&ans?`<button class="btn green" onclick="finish()">Finish</button>`:''}</div></div>`}
function check(idx){if(answers[current])return;answers[current]={idx,correct:idx===bank[current].answer};render()}
function back(){if(current>0){current--;render()}}
function next(){if(current<bank.length-1){current++;render()}}
function finish(){const s=score(),t=Object.keys(answers).length;app.innerHTML=`<section class="card score"><h1>Finished!</h1><div class="score-big">${s} / ${t}</div><p class="muted">${Math.round(s/t*100)}%</p><button class="btn primary" onclick="home()">Back to Home</button></section>`}
home();
</script>
</body>
</html>
