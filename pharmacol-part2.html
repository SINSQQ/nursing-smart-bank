<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pharmacology Revision Bank Part 2</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}.wrap{max-width:860px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:16px}.home{text-align:center;padding:34px 16px}.home h1{margin:0 0 8px;color:#244c85;font-size:26px}.muted{color:#5f6876;font-size:14px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{font-weight:700;color:#244c85}.bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:12px 0}.fill{height:100%;background:#147a5c;transition:width .3s}.q{font-size:18px;line-height:1.5;margin:12px 0}.opts{display:grid;gap:8px}.opt{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;text-align:left;cursor:pointer;line-height:1.45;font:inherit}.opt:hover{background:#f4f7fb;border-color:#244c85}.opt.correct{background:#e9f6f1;border-color:#147a5c;color:#0b5b43}.opt.wrong{background:#fff0f0;border-color:#b32d2e;color:#8a2020}.btn{border:1px solid #cbd3df;border-radius:6px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block;margin:4px}.btn.primary{background:#244c85;border-color:#244c85;color:#fff}.btn.green{background:#147a5c;border-color:#147a5c;color:#fff}.btn.orange{background:#e67e22;border-color:#e67e22;color:#fff}.score{text-align:center;padding:34px 16px}.score-big{font-size:44px;font-weight:700;color:#147a5c;margin:8px 0}.review{display:grid;gap:10px;margin-top:16px;text-align:left}.review-item{border:1px solid #d9deea;border-radius:8px;padding:12px;line-height:1.45}.review-item.was-wrong{border-left:4px solid #b32d2e}
  </style>
</head>
<body>
<main class="wrap"><div id="app"></div></main>
<script>
const QUESTIONS=[
  {"question":"The following statements are true for drug's therapeutic index EXCEPT:","options":["It is the relation between the lethal dose in 50% of animals to the curative dose in 50% of them","The lower the TI, the safer will be the drug","It should be done to any drug before it's being approved for human use","For theoretically useful drugs, it must be greater than 1","It could be applied in animal testing"],"answer":1},
  {"question":"A drug is said to be reversible antagonist when:","options":["It blocks the receptors by making covalent bonds with them","The duration of blockade is too long","Increasing the dose of the agonist will reverse the block","The response curve of the agonist in presence of this drug is not parallel to that of the agonist alone","Termination of the drug effect depends on synthesis of new receptors"],"answer":2},
  {"question":"The interaction that may occur between acidic and basic drugs is called:","options":["Chemical antagonism","Physical antagonism","Physiological antagonism","Biological antagonism","Receptor antagonism"],"answer":0},
  {"question":"Hemolysis that may occur with sulfonamides therapy may be due to:","options":["Pseudocholinestrase deficiency","Methemoglobin reductase deficiency","G-6-PD deficiency","Vitamin K epoxide reductase deficiency","Monoamine oxidase deficiency"],"answer":2},
  {"question":"Failure of some children with rickets to respond to therapeutic doses of vitamin D is most likely to be due to:","options":["Differences in sex","Differences in body weight","Genetic variation","Tolerance","Intolerance"],"answer":2},
  {"question":"Which of the following drugs will be absorbed to the LEAST extent in the stomach:","options":["Ampicillin (pKa = 2.5)","Aspirin (pKa = 3.5)","Warfarin (pKa = 5.0)","Phenobarbital (pKa = 7.4)","Propranolol (pKa = 9.4)"],"answer":4},
  {"question":"The following statements are true for Vd of drugs EXCEPT:","options":["It can exceed the volume of water in the body","Drugs with large Vd can be removed by dialysis","Would be expected to be 5L if the drug is confined to the blood","Highly lipid-soluble drugs would be expected to have large Vd","It can help in the calculation of the total amount of the drug in the body"],"answer":1},
  {"question":"The bioavailability of a drug:","options":["Is defined as the actual blood concentration required to produce a pharmacological effect","Will be unaffected by changes in formulation","May be affected by liver damage","Must be 100% for a drug given by mouth and is completely absorbed","Is a term applied only to oral administration"],"answer":2},
  {"question":"All the following are phase I biotransformation reactions EXCEPT:","options":["Sulfate conjugation","Xanthine oxidation","Nitroreduction","Ester hydrolysis","Oxidative deamination"],"answer":0},
  {"question":"Metabolism (biotransformation) of drugs can lead to all the following results EXCEPT:","options":["Conversion of active compound into inactive metabolites","Conversion of active compound into active metabolites","Conversion of inactive compound into active metabolites","Conversion of non-toxic compound into toxic metabolites","Conversion of water-soluble compound into lipid-soluble metabolites"],"answer":4},
  {"question":"Drugs X and Y have the same mechanism of diuretic action. Drug X in a dose of 5mg produces the same magnitude of diuresis as 500 mg of drug Y. This suggests that:","options":["Drug Y is less efficacious than drug X","Drug X is about 100 times more potent than drug Y.","Toxicity of drug X is less than that of drug Y.","Drug X is a safer drug than drug Y.","Drug X will have a shorter duration of action than drug Y because less of drug X is present for a given effect."],"answer":1},
  {"question":"Which of the following terms best describes the antagonism of leukotriene's bronchoconstrictor effect (mediated at leukotriene receptors) by terbutaline (acting at adrenoceptors) in a patient with asthma?","options":["Pharmacologic antagonist.","Partial agonist.","Physiologic antagonist.","Chemical antagonist.","Noncompetitive antagonist."],"answer":2},
  {"question":"Which of the following provides information about the largest response a drug can produce, regardless of dose?","options":["Drug potency","Maximal efficacy","Mechanism of receptor action","Therapeutic index","Therapeutic window"],"answer":1},
  {"question":"If two drugs with the same effect, taken together, produce an effect that is equal in magnitude to the sum of the effects of the drugs given individually, it is called as:","options":["Antagonism","Potentiation","Synergism","Additive effect","Supersensitivity"],"answer":3},
  {"question":"A pro-drug is:","options":["The prototype member of a class of drugs","The oldest member of a class of drugs","An inactive drug that is transformed in the body to an active metabolite","A drug that is stored in the body tissues and is then gradually released in the circulation","Ionized drug trapped in breast milk"],"answer":2},
  {"question":"Half-life of a drug may be helpful to determine:","options":["Elimination of the drug","Level of absorption","Rate of absorption through the GIT","Time to reach the steady state","Distribution into body systems."],"answer":3},
  {"question":"For intravenous (IV) dosages, what is the bioavailability assumed to be?","options":["0%","25%","50%","75%","100%"],"answer":4},
  {"question":"Which of the following can produce a therapeutic response? A drug that is:","options":["Bound to plasma albumin","Concentrated in the bile","Concentrated in the urine","Not absorbed from the GI tract","Unbound to plasma proteins"],"answer":4},
  {"question":"Which of the following can be used as a relative indicator of the margin of safety of a drug?","options":["T.I.","LD50","ED50","EC50","TD50"],"answer":0},
  {"question":"Which route of administration is most likely to subject a drug to first pass metabolism?","options":["Intravenous","Sublingual","Oral","Inhalation","Intramuscular"],"answer":2},
  {"question":"If a drug was given by a constant infusion rate, which of the following factors determines how long it will take for the drug to reach a steady-state concentration (Cpss) in the blood?","options":["Apparent volume of distribution","Bioavailability","Clearance","Half-life","Infusion rate (mg of drug/min)"],"answer":3},
  {"question":"The FDA assigns the letters A, B, C, D, and X to drugs approved for human use. To which of the following does this classification apply?","options":["Amount of dosage reduction needed as serum creatinine clearances fall","Fetal risk when given to pregnant women","Amount of dosage reduction needed in presence of liver dysfunction","Relative margins of therapeutic index","The number of uses for a drug"],"answer":1},
  {"question":"Tolerance and drug resistance can be a consequence of:","options":["Change in receptors, loss of them or exhaustion of mediators","Increased receptor sensitivity","Decreased metabolic degradation","Decreased renal tubular secretion","Activation of a drug after hepatic 1st pass"],"answer":0},
  {"question":"Cholinergic stimulation causes:","options":["Urine retention","Bronchodilatation","Sweating","Tachycardia","Reduced gut motility"],"answer":2},
  {"question":"The following is correct about the action of sympathomimetics:","options":["Adrenaline has almost exclusively β-adrenoceptor agonist actions","Noradrenaline has an approximately equal mix of a- and β-adrenoceptor agonist actions","Salbutamol has predominantly α-adrenoceptor agonist actions","Phenylepherine has predominantly β-adrenoceptor agonist actions","Adrenaline acts on a-receptors as well as β-adrenoceptors."],"answer":4},
  {"question":"The following statements about the action of sympathomimetics are correct EXCEPT:","options":["Adrenaline infusion causes rise in both systolic and diastolic blood pressure with tachycardia","Noradrenaline infusion causes rise in both systolic and diastolic blood pressure with bradycardia","Noradrenaline is given by i.m. injection.","Salbutamol causes fall of blood pressure with tachycardia","Phenylepherine causes rise of blood pressure with bradycardia"],"answer":2},
  {"question":"For the treatment of acute anaphylactic shock, adrenaline must be given by the following route:","options":["Inhalation","Subcutaneous","Intravenous","Intramuscular","Intracardiac"],"answer":3},
  {"question":"Salbutamol can be used in the management of:","options":["Parkinson's disease","Bronchial asthma","Depression","Hypertension","Bradycardia"],"answer":1},
  {"question":"Nasal decongestants carry the risk of cerebral stroke in which of the following conditions:","options":["Arterial hypertension","Allergic rhinitis","Epistaxis","Benign prostatic hypertrophy","Sinusitis"],"answer":0},
  {"question":"The therapeutic action of beta-blockers in angina pectoris is believed to be primarily due to:","options":["Reduced production of catecholamines","Dilatation of the coronary vessels","Decreased myocardial oxygen requirement","Increased peripheral resistance","Increased sensitivity to catecholamines"],"answer":2},
  {"question":"Beta-blockers are contraindicated in bronchial asthma because:","options":["They produce bradycardia and fall in COP","They increase bronchial secretions","They decrease pulmonary blood flow","They increase airway resistance and narrowing","They inhibit the respiratory center and impair ventilation"],"answer":3},
  {"question":"All the following are known contraindications for the use of atropine EXCEPT:","options":["Closed angle glaucoma","Senile prostatic enlargement","Paralyticileus","Postpartum urine retention","Acute cystitis"],"answer":4},
  {"question":"A muscarinic blocker that is used as a standard treatment of motion sickness is:","options":["Pirenzepine","Oxybutynine","Atropine","Scopolamine","Tolterodine"],"answer":3},
  {"question":"Which of the following is the most likely complication of insulin therapy?","options":["Dilutional hyponatremia","Hypoglycemia","Increased bleeding tendency","Pancreatitis","Severe hypertension"],"answer":1},
  {"question":"A 24-year-old woman with type 1 diabetes wishes to try tight control of her diabetes to improve her long-term prognosis. Which of the following regimens is most appropriate?","options":["Morning injections of mixed insulin lispro and insulin aspart","Evening injections of mixed regular insulin and insulin glargine","Morning and evening injections of regular insulin, supplemented by small amounts of NPH insulin at mealtimes","Morning injections of insulin glargine, supplemented by small amounts of insulin lispro at mealtimes","Morning injection of NPH insulin and evening injectionof regular insulin"],"answer":3},
  {"question":"Which of the following is side effect of cortisone:","options":["increased blood glucose","increased blood pressure","osteoporosis","all of the above"],"answer":3},
  {"question":"All of the following are antihypertensive drugs except:","options":["beta blockers","alpha blockers","nitrates","captopril"],"answer":2},
  {"question":"Which of the following is used in heart failure:","options":["morphine","cortisone","aspirin","digitalis"],"answer":3},
  {"question":"Which of the following is indication of atropine:","options":["preanaesthetic","heart failure","hypertension","ischemia"],"answer":0},
  {"question":"Which of the following is indication of perazosin:","options":["hypertension","prostatic enlargement","all","none"],"answer":2},
  {"question":"Which of the following is indication of corticosteroids:","options":["hypertension","diabetes","anti inflammatory","osteoporosis"],"answer":2},
  {"question":"Gastric lavage means:","options":["stomach wash","stomach feeding","stomach resection","non of the above"],"answer":0},
  {"question":"Adrenaline is the drug of choice in treating:","options":["anaphylactic shock","septic shock","neurogenic shock","hypovolemic shock"],"answer":0},
  {"question":"Atropine side effect includes:","options":["blurred vision","dry mouth","urine retention","all of the above"],"answer":3},
  {"question":"All of the following anticoagulant drugs are correctly matched with their mechanism of action EXCEPT:","options":["Warfaine- inhibits synthesis of vitamin K-dependent clotting factors in the liver","Heparin increases the activity of antithrombin III in plasma","Bivalirudin - selectively inhibits thrombin action","LMWH-selectively inhibit factor IX.","Fondaparinux - selectively inhibits factor X."],"answer":3},
  {"question":"The major untoward effect of heparin is:","options":["Bleeding","Crossing the placenta","Elevation of hepatic transaminases","Allergic reactions","Inhibition of aldosterone synthesis"],"answer":0},
  {"question":"All of the following statements are true EXCEPT:","options":["Heparin acts both in vitro and in vivo","Coumarin (warfarin) acts in vivo only","Heparin can enter the placenta causing fetal bleeding","Coumarin (warfarin) is considered a vitamin K antagonist","Heparin must be administered parenterally"],"answer":2},
  {"question":"All of the following are recognized adverse effects of heparin EXCEPT:","options":["Osteoporosis.","Alopecia.","Thrombocytopenia.","Allergy","Fetal cleft palate."],"answer":4},
  {"question":"Protamine sulfate administered intravenously to stop heparin-induced bleeding. The mechanism of protamine is:","options":["Degrades the heparin.","Inactivates antithrombin.","Activates the coagulation cascade.","Activates tissue-plasminogen activator.","Jonically combines with heparin."],"answer":4},
  {"question":"Absorption of iron:","options":["Is greater in anemic man than in normal one","Is decreased by ascorbic acid.","Is more efficient when it is in ferric form","Takes place mostly in the ileum.","Is enhanced by co-administration of desferroxamine"],"answer":0},
  {"question":"Which of the following drugs used to treat traumatic epistaxis:","options":["perazosin","adrenaline","atropine","phenylepherine"],"answer":1},
  {"question":"Which of the following drugs used in treating heart failure:","options":["propranolol","diphenhydramine","digitalis","carbimazole"],"answer":2},
  {"question":"adrenaline is added to local anesthesia because:","options":["decrease side effects of local anaesthesia","increase elimination of local anaesthesia","increase duration of action of local anaesthesia","non of the above"],"answer":2},
  {"question":"which of the following is safe contraception during lactation:","options":["combined pills","estrogen only pills","progesterone only pills","all of the above"],"answer":2},
  {"question":"atropine is added to preanaesthetic medications because:","options":["decrease all body secretions","inhibit respiratory center","increase heart rate","increase urine volume"],"answer":0},
  {"question":"Which of the following drugs is preferred in treating hypertension with prostatic enlargement?","options":["adrenaline","propranolol","atropine","perazosin"],"answer":3},
  {"question":"Which of the following is anticoagulant both in vivo and in vitro:","options":["warfarin","heparin","aspirin small dose","clopidogrel"],"answer":1},
  {"question":"which of the following is the most dangerous complication of insulin:","options":["hypoglycemia","allergy","lipodystrophy","hypokalemia"],"answer":0},
  {"question":"all of the following are phase 1 metabolism except:","options":["oxidation","hydrolysis","reduction","glucuronidation"],"answer":3},
  {"question":"the amount of drug reaching systemic circulation is called:","options":["first pass metabolism","drug distribution","bioavailability","drug half life"],"answer":2}
];
let current=0,answers={},bank=[];const app=document.getElementById('app');
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function home(){current=0;answers={};bank=shuffle(QUESTIONS);render()}
function render(){const q=bank[current];const ans=answers[current];const done=Object.keys(answers).length;app.innerHTML=`<section class="card"><div class="row"><div><div class="title">💊 Pharmacology Part 2</div><div class="muted">Question ${current+1} of ${bank.length}</div></div><div class="muted">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${Math.round(done/bank.length*100)}%"></div></div><div class="q">${esc(q.question)}</div><div class="opts">${q.options.map((o,i)=>`<div class="opt${ans?(ans.idx===i?(ans.correct?' correct':' wrong'):(i===q.answer?' correct':'')):''}" onclick="check(${i})">${esc(o)}</div>`).join('')}</div>${ans?`<div style="margin-top:12px">${ans.correct?'✅ Correct!':'❌ Wrong. Correct answer highlighted.'}</div>`:''}</section><div style="display:flex;gap:8px;margin-top:12px;justify-content:between"><button class="btn" onclick="home()">🏠 Home</button>${current<bank.length-1&&ans?`<button class="btn primary" onclick="next()">Next →</button>`:''}${current===bank.length-1&&ans?`<button class="btn green" onclick="finish()">Finish ✓</button>`:''}</div></div>`}
function check(idx){if(answers[current])return;answers[current]={idx,correct:idx===bank[current].answer};render()}
function next(){if(current<bank.length-1){current++;render()}}
function finish(){
  const s=score(),t=bank.length,wrong=Object.values(answers).filter(x=>!x.correct).length;
  app.innerHTML=`<section class="card score"><h1>🏆 Finished!</h1><div class="score-big">${s} / ${t}</div><div style="display:flex;gap:8px;justify-content:center"><button class="btn primary" onclick="home()">🏠 Retry</button></div></section>`}
home();
</script>
</body>
</html>
