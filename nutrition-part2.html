question":"True or False: Soft diet is recommended and getting enough fluid in patient with esophageal varices .","options":["True","False"],"answer":0,"id":"q58"},{"type":"Scientific Terms","question":"Scientific term: EER (Estimated Energy Requirement)","options":["Serve as a reminder to keep nutrient intakes less than amounts that increase the risk of toxicity.","This nutrient deficiency may depress appetite and sense of taste in older adults. Medications interfere with absorption.","Energy from the three energy-yielding nutrients contribution to the total energy intake, vary in relation to one another.","The recommended average dietary energy intake (kcalories per day) that will maintain energy balance in a person who has a healthy body weight and level of physical activity."],"answer":3,"id":"q59"},{"type":"Scientific Terms","question":"Scientific term: AMDR (Acceptable Macronutrient Distribution Ranges)","options":["Serve as a reminder to keep nutrient intakes less than amounts that increase the risk of toxicity.","This nutrient deficiency may depress appetite and sense of taste in older adults. Medications interfere with absorption.","Recommendations for Nutrient values apply to healthy people and may not be appropriate for people with diseases that increase or decrease nutrient needs.","Energy from the three energy-yielding nutrients contribution to the total energy intake, vary in relation to one another."],"answer":3,"id":"q60"},{"type":"Scientific Terms","question":"Scientific term: UL (Tolerable Upper Intake Level)","options":["This nutrient deficiency may depress appetite and sense of taste in older adults. Medications interfere with absorption.","This nutrient deficiency caused by Atrophic gastritis may cause neurological damage in older adults.","Serve as a reminder to keep nutrient intakes less than amounts that increase the risk of toxicity.","Energy from the three energy-yielding nutrients contribution to the total energy intake, vary in relation to one another."],"answer":2,"id":"q61"},{"type":"Scientific Terms","question":"Scientific term: Zinc Deficiency","options":["Serve as a reminder to keep nutrient intakes less than amounts that increase the risk of toxicity.","Recommendations for Nutrient values apply to healthy people and may not be appropriate for people with diseases that increase or decrease nutrient needs.","This nutrient deficiency may depress appetite and sense of taste in older adults. Medications interfere with absorption.","This nutrient deficiency caused by Atrophic gastritis may cause neurological damage in older adults."],"answer":2,"id":"q62"},{"type":"Scientific Terms","question":"Scientific term: DRI (Dietary Reference Intakes)","options":["Recommendations for Nutrient values apply to healthy people and may not be appropriate for people with diseases that increase or decrease nutrient needs.","It is the process of planning and scheduling intake of meals for general or specific individual requirements.","The recommended average dietary energy intake (kcalories per day) that will maintain energy balance in a person who has a healthy body weight and level of physical activity.","This nutrient deficiency may depress appetite and sense of taste in older adults. Medications interfere with absorption."],"answer":0,"id":"q63"},{"type":"Scientific Terms","question":"Scientific term: Meal Planning","options":["This nutrient deficiency may depress appetite and sense of taste in older adults. Medications interfere with absorption.","The recommended average dietary energy intake (kcalories per day) that will maintain energy balance in a person who has a healthy body weight and level of physical activity.","It is the process of planning and scheduling intake of meals for general or specific individual requirements.","Energy from the three energy-yielding nutrients contribution to the total energy intake, vary in relation to one another."],"answer":2,"id":"q64"},{"type":"Scientific Terms","question":"Scientific term: Vitamin B12 Deficiency","options":["This nutrient deficiency caused by Atrophic gastritis may cause neurological damage in older adults.","The recommended average dietary energy intake (kcalories per day) that will maintain energy balance in a person who has a healthy body weight and level of physical activity.","Energy from the three energy-yielding nutrients contribution to the total energy intake, vary in relation to one another.","Recommendations for Nutrient values apply to healthy people and may not be appropriate for people with diseases that increase or decrease nutrient needs."],"answer":0,"id":"q65"},{"type":"Scientific Terms","question":"Scientific term: AI (Adequate Intake)","options":["The recommended average dietary energy intake (kcalories per day) that will maintain energy balance in a person who has a healthy body weight and level of physical activity.","This nutrient deficiency may depress appetite and sense of taste in older adults. Medications interfere with absorption.","It is the process of planning and scheduling intake of meals for general or specific individual requirements.","Used when there is insufficient scientific evidence to determine RDA for a nutrient."],"answer":3,"id":"q66"},{"type":"Matching","question":"Match: GLOW foods","options":["Foods rich in carbohydrates and fats .","Foods rich in minerals and vitamins . They are essential for promoting body immunity and regulatory functions.","The process of digestion and absorption of foods and the body's use of it for growth and replacement of cells.","live microbiological dietary supplements with beneficial effects on the host beyond their nutritional properties"],"answer":1,"id":"q67"},{"type":"Matching","question":"Match: Termic effect of food","options":["live microbiological dietary supplements with beneficial effects on the host beyond their nutritional properties","The energy needed to digest and absorb a food.","The minimum energy needed by the body for vital functions when at rest and awake.","The food and beverages you normally eat and drink."],"answer":1,"id":"q68"},{"type":"Matching","question":"Match: Nutrition","options":["The process of digestion and absorption of foods and the body's use of it for growth and replacement of cells.","Foods rich in minerals and vitamins . They are essential for promoting body immunity and regulatory functions.","Carbohydrates, fats, protein, vitamins, minerals, and water.","The minimum energy needed by the body for vital functions when at rest and awake."],"answer":0,"id":"q69"},{"type":"Matching","question":"Match: GO foods","options":["combination of pro- and prebiotics.","Foods rich in minerals and vitamins . They are essential for promoting body immunity and regulatory functions.","live microbiological dietary supplements with beneficial effects on the host beyond their nutritional properties","Foods rich in carbohydrates and fats ."],"answer":3,"id":"q70"},{"type":"Matching","question":"Match: Diet","options":["Foods rich in carbohydrates and fats .","The energy needed to digest and absorb a food.","stimulate the growth and activity of beneficial bacteria within the intestinal flora.","The food and beverages you normally eat and drink."],"answer":3,"id":"q71"},{"type":"Matching","question":"Match: Food","options":["anything liquid, semi-solid or solid which contains nutrients and energy and when taken or eaten nourishes the body","Carbohydrates, fats, protein, vitamins, minerals, and water.","A measure of the energy in food, specifically the energy yielding nutrients","The nourishing substances in food that provide energy and promote the growth and maintenance of the body"],"answer":0,"id":"q72"},{"type":"Matching","question":"Match: GROW foods","options":["live microbiological dietary supplements with beneficial effects on the host beyond their nutritional properties","stimulate the growth and activity of beneficial bacteria within the intestinal flora.","A measure of the energy in food, specifically the energy yielding nutrients","Foods rich in protein .These foods help to maintain life and promote growth."],"answer":3,"id":"q73"},{"type":"Matching","question":"Match: Nutrients","options":["The nourishing substances in food that provide energy and promote the growth and maintenance of the body","combination of pro- and prebiotics.","is a measure of the nutrients provided per calories of a food","anything liquid, semi-solid or solid which contains nutrients and energy and when taken or eaten nourishes the body"],"answer":0,"id":"q74"},{"type":"Matching","question":"Match: Classes of nutrients","options":["Foods rich in carbohydrates and fats .","The food and beverages you normally eat and drink.","Carbohydrates, fats, protein, vitamins, minerals, and water.","The energy needed to digest and absorb a food."],"answer":2,"id":"q75"},{"type":"Matching","question":"Match: Basal metabolism","options":["Foods rich in minerals and vitamins . They are essential for promoting body immunity and regulatory functions.","Foods rich in carbohydrates and fats .","live microbiological dietary supplements with beneficial effects on the host beyond their nutritional properties","The minimum energy needed by the body for vital functions when at rest and awake."],"answer":3,"id":"q76"},{"type":"Matching","question":"Match: Nutrient density","options":["The minimum energy needed by the body for vital functions when at rest and awake.","Foods rich in protein .These foods help to maintain life and promote growth.","anything liquid, semi-solid or solid which contains nutrients and energy and when taken or eaten nourishes the body","is a measure of the nutrients provided per calories of a food"],"answer":3,"id":"q77"},{"type":"Matching","question":"Match: Prebiotics","options":["The process of digestion and absorption of foods and the body's use of it for growth and replacement of cells.","Foods rich in carbohydrates and fats .","anything liquid, semi-solid or solid which contains nutrients and energy and when taken or eaten nourishes the body","stimulate the growth and activity of beneficial bacteria within the intestinal flora."],"answer":3,"id":"q78"},{"type":"Matching","question":"Match: Kilocalorie","options":["is a measure of the nutrients provided per calories of a food","A measure of the energy in food, specifically the energy yielding nutrients","The food and beverages you normally eat and drink.","Foods rich in minerals and vitamins . They are essential for promoting body immunity and regulatory functions."],"answer":1,"id":"q79"},{"type":"Matching","question":"Match: Probiotics","options":["live microbiological dietary supplements with beneficial effects on the host beyond their nutritional properties","A measure of the energy in food, specifically the energy yielding nutrients","The process of digestion and absorption of foods and the body's use of it for growth and replacement of cells.","Carbohydrates, fats, protein, vitamins, minerals, and water."],"answer":0,"id":"q80"},{"type":"Matching","question":"Match: Synbiotics","options":["combination of pro- and prebiotics.","Foods rich in minerals and vitamins . They are essential for promoting body immunity and regulatory functions.","A measure of the energy in food, specifically the energy yielding nutrients","live microbiological dietary supplements with beneficial effects on the host beyond their nutritional properties"],"answer":0,"id":"q81"}];
let current=0,answers={},bank=[];
const app=document.getElementById('app');
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function home(){current=0;answers={};app.innerHTML=`<section class="card home"><h1>Nutrition Quiz - Part 2</h1><p class="muted">${QUESTIONS.length} questions: MCQ, True/False, scientific terms, and matching.</p><button class="btn primary" onclick="start(20)">20 questions</button><button class="btn primary" onclick="start(50)">50 questions</button><button class="btn green" onclick="start('all')">All questions</button><br><a class="btn" href="nutrition-quiz.html">Part 1</a></section>`}
function start(count){current=0;answers={};const pool=shuffle(QUESTIONS);bank=count==='all'?pool:pool.slice(0,Math.min(Number(count),pool.length));render()}
function render(){const q=bank[current];if(!q){finish();return}const ans=answers[q.id];const done=Object.keys(answers).length;app.innerHTML=`<section class="card"><div class="row"><div><div class="title">Nutrition Quiz - Part 2</div><div class="muted">${q.type} | Question ${current+1} of ${bank.length}</div></div><div class="muted">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${Math.round(done/bank.length*100)}%"></div></div><div class="q">${esc(q.question)}</div><div class="opts">${q.options.map((o,i)=>option(q,i,ans)).join('')}</div>${ans?feedback(q,ans):''}<div class="nav"><button class="btn" onclick="prev()" ${current===0?'disabled':''}>Previous</button><button class="btn" onclick="home()">Home</button><button class="btn primary" onclick="next()" ${ans?'':'disabled'}>Next</button></div></section>`}
function option(q,i,ans){let cls='opt';if(ans&&i===q.answer)cls+=' correct';if(ans&&ans.choice===i&&i!==q.answer)cls+=' wrong';return `<button class="${cls}" onclick="choose(${i})" ${ans?'disabled':''}><b>${String.fromCharCode(65+i)}.</b> ${esc(q.options[i])}</button>`}
function choose(i){const q=bank[current];answers[q.id]={choice:i,correct:i===q.answer};render()}
function feedback(q,ans){return `<div class="feedback ${ans.correct?'ok':'err'}">${ans.correct?'Correct':'Wrong'} - correct answer: <b>${String.fromCharCode(65+q.answer)}. ${esc(q.options[q.answer])}</b></div>`}
function next(){if(!answers[bank[current].id])return;current++;render()}
function prev(){current=Math.max(0,current-1);render()}
function finish(){const wrong=bank.filter(q=>!answers[q.id]||!answers[q.id].correct);app.innerHTML=`<section class="card score"><h1>Quiz complete</h1><div class="score-big">${score()}/${bank.length}</div><p class="muted">${Math.round(score()/bank.length*100)||0}% correct</p><div class="nav" style="justify-content:center"><button class="btn primary" onclick="start(bank.length)">Restart</button><button class="btn green" onclick="retryWrong()" ${wrong.length?'':'disabled'}>Wrong only</button><button class="btn" onclick="home()">Home</button></div><div class="review">${wrong.map(q=>`<div class="review-item"><b>${esc(q.type)}</b><br>${esc(q.question)}<br><span class="muted">Correct: ${esc(q.options[q.answer])}</span></div>`).join('')}</div></section>`}
function retryWrong(){bank=shuffle(bank.filter(q=>!answers[q.id]||!answers[q.id].correct));current=0;answers={};render()}
home();
</script>
