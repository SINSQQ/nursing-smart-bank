<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Waled Reda CodePen</title>
  <style>
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    .card{background:#fff;border:1px solid #d9deea;border-radius:12px;padding:16px}
    .hero{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap;margin-bottom:16px}
    h1{margin:0;color:#244c85;font-size:28px}
    p{margin:8px 0 0;line-height:1.6;color:#445065}
    .actions{display:flex;gap:8px;flex-wrap:wrap}
    .btn{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block}
    .btn.primary{background:#244c85;border-color:#244c85;color:#fff}
    .frame-wrap{margin-top:16px;border:1px solid #d9deea;border-radius:12px;overflow:hidden;background:#fff}
    .note{margin-top:12px;font-size:13px;color:#5f6876}
    @media (max-width: 640px){
      h1{font-size:24px}
      .btn{width:100%;text-align:center}
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="hero">
        <div>
          <h1>CodePen Mirror</h1>
          <p>Embedded page for <strong>Waled Reda</strong>'s CodePen inside this GitHub Pages site.</p>
        </div>
        <div class="actions">
          <a class="btn" href="index.html">Home</a>
          <a class="btn primary" href="https://codepen.io/Waled-Reda/pen/dPOEQRX" target="_blank" rel="noopener noreferrer">Open on CodePen</a>
        </div>
      </div>
      <div class="frame-wrap">
        <p class="codepen" data-height="900" data-default-tab="result" data-slug-hash="dPOEQRX" data-pen-title="CodePen Mirror" data-user="Waled-Reda" style="height:900px;box-sizing:border-box;display:flex;align-items:center;justify-content:center;border:0;margin:0;padding:1em;">
          <span>See the Pen <a href="https://codepen.io/Waled-Reda/pen/dPOEQRX">CodePen Mirror</a> by Waled Reda (<a href="https://codepen.io/Waled-Reda">@Waled-Reda</a>) on <a href="https://codepen.io">CodePen</a>.</span>
        </p>
      </div>
      <p class="note">If the embed does not load on your network, use the "Open on CodePen" button above.</p>
    </section>
  </main>
  <script async src="https://public.codepenassets.com/embed/index.js"></script>
</body>
</html>
