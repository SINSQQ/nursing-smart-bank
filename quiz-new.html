<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>All Nursing Quiz</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}button,select{font:inherit}.wrap{max-width:860px;margin:0 auto;padding:18px}.hero{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:18px;margin-bottom:14px}.hero h1{font-size:24px;margin:0 0 8px;color:#244c85}.hero p{margin:4px 0;color:#5c6472}.panel{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:14px}.controls{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:14px}.btn,.select{border:1px solid #cbd3df;border-radius:6px;background:#fff;color:#20232a;padding:10px 12px;cursor:pointer}.btn.primary{background:#244c85;color:#fff;border-color:#244c85}.btn.green{background:#147a5c;color:#fff;border-color:#147a5c}.btn:disabled{opacity:.55;cursor:default}.top{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{font-weight:700;color:#244c85}.meta{color:#5c6472;font-size:13px}.bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:10px 0 14px}.fill{height:100%;background:#147a5c;width:0}.q{font-size:18px;line-height:1.5;margin:10px 0 14px}.opts{display:grid;gap:8px}.opt{text-align:left;border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;cursor:pointer;line-height:1.45}.opt:hover{border-color:#244c85;background:#f4f7fb}.opt.correct{border-color:#147a5c;background:#eaf6f1;color:#0b5b43}.opt.wrong{border-color:#b32d2e;background:#fff0f0;color:#8a2020}.feedback{margin-top:12px;border-radius:8px;padding:12px;line-height:1.45}.feedback.ok{background:#eaf6f1;color:#0b5b43}.feedback.err{background:#fff0f0;color:#8a2020}.nav{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}.result{text-align:center}.score{font-size:44px;font-weight:700;color:#147a5c;margin:8px 0}.review{text-align:left;margin-top:14px;display:grid;gap:8px}.review-item{border:1px solid #d9deea;background:#fff;border-radius:8px;padding:10px;line-height:1.45}.link{color:#244c85;text-decoration:none;font-weight:700}@media(max-width:720px){.wrap{padding:12px}.controls{grid-template-columns:1fr}.top{align-items:flex-start;flex-direction:column}.q{font-size:16px}.nav .btn{flex:1;min-width:130px}}
  </style>
</head>
<body>
  <main class="wrap">
    <div id="app"></div>
  </main>
  <script src="data.js"></script>
  <script>
const RAW=(window.BANK_DATA&&window.BANK_DATA.questions)||[];
const QUIZ=RAW.filter(q=>(q.section==='mcq'&&q.options&&q.correct_answer)||q.section==='true_false').map(q=>{
  if(q.section==='true_false'){
    return {uid:q.uid,chapter:q.chapter,chapterTitle:q.chapter_title,number:q.number,type:'true_false',question:q.question,options:['True','False'],answer:q.answer==='T'?0:1,explanation:q.explanation||''};
  }
  return {uid:q.uid,chapter:q.chapter,chapterTitle:q.chapter_title,number:q.number,type:'mcq',question:q.question,options:['A','B','C','D'].map(k=>q.options[k]||''),answer:'ABCD'.indexOf(q.correct_answer),explanation:q.explanation||''};
}).filter(q=>q.answer>=0&&q.options.every(Boolean));
const REVIEW=RAW.filter(q=>q.section==='matching'||q.section==='essay');
let bank=[],current=0,answers={},mode='home';
const app=document.getElementById('app');
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function chapters(){return [...new Set(QUIZ.map(q=>q.chapter))].sort((a,b)=>a-b)}
function home(){
  mode='home';
  app.innerHTML=`<section class="hero"><h1>All Nursing Quiz</h1><p>Random quiz from all questions written for the channel.</p><p class="meta">${QUIZ.length} quiz questions: MCQ + True / False. ${REVIEW.length} written/matching questions are kept for review.</p><div class="controls"><select class="select" id="chapter"><option value="all">All chapters</option>${chapters().map(ch=>`<option value="${ch}">Chapter ${ch}</option>`).join('')}</select><select class="select" id="count"><option value="20">20 questions</option><option value="50">50 questions</option><option value="100">100 questions</option><option value="all">All questions</option></select><button class="btn primary" onclick="start()">Start quiz</button></div></section>`;
}
function start(){
  const ch=document.getElementById('chapter').value;
  const count=document.getElementById('count').value;
  let pool=ch==='all'?QUIZ:QUIZ.filter(q=>String(q.chapter)===ch);
  pool=shuffle(pool);
  bank=count==='all'?pool:pool.slice(0,Number(count));
  current=0;answers={};render();
}
function render(){
  if(current>=bank.length){finish();return}
  const q=bank[current], ans=answers[q.uid], done=Object.keys(answers).length;
  const pct=bank.length?Math.round(done/bank.length*100):0;
  app.innerHTML=`<section class="panel"><div class="top"><div><div class="title">Chapter ${q.chapter}: ${esc(q.chapterTitle)}</div><div class="meta">Question ${current+1} of ${bank.length} | Bank Q${q.number} | ${q.type==="true_false"?"True/False":"MCQ"}</div></div><div class="meta">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${pct}%"></div></div><div class="q">${esc(q.question)}</div><div class="opts">${q.options.map((o,i)=>option(q,i,ans)).join('')}</div>${ans?feedback(q,ans):''}<div class="nav"><button class="btn" onclick="prev()" ${current===0?'disabled':''}>Previous</button><button class="btn green" onclick="home()">Home</button><button class="btn primary" onclick="next()" ${ans?'':'disabled'}>Next</button></div></section>`;
}
function option(q,i,ans){
  let cls='opt';
  if(ans&&i===q.answer)cls+=' correct';
  if(ans&&ans.choice===i&&i!==q.answer)cls+=' wrong';
  return `<button class="${cls}" onclick="choose(${i})" ${ans?'disabled':''}><b>${String.fromCharCode(65+i)}.</b> ${esc(q.options[i])}</button>`;
}
function choose(i){
  const q=bank[current];
  if(answers[q.uid])return;
  answers[q.uid]={choice:i,correct:i===q.answer};
  render();
}
function feedback(q,ans){
  return `<div class="feedback ${ans.correct?'ok':'err'}">${ans.correct?'Correct':'Wrong'} - correct answer: <b>${String.fromCharCode(65+q.answer)}. ${esc(q.options[q.answer])}</b>${q.explanation?`<br>${esc(q.explanation)}`:''}</div>`;
}
function next(){if(!answers[bank[current].uid])return;current++;render()}
function prev(){current=Math.max(0,current-1);render()}
function finish(){
  const total=bank.length, good=score(), wrong=bank.filter(q=>!answers[q.uid]||!answers[q.uid].correct);
  app.innerHTML=`<section class="panel result"><h1>Quiz complete</h1><div class="score">${good}/${total}</div><p class="meta">${Math.round((good/total)*100)||0}% correct</p><div class="nav" style="justify-content:center"><button class="btn primary" onclick="retry()">Retry same quiz</button><button class="btn green" onclick="retryWrong()" ${wrong.length?'':'disabled'}>Wrong only</button><button class="btn" onclick="home()">Home</button></div><div class="review">${wrong.slice(0,60).map(q=>`<div class="review-item"><b>Ch${q.chapter} Q${q.number}</b><br>${esc(q.question)}<br><span class="meta">Correct: ${String.fromCharCode(65+q.answer)}. ${esc(q.options[q.answer])}</span></div>`).join('')}</div></section>`;
}
function retry(){current=0;answers={};bank=shuffle(bank);render()}
function retryWrong(){bank=shuffle(bank.filter(q=>!answers[q.uid]||!answers[q.uid].correct));current=0;answers={};render()}
home();
  </script>
</body>
</html>
