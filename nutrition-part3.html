<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nutrition Quiz - Part 3</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}.wrap{max-width:860px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:16px}.home{text-align:center;padding:34px 16px}.home h1{margin:0 0 8px;color:#244c85;font-size:26px}.muted{color:#5f6876;font-size:14px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{font-weight:700;color:#244c85}.bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:12px 0}.fill{height:100%;background:#147a5c}.q{font-size:18px;line-height:1.5;margin:12px 0}.opts{display:grid;gap:8px}.opt{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;text-align:left;cursor:pointer;line-height:1.45;font:inherit}.opt:hover{background:#f4f7fb;border-color:#244c85}.opt.correct{background:#e9f6f1;border-color:#147a5c;color:#0b5b43}.opt.wrong{background:#fff0f0;border-color:#b32d2e;color:#8a2020}.btn{border:1px solid #cbd3df;border-radius:6px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block;margin:4px}.btn.primary{background:#244c85;border-color:#244c85;color:#fff}.btn.green{background:#147a5c;border-color:#147a5c;color:#fff}.btn:disabled{opacity:.55;cursor:default}.feedback{margin-top:12px;border-radius:8px;padding:12px;line-height:1.45}.feedback.ok{background:#e9f6f1;color:#0b5b43}.feedback.err{background:#fff0f0;color:#8a2020}.nav{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}.score{text-align:center}.score-big{font-size:44px;font-weight:700;color:#147a5c;margin:8px 0}.review{display:grid;gap:8px;margin-top:14px;text-align:left}.review-item{border:1px solid #d9deea;border-radius:8px;padding:10px;line-height:1.45}@media(max-width:640px){.wrap{padding:12px}.row{align-items:flex-start;flex-direction:column}.q{font-size:16px}.nav .btn{flex:1;min-width:120px}.home .btn{display:block;width:100%;margin:8px 0}}
  </style>
</head>
<body>
<main class="wrap"><div id="app"></div></main>
<script>
const QUESTIONS=[
{"type":"MCQ","question":"Which food category is primarily responsible for repairing damaged body tissues?","options":["Proteins","fats","vitamins","glucose"],"answer":0,"id":"q1"},
{"type":"MCQ","question":"Which of the following is considered a protective food source?","options":["Legumes","Cereals","Fortified iodized salt","Starchy tubers"],"answer":2,"id":"q2"},
{"type":"MCQ","question":"What is the definition of the thermic effect of food?","options":["The minimum energy needed for vital functions at rest","The energy needed to digest and absorb food","The measure of nutrients provided per calorie","The energy yielded by macronutrient combustion"],"answer":1,"id":"q3"},
{"type":"MCQ","question":"Which characteristic of a nutritious diet emphasizes avoiding excessive caloric intake or over-consuming a single food group?","options":["Adequate","Balanced","Moderate","Varied"],"answer":2,"id":"q4"},
{"type":"MCQ","question":"How many calories are provided by one gram of carbohydrate?","options":["4 calories","7 calories","9 calories","12 calories"],"answer":0,"id":"q5"},
{"type":"MCQ","question":"When glycogen stores are completely full, how does the body handle excess glucose?","options":["It excretes the excess through urine","It converts it into muscle tissue","It stores the remainder as fat","It synthesizes essential amino acids"],"answer":2,"id":"q6"},
{"type":"MCQ","question":"Which of the following is categorized as a compound sugar (disaccharide)?","options":["Fructose","Galactose","Maltose","Glycogen"],"answer":2,"id":"q7"},
{"type":"MCQ","question":"How many essential amino acids must the body receive through dietary intake?","options":["9","11","15","22"],"answer":0,"id":"q8"},
{"type":"MCQ","question":"What is a physiological consequence of consuming excess dietary protein?","options":["Severe edema due to water retention","Increased storage capacity of muscle glycogen","Dehydration due to an increased water demand to flush out protein","Elevated absorption of dietary calcium"],"answer":2,"id":"q9"},
{"type":"MCQ","question":"Which type of fatty acid lacks two or more hydrogen bonds and is typically liquid at room temperature?","options":["Saturated fat","Polyunsaturated fat","Monounsaturated fat","Trans fatty acid"],"answer":1,"id":"q10"},
{"type":"MCQ","question":"How do omega-3 polyunsaturated fatty acids from fish primarily impact blood lipid profiles?","options":["They significantly raise HDL cholesterol","They drastically lower LDL cholesterol","They reduce the total amount of triglycerides in the blood","They convert LDL into HDL cholesterol"],"answer":2,"id":"q11"},
{"type":"MCQ","question":"Which statement accurately describes the function of High Density Lipoproteins (HDL)?","options":["They transport fat from the liver to the cells for storage","They process trans fats into usable energy fragments","They transport fat in the bloodstream to the liver for excretion","They convert essential amino acids into glucose"],"answer":2,"id":"q12"},
{"type":"MCQ","question":"Why are individuals who take large doses of fat-soluble vitamin supplements particularly vulnerable to toxic effects?","options":["These vitamins are rapidly excreted by the kidneys, straining them","The body stores these vitamins in fatty tissue, leading to a dangerous buildup","Fat-soluble vitamins require high levels of water for processing","They act as co-enzymes that accelerate metabolic burnout"],"answer":1,"id":"q13"},
{"type":"MCQ","question":"A deficiency in vitamin D primarily leads to which condition?","options":["Pellagra","Rickets","Scurvy","Glossitis"],"answer":1,"id":"q14"},
{"type":"MCQ","question":"According to the Food Guide Pyramid, how many daily servings are recommended from the Vegetable Group?","options":["2-3 servings","2-4 servings","3-5 servings","6-11 servings"],"answer":2,"id":"q15"},
{"type":"MCQ","question":"Which of the following constitutes a single serving from the Bread, Cereal, Rice, and Pasta Group?","options":["1 cup of cooked pasta","1/2 cup of cooked rice","2 slices of bread","2 cups of ready-to-eat cereal"],"answer":1,"id":"q16"},
{"type":"MCQ","question":"How does the Food Guide Pyramid categorize the serving equivalent for cottage cheese compared to other dairy products?","options":["One cup of cottage cheese counts as two servings of milk","One cup of cottage cheese counts as only 1/2 serving of milk","Cottage cheese is excluded from the dairy group due to its fat content","Cottage cheese serves as a complete substitute for the meat group"],"answer":0,"id":"q17"},
{"type":"MCQ","question":"What is the maximum acceptable waist circumference (Level 1) for adult females to avoid further weight gain?","options":["> 80 cm","> 88 cm","> 94 cm","> 102 cm"],"answer":1,"id":"q18"},
{"type":"MCQ","question":"Which indirect method of nutritional assessment relies on evaluating community health indices rather than individual patient metrics?","options":["Anthropometry","Biochemical testing","Subjective Global Assessment","Ecological and economic variables"],"answer":3,"id":"q19"},
{"type":"MCQ","question":"Mid-arm muscle circumference (MAMC) is calculated using which two measurements?","options":["Body Mass Index and Waist/Hip Ratio","Mid arm circumference and Triceps skin fold thickness","Head circumference and Mid arm circumference","Subjective Global Assessment and BMI"],"answer":1,"id":"q20"},
{"type":"MCQ","question":"A Waist/Hip Ratio (WHR) indicating high risk for central obesity and cardiovascular disorders in males is:","options":["> 0.80","> 0.85","> 0.90","> 0.95"],"answer":3,"id":"q21"},
{"type":"MCQ","question":"Which clinical sign is most commonly associated with a deficiency in Vitamin C?","options":["Night blindness","Spooning of the nails","Bleeding and spongy gums","Follicular hyperkeratosis"],"answer":2,"id":"q22"},
{"type":"MCQ","question":"A patient presents with a fissured tongue and angular stomatitis. These clinical signs are indicative of a deficiency in:","options":["Vitamin A","Riboflavin (Vitamin B2)","Vitamin K","Vitamin C"],"answer":1,"id":"q23"},
{"type":"MCQ","question":"Which dietary assessment method involves a trained interviewer asking the subject to remember all food and drink consumed over the previous day?","options":["Food Frequency Questionnaire","Dietary History","24-hour recall","Food Diary"],"answer":2,"id":"q24"},
{"type":"MCQ","question":"What is a primary limitation of the Food Frequency Questionnaire?","options":["It depends heavily on the short-term memory of the exact previous day","It requires weighing every meal eaten by the individual","It requires frequent updating with new commercial food products to stay relevant","It is the most expensive and time-consuming method to administer"],"answer":2,"id":"q25"},
{"type":"MCQ","question":"Which of the following is considered an incomplete protein source?","options":["Eggs","Milk","Legumes","Fish"],"answer":2,"id":"q26"},
{"type":"MCQ","question":"What is the primary function of carbohydrates in the human body?","options":["Regulating enzyme production","Acting as the body's primary source of energy","Repairing damaged muscle tissue","Transporting fat-soluble vitamins"],"answer":1,"id":"q27"},
{"type":"MCQ","question":"Which vital organ primarily stores glycogen alongside the muscles?","options":["Pancreas","Kidneys","Liver","Gallbladder"],"answer":2,"id":"q28"},
{"type":"MCQ","question":"What type of sugar is lactose classified as?","options":["Monosaccharide","Disaccharide","Polysaccharide","Complex starch"],"answer":1,"id":"q29"},
{"type":"MCQ","question":"Which vitamin is NOT considered a fat-soluble vitamin?","options":["Vitamin A","Vitamin C","Vitamin D","Vitamin K"],"answer":1,"id":"q30"},
{"type":"MCQ","question":"A lack of niacin (a B-group vitamin) leads to which deficiency disease?","options":["Scurvy","Rickets","Pellagra","Osteoporosis"],"answer":2,"id":"q31"},
{"type":"MCQ","question":"Which demographic group is most commonly affected by osteoporosis?","options":["Young adolescent males","Infants under 6 months","Older females","Middle-aged men"],"answer":2,"id":"q32"},
{"type":"MCQ","question":"What proportion of the human body is approximately composed of water?","options":["One-quarter","One-third","One-half","Two-thirds"],"answer":3,"id":"q33"},
{"type":"MCQ","question":"According to the Food Guide Pyramid, which food group requires the highest number of daily servings (6-11 servings)?","options":["Vegetable Group","Fruit Group","Bread, Cereal, Rice, & Pasta Group","Milk, Yogurt, & Cheese Group"],"answer":2,"id":"q34"},
{"type":"MCQ","question":"How much cooked lean meat, poultry, or fish is equivalent to one serving according to the Food Guide Pyramid?","options":["1 ounce","2 to 3 ounces","4 to 6 ounces","8 ounces"],"answer":1,"id":"q35"},
{"type":"MCQ","question":"Which measurement is utilized to determine if a patient has a high risk of diabetes and cardiovascular disorders specifically based on central obesity?","options":["Triceps skin fold thickness","Mid-arm muscle circumference","Waist/Hip Ratio","Subjective Global Assessment"],"answer":2,"id":"q36"},
{"type":"MCQ","question":"The loss of which nutrient can be accelerated by bed rest or inactivity?","options":["8 grams of protein per day","15 grams of fat per day","50 grams of glycogen per day","10 milligrams of iron per day"],"answer":0,"id":"q37"},
{"type":"MCQ","question":"In clinical settings, which laboratory test is considered the most important and useful index of the overall state of nutrition?","options":["Urine dipstick for albumin","Hemoglobin estimation","Serum retinol measurement","Stool examination for parasites"],"answer":1,"id":"q38"},
{"type":"MCQ","question":"Which of the following correctly defines a \"balanced diet\"?","options":["Eating exclusively organic foods grown without pesticides","Consuming exactly equal grams of fats, proteins, and carbohydrates","Eating more servings of nutrient-dense foods and fewer foods with empty calories","Restricting total daily caloric intake strictly to basal metabolic needs"],"answer":2,"id":"q39"},
{"type":"MCQ","question":"Which fat-related substance is found in animal fats and can form deposits on artery walls, leading to atherosclerosis?","options":["Triglycerides","Trans fatty acids","Cholesterol","Plant sterols"],"answer":2,"id":"q40"},
{"type":"MCQ","question":"How should water-soluble vitamins be handled during cooking to prevent nutrient loss?","options":["Boil them in large amounts of water for extended periods","Cook them quickly using methods like steaming","Fry them in polyunsaturated vegetable oils","Expose them to high heat without using a cover"],"answer":1,"id":"q41"},
{"type":"MCQ","question":"What is a known physiological consequence of dehydration?","options":["Increased blood volume","Decreased body temperature","An increase of toxins due to decreased urine output","Enhanced oxygen transport to muscle tissues"],"answer":2,"id":"q42"},
{"type":"MCQ","question":"In anthropometric assessment, what is the classification for a BMI below 18.5?","options":["Normal","Underweight","Overweight","Obese"],"answer":1,"id":"q43"},
{"type":"MCQ","question":"Which dietary assessment method involves the subject recording their food intake at the exact time of consumption over 1 to 7 days?","options":["24-hour recall","Food Frequency Questionnaire","Food Diary","Dietary History"],"answer":2,"id":"q44"},
{"type":"MCQ","question":"According to the provided text, what is the nutritional status of plant proteins compared to animal proteins?","options":["All plant proteins contain the 9 essential amino acids in perfect ratios","Plant proteins are considered higher quality than animal proteins","Most plant proteins are incomplete, but two incomplete proteins can be combined to make a complete protein","Plant proteins are completely indigestible and yield no usable energy"],"answer":2,"id":"q45"},
{"type":"MCQ","question":"Which group of individuals is advised to take a 400µg folic acid supplement daily?","options":["Elderly men over the age of 65","Children under the age of 5","Women of childbearing age who are sexually active","Teenagers experiencing rapid skeletal growth spurts"],"answer":2,"id":"q46"},
{"type":"MCQ","question":"When using the percentage of Ideal Body Weight (%IBW) to assess nutritional risk, what percentage indicates a risk of severe malnutrition?","options":["90-109%","80-89%","70-79%","< 70%"],"answer":3,"id":"q47"},
{"type":"MCQ","question":"What clinical sign suggests a deficiency in protein, zinc, and biotin?","options":["Corkscrew coiled hair","Sparse and thin hair","Exophthalmia","Transverse lines on the nails"],"answer":1,"id":"q48"},
{"type":"MCQ","question":"Which of the following describes the difference between macronutrients and micronutrients?","options":["Macronutrients provide vitamins while micronutrients provide essential minerals","Macronutrients regulate basal metabolism while micronutrients fuel the thermic effect of food","Carbohydrates, fats, and proteins are macronutrients, while vitamins and minerals are micronutrients","Macronutrients are solely water-soluble while micronutrients are exclusively fat-soluble"],"answer":2,"id":"q49"},
{"type":"MCQ","question":"What is the primary role of fatty foods in the body?","options":["They supply essential fatty acids to insulate vital organs","They are essential for promoting body immunity and regulatory functions","They act as the body's primary storage form for excess energy","They build and repair worn-out skeletal muscle tissues"],"answer":2,"id":"q50"},
{"type":"MCQ","question":"One serving of starch equals:","options":["1 whole balady bread","3 tablespoons rice","1 cup milk","2 eggs"],"answer":1,"id":"q51"},
{"type":"MCQ","question":"Which tool is commonly used to screen for malnutrition in elderly patients?","options":["MUST","MNA","SGA","NRS-2002"],"answer":1,"id":"q52"},
{"type":"MCQ","question":"What is the BMI classification for a patient with a BMI of 17.5?","options":["Normal","Overweight","Obese","Underweight"],"answer":3,"id":"q53"},
{"type":"MCQ","question":"Which biochemical marker is more sensitive to short-term changes in nutritional status?","options":["Serum Albumin","Prealbumin","Hemoglobin","Cholesterol"],"answer":1,"id":"q54"},
{"type":"MCQ","question":"What is the primary purpose of nutrition screening in a hospital setting?","options":["To replace the need for a dietitian","To diagnose specific vitamin deficiencies","To identify patients at risk for malnutrition","To calculate daily caloric needs"],"answer":2,"id":"q55"},
{"type":"MCQ","question":"Which measurement is most useful for bedridden patients when weight cannot be accurately taken?","options":["Knee height","Waist circumference","Skinfold thickness","Head circumference"],"answer":0,"id":"q56"},
{"type":"MCQ","question":"One serving of fruit can be:","options":["1 apple","3 cups rice","2 tablespoons oil","30 g cheese"],"answer":0,"id":"q57"},
{"type":"MCQ","question":"Which of the following is one serving of vegetables?","options":["1 slice toast","1/2 cup cooked vegetables","1 egg","1 tablespoon peanut butter"],"answer":1,"id":"q58"},
{"type":"MCQ","question":"One ounce equivalent of protein may be:","options":["1 cup milk","1 orange","1 egg","1 teaspoon oil"],"answer":2,"id":"q59"}
];
let current=0,answers={},bank=[];
const app=document.getElementById('app');
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function home(){current=0;answers={};app.innerHTML=`<section class="card home"><h1>Nutrition Quiz - Part 3</h1><p class="muted">${QUESTIONS.length} questions: Applied Nutrition Q Bank.</p><button class="btn primary" onclick="start(20)">20 questions</button><button class="btn primary" onclick="start(50)">50 questions</button><button class="btn green" onclick="start('all')">All questions</button></section>`}
function start(count){current=0;answers={};const pool=shuffle(QUESTIONS);bank=count==='all'?pool:pool.slice(0,Math.min(Number(count),pool.length));render()}
function render(){const q=bank[current];if(!q){finish();return}const ans=answers[q.id];const done=Object.keys(answers).length;app.innerHTML=`<section class="card"><div class="row"><div><div class="title">Nutrition Quiz - Part 3</div><div class="muted">${q.type} | Question ${current+1} of ${bank.length}</div></div><div class="muted">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${Math.round(done/bank.length*100)}%"></div></div><div class="q">${esc(q.question)}</div><div class="opts">${q.options.map((o,i)=>option(q,i,ans)).join('')}</div>${ans?feedback(q,ans):''}<div class="nav"><button class="btn" onclick="prev()" ${current===0?'disabled':''}>Previous</button><button class="btn" onclick="home()">Home</button><button class="btn primary" onclick="next()" ${ans?'':'disabled'}>Next</button></div></section>`}
function option(q,i,ans){let cls='opt';if(ans&&i===q.answer)cls+=' correct';if(ans&&ans.choice===i&&i!==q.answer)cls+=' wrong';return `<button class="${cls}" onclick="choose(${i})" ${ans?'disabled':''}><b>${String.fromCharCode(65+i)}.</b> ${esc(q.options[i])}</button>`}
function choose(i){const q=bank[current];answers[q.id]={choice:i,correct:i===q.answer};render()}
function feedback(q,ans){return `<div class="feedback ${ans.correct?'ok':'err'}">${ans.correct?'Correct':'Wrong'} - correct answer: <b>${String.fromCharCode(65+q.answer)}. ${esc(q.options[q.answer])}</b></div>`}
function next(){if(!answers[bank[current].id])return;current++;render()}
function prev(){current=Math.max(0,current-1);render()}
function finish(){const wrong=bank.filter(q=>!answers[q.id]||!answers[q.id].correct);app.innerHTML=`<section class="card score"><h1>Quiz complete</h1><div class="score-big">${score()}/${bank.length}</div><p class="muted">${Math.round(score()/bank.length*100)||0}% correct</p><div class="nav" style="justify-content:center"><button class="btn primary" onclick="start(bank.length)">Restart</button><button class="btn green" onclick="retryWrong()" ${wrong.length?'':'disabled'}>Wrong only</button><button class="btn" onclick="home()">Home</button></div><div class="review">${wrong.map(q=>`<div class="review-item"><b>${esc(q.type)}</b><br>${esc(q.question)}<br><span class="muted">Correct: ${esc(q.options[q.answer])}</span></div>`).join('')}</div></section>`}
function retryWrong(){bank=shuffle(bank.filter(q=>!answers[q.id]||!answers[q.id].correct));current=0;answers={};render()}
home();
</script>
</body>
</html>
