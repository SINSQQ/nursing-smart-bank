<html lang="en">
<head>

  <title>Communication Quiz Bank</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}.wrap{max-width:860px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:16px}.home{text-align:center;padding:34px 16px}.home h1{margin:0 0 8px;color:#244c85;font-size:26px}.muted{color:#5f6876;font-size:14px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{font-weight:700;color:#244c85}.bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:12px 0}.fill{height:100%;background:#147a5c;transition:width .3s}.q{font-size:18px;line-height:1.5;margin:12px 0}.meta{font-size:12px;color:#5f6876;margin-bottom:10px}.opts{display:grid;gap:8px}.opt{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;text-align:left;cursor:pointer;line-height:1.45;font:inherit}.opt:hover{background:#f4f7fb;border-color:#244c85}.opt.correct{background:#e9f6f1;border-color:#147a5c;color:#0b5b43}.opt.wrong{background:#fff0f0;border-color:#b32d2e;color:#8a2020}.btn{border:1px solid #cbd3df;border-radius:6px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block;margin:4px}.btn.primary{background:#244c85;border-color:#244c85;color:#fff}.btn.green{background:#147a5c;border-color:#147a5c;color:#fff}.btn.orange{background:#e67e22;border-color:#e67e22;color:#fff}.score{text-align:center;padding:34px 16px}.score-big{font-size:44px;font-weight:700;color:#147a5c;margin:8px 0}.review{display:grid;gap:10px;margin-top:16px;text-align:left}.review-item{border:1px solid #d9deea;border-radius:8px;padding:12px;line-height:1.45}.review-item.was-wrong{border-left:4px solid #b32d2e}.top-links{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:14px}@media(max-width:640px){.row{flex-direction:column;align-items:flex-start}.btn{width:100%}}
  </style>
</head>
<body>
<main class="wrap"><div id="app"></div></main>
<script>
const QUESTIONS=[{"question": "What is the primary purpose of communication in health education and promotion?", "options": ["To share administrative data", "To promote health improvements through behavior modification", "To advertise new medical equipment", "To record patient history"], "answer": 1, "section": "Communication Process And Models", "id": 1}, {"question": "Which stage of communication is characterized by ensuring the message is seen or heard by the target group?", "options": ["Stage 1: Reaching the intended audience", "Stage 2: Attracting attention", "Stage 3: Understanding the message", "Stage 4: Promoting change"], "answer": 1, "section": "Communication Process And Models", "id": 2}, {"question": "Which of the following is a physical characteristic used to attract attention?", "options": ["Novelty", "Intensity, such as bold lettering", "Humor", "Felt needs of the audience"], "answer": 1, "section": "Communication Process And Models", "id": 3}, {"question": "A communication that uses unusual features or surprising objects to attract attention is using:", "options": ["Entertainment", "Novelty", "Intensity", "Physical size"], "answer": 1, "section": "Communication Process And Models", "id": 4}, {"question": "Misunderstandings in communication most easily occur when:", "options": ["Primary colors are used", "The audience is motivated", "Complex language or technical jargon is used", "The sender is a health extension worker"], "answer": 2, "section": "Communication Process And Models", "id": 5}, {"question": "Which communication approach involves explaining a new idea, including its strengths and weaknesses?", "options": ["Informing", "Educating", "Persuading", "Entertaining"], "answer": 1, "section": "Communication Process And Models", "id": 6}, {"question": "Communication that takes place inside a person, including their thoughts and justifications, is:", "options": ["Interpersonal communication", "Mass communication", "Intra-personal communication", "Public communication"], "answer": 2, "section": "Communication Process And Models", "id": 7}, {"question": "Interpersonal communication is defined as interaction between two or more people who:", "options": ["Live in the same city", "Are together at the same time and place", "Read the same newspaper", "Have the same job"], "answer": 1, "section": "Communication Process And Models", "id": 8}, {"question": "What is defined as the passing of information from sender to receiver with minimum interference?", "options": ["Organizational structure", "Effective communication", "Feedback loop", "Semantic decoding"], "answer": 1, "section": "Communication Barriers And Overcoming Them", "id": 9}, {"question": "Which of the following is a primary result of communication barriers in the workplace?", "options": ["Increased employee satisfaction", "Message manipulation and conflict", "Improved feedback loops", "Clearer organizational goals"], "answer": 1, "section": "Communication Barriers And Overcoming Them", "id": 10}, {"question": "Using unfamiliar or over-complicated technical terms describes which barrier?", "options": ["Physical barrier", "Jargon", "Psychological barrier", "Cultural difference"], "answer": 1, "section": "Communication Barriers And Overcoming Them", "id": 11}, {"question": "If a receiver is distracted by others speaking at the same time, this is a barrier of:", "options": ["Lack of attention or interest", "Perception difference", "Physiological disability", "Semantic noise"], "answer": 3, "section": "Communication Barriers And Overcoming Them", "id": 12}, {"question": "Which barrier occurs when two people see things differently and their viewpoints hinder message deciphering?", "options": ["Physical barrier", "Perception difference", "Language difference", "Emotional barrier"], "answer": 1, "section": "Communication Barriers And Overcoming Them", "id": 13}, {"question": "A receiver with hearing problems or a speaker with speech disabilities is experiencing:",  Them", "id": 20}, {"question": "Communication is more effective when the message is:", "options": ["Helpful and valuable to the receiver", "Focused only on the sender's interests", "Long and over-complicated", "Sent without a specific objective"], "answer": 0, "section": "Communication Barriers And Overcoming Them", "id": 21}, {"question": "What is the primary aim of getting feedback?", "options": ["To end the conversation", "To find if the receiver properly understood the meaning of message", "To prove the sender is right", "To avoid face-to-face contact"], "answer": 1, "section": "Communication Barriers And Overcoming Them", "id": 22}, {"question": "Effective communication in healthcare is considered as important as:", "options": ["Financial management", "Technical competence", "Hospital infrastructure", "Staffing ratios"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 23}, {"question": "Which is the most important tool for health professionals to gather pertinent information and elicit cooperation?", "options": ["Electronic health records", "Diagnostic equipment", "Communication", "Standard operating procedures"], "answer": 2, "section": "Healthcare Team Communication And Handover", "id": 24}, {"question": "The exchange of complex or technical terms among healthcare professionals is defined as:", "options": ["Clinical practice", "Healthcare team communication", "Conflict management", "Professional networking"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 25}, {"question": "What is a primary benefit of good communication regarding patient safety?", "options": ["It increases hospital revenue", "It reduces medical errors", "It shortens nursing shifts", "It replaces the need for documentation"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 26}, {"question": "Which of the following is a benefit of communication for the healthcare staff?", "options": ["Increased workload", "Higher rates of burnout", "Increased job satisfaction", "Less accountability"], "answer": 2, "section": "Healthcare Team Communication And Handover", "id": 27}, {"question": "Which part of the communication model describes the way through which the message is conveyed?", "options": ["Receiver", "Channel", "Feedback", "Decoding"], "answer": 1, "section": "Communication Process And Models", "id": 28}, {"question": "Formal healthcare messages include:", "options": ["Face-to-face greetings", "Emails to friends", "Hospital discharge summaries", "Informal phone chats"], "answer": 2, "section": "Healthcare Team Communication And Handover", "id": 29}, {"question": "A major concern requiring strong security protocols in healthcare communication is:", "options": ["Staff scheduling", "Patient privacy", "Financial transactions", "Equipment maintenance"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 30}, {"question": "Effective healthcare teams prioritize which type of communication to reduce errors?", "options": ["Indirect communication", "Face-to-face communication", "Informal rumors", "One-way memos"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 31}, {"question": "Which of the following is a key element of an effective handover?", "options": ["Making it as fast as possible", "Avoiding eye contact to stay focused", "Adequate time without interruptions", "Using highly complex jargon"], "answer": 2, "section": "Healthcare Team Communication And Handover", "id": 32}, {"question": "Handover of a specific patient should include a summary of stay, including:", "options": ["The patient's home address", "Diagnosis and treatment", "The hospital's financial policy", "The nurse's personal opinions on the family"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 33}, {"question": "Poor communication during handover is specifically associated with:", "options": ["Increased hospital parking fees", "Increased patient mortality and morbidity", "Improved staff attendance", "Better equipment maintenance"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 34}, {"question": "A communication plan for ongoing treatment during handover should include:", "options": ["Only the patient's diet", "Drugs and therapies", "The staff's vacation schedule", "Previous hospital history from 10 years ago"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 35}, {"question": "Which of the following is a way to improve communication in a healthcare organization?", "options": ["Discouraging mobile collaboration", "Making communication part of the organization's culture", "Relying solely on paper notes", "Reducing face-to-face interactions"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 36}, {"question": "Streamlining communication channels helps to:", "options": ["Create more confusion", "Improve communication in healthcare", "Increase the number of meetings", "Ensure only doctors can speak"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 37}, {"question": "Non-verbal communication includes:", "options": ["Written reports", "Facial expressions, eye contact, and posture", "Phone conversations", "Text messages"], "answer": 1, "section": "Healthcare Team Communication And Handover", "id": 38}, {"question": "A nursing interview is defined as:", "options": ["A casual conversation to pass the time", "An organized conversation to obtain client history", "A physical examination of the patient's body", "A social interaction between the nurse and the family"], "answer": 1, "section": "Nursing Interview Techniques", "id": 39}, {"question": "The primary objective of an interview is to collect:", "options": ["Objective data through physical touch", "Subjective data to supplement objective assessments", "Financial information for hospital billing", "Only the patient's legal documents"], "answer": 1, "section": "Nursing Interview Techniques", "id": 40}, {"question": "Which of the following is an objective of the nursing interview?", "options": ["To prescribe medications", "To establish trust and rapport with the patient", "To replace the need for physical assessment", "To diagnose the patient without a physician"], "answer": 1, "section": "Nursing Interview Techniques", "id": 41}, {"question": "Which type of question is best for gathering detailed responses and encouraging the patient to tell their story?", "options": ["Closed-ended", "Open-ended", "Leading questions", "Focused questions"], "answer": 1, "section": "Nursing Interview Techniques", "id": 42}, {"question": "Closed-ended questions are most useful when the nurse needs:", "options": ["Detailed emotional context", "Specific facts or 'yes/no' answers", "To build long-term rapport", "To understand the patient's perspective"], "answer": 1, "section": "Nursing Interview Techniques", "id": 43}, {"question": "Which phase of the interview involves explaining the purpose of the interview and building a rapport with the patient?", "options": ["Working phase", "Orientation phase", "Termination phase", "Follow-up phase"], "answer": 1, "section": "Nursing Interview Techniques", "id": 44}, {"question": "In which phase does the nurse obtain data for developing a nursing care plan of the patient?", "options": ["Termination phase", "Working phase", "Orientation phase", "Preparatory phase"], "answer": 1, "section": "Nursing Interview Techniques", "id": 45}, {"question": "What is the main goal of the Termination phase?", "options": ["To introduce the nurse to the patient", "To summarize information and signal the end of the interview", "To perform a head-to-toe assessment", "To ask the most difficult questions"], "answer": 1, "section": "Nursing Interview Techniques", "id": 46}, {"question": "Which of the following is an example of a focused question?", "options": ["Are you okay?", "Can you rate your pain on a scale of 0 to 10?", "Tell me how you're feeling.", "Do you have siblings?"], "answer": 1, "section": "Nursing Interview Techniques", "id": 47}, {"question": "What does paraphrasing during an interview help with?", "options": ["Completing documentation", "Confirming understanding", "Diagnosing the illness", "Ending the interview"], "answer": 1, "section": "Nursing Interview Techniques", "id": 48}, {"question": "How do time constraints act as a barrier to an effective interview?", "options": ["They make the nurse more efficient", "Rushing through questions can affect the depth and accuracy of data", "They help build rapport faster", "They eliminate the need for open-ended questions"], "answer": 1, "section": "Nursing Interview Techniques", "id": 49}, {"question": "Which of the following is considered a 'Poor Interview Technique'?", "options": ["Summarizing at the end", "Interrupting the patient frequently", "Using open-ended questions", "Maintaining eye contact"], "answer": 1, "section": "Nursing Interview Techniques", "id": 50}, {"question": "An example of a closed-ended question is:", "options": ["How do you feel today?", "Can you describe your symptoms?", "Do you have allergies to medications?", "What happened next?"], "answer": 2, "section": "Nursing Interview Techniques", "id": 51}, {"question": "To build rapport during the orientation phase, the nurses should first:", "options": ["Start writing in the chart immediately", "Introduce themselves and explain their role", "Ask about the patient's bowel habits", "Tell the patient their own personal problems"], "answer": 1, "section": "Nursing Interview Techniques", "id": 52}, {"question": "Gender issues in an interview are categorized as:", "options": ["Physical barriers", "Cultural and social barriers", "Time constraints", "Psychological barriers"], "answer": 1, "section": "Nursing Interview Techniques", "id": 53}, {"question": "Emotional barriers during interview include:", "options": ["Poor lighting", "Lack of trust", "Gender differences", "Religious beliefs"], "answer": 1, "section": "Nursing Interview Techniques", "id": 54}, {"question": "Health literacy is defined as which of the following?", "options": ["The ability to read medical textbooks", "The capacity to obtain, process, and understand basic health information", "The number of years a patient attended school", "The ability to speak more than one language fluently"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 55}, {"question": "Which of the following is a result of low health literacy?", "options": ["Improved medication adherence", "Increased use of preventive services", "Increased hospital stay", "Better understanding of medical instructions"], "answer": 2, "section": "Communication According To Patient Abilities", "id": 56}, {"question": "When communicating with a patient with low health literacy, a nurse should:", "options": ["Use complex medical terminology to sound professional", "Use Plain Language and avoid jargon", "Speak as fast as possible to save time", "Provide a large stack of brochures for the patient to read alone"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 57}, {"question": "Which strategy is effective for patients with low health literacy?", "options": ["Giving all information in one long session", "Limiting the number of messages at one time", "Using only written text without pictures", "Avoiding eye contact to reduce patient anxiety"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 58}, {"question": "When using a medical interpreter, the nurse should:", "options": ["Look and speak directly to the interpreter", "Look and speak directly to the patient", "Speak in long, complex paragraphs", "Use the patient's young child as an interpreter"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 59}, {"question": "When working with a patient who is hard of hearing, the nurse should:", "options": ["Shout as loudly as possible", "Face the person directly so they can see the nurse's mouth", "Speak while walking away from the patient", "Use only high-pitched tones"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 60}, {"question": "In speech and language deficits, nurses should:", "options": ["Ignore communication attempts", "Praise communication efforts", "Only use written instructions", "Rush conversations"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 61}, {"question": "For a patient with Alzheimer's disease, a nurse should:", "options": ["Ask multiple questions at once to gather data quickly", "Use a low-pitched, slow speaking voice", "Argue with them when they are confused", "Avoid making eye contact"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 62}, {"question": "If a patient does not understand a word during an interview, the nurse should:", "options": ["Repeat the same word louder", "Use a different word with the same meaning", "Ignore the confusion and move on", "Tell the patient to look it up later"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 63}, {"question": "To interact effectively with a medical interpreter, a nurse should:", "options": ["Speak in short sentences", "Use slang and local idioms", "Expect a word-for-word translation in all cases", "Speak while the interpreter is still talking"], "answer": 0, "section": "Communication According To Patient Abilities", "id": 64}, {"question": "When talking to a person with a hearing aid, you should:", "options": ["Stand behind them", "Reduce background noise as much as possible", "Tap on the hearing aid to check if it works", "Speak into the hearing aid directly"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 65}, {"question": "For a patient with Alzheimer's, if a situation looks like it may get out of hand, the nurse should use:", "options": ["Physical restraint immediately", "Distraction techniques", "Loud commands", "Complex reasoning and logic"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 66}, {"question": "When communicating with the deaf person, a nurse should:", "options": ["Only use spoken words", "Write messages or use pictograms", "Speak faster", "Turn away while speaking"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 67}, {"question": "When working with low-literacy patients, instructions should be at what reading level?", "options": ["College level", "High school", "Fifth to sixth grade", "First grade"], "answer": 2, "section": "Communication According To Patient Abilities", "id": 68}, {"question": "Communication with preschool-aged children should include:", "options": ["Complex instructions", "Storytelling and play", "Formal lectures", "Peer-group sessions"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 69}, {"question": "Clients with mental illness benefit from:", "options": ["Abstract discussions", "Complex vocabulary", "Concrete sentences", "Avoiding games"], "answer": 2, "section": "Communication According To Patient Abilities", "id": 70}, {"question": "When communicating with a person wearing a hearing aid:", "options": ["Remove the hearing aid", "Whisper", "Check if it's on and properly placed", "Use technical signs"], "answer": 2, "section": "Communication According To Patient Abilities", "id": 71}, {"question": "Visually impaired clients should be allowed to:", "options": ["Stand alone", "Take your arm for guidance", "Use mirrors", "Avoid touch"], "answer": 1, "section": "Communication According To Patient Abilities", "id": 72}];
let current=0,answers={},bank=[],originalBank=[];const app=document.getElementById('app');
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function wrongCount(){return Object.values(answers).filter(x=>!x.correct).length}
function home(){current=0;answers={};app.innerHTML=`<section class="card home"><h1>🩺 Communication Quiz Bank</h1><p class="muted">72 MCQ questions</p><button class="btn primary" onclick="start(20)">20 questions</button><button class="btn primary" onclick="start('all')">All questions (72)</button><div class="top-links"><a class="btn" href="communication-quiz-bank.md">Answer Key</a><a class="btn" href="bot_questions.json">Main Bank JSON</a></div></section>`}
function start(count,questions){current=0;answers={};const pool=shuffle(questions||QUESTIONS);bank=count==='all'?pool:pool.slice(0,Math.min(Number(count),pool.length));originalBank=[...bank];render()}
function render(){const q=bank[current];const ans=answers[current];const done=Object.keys(answers).length;app.innerHTML=`<section class="card"><div class="row"><div><div class="title">🩺 Communication Quiz</div><div class="muted">Question ${current+1} of ${bank.length}</div></div><div class="muted">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${Math.round(done/bank.length*100)}%"></div></div><div class="meta">#${q.id} · ${esc(q.section)}</div><div class="q">${esc(q.question)}</div><div class="opts">${q.options.map((o,i)=>`<div class="opt${ans?(ans.idx===i?(ans.correct?' correct':' wrong'):(i===q.answer?' correct':'')):''}" onclick="check(${i})">${esc(String.fromCharCode(65+i)+'. '+o)}</div>`).join('')}</div>${ans?`<div style="margin-top:12px">${ans.correct?'✅ Correct!':'❌ Wrong. Correct answer highlighted.'}</div>`:''}</section><div style="display:flex;gap:8px;margin-top:12px;justify-content:space-between;flex-wrap:wrap"><button class="btn" onclick="home()">🏠 Home</button><div style="display:flex;gap:6px;flex-wrap:wrap">${current>0?`<button class="btn" onclick="back()">← Back</button>`:''}${current<bank.length-1&&ans?`<button class="btn primary" onclick="next()">Next →</button>`:''}${current===bank.length-1&&ans?`<button class="btn green" onclick="finish()">Finish ✓</button>`:''}</div></div>`}
function check(idx){if(answers[current])return;answers[current]={idx,correct:idx===bank[current].answer};render()}
function back(){if(current>0){current--;render()}}
function next(){if(current<bank.length-1){current++;render()}}
function finish(){const s=score(),t=Object.keys(answers).length,wrong=wrongCount();const wrongQs=[];for(let i=0;i<bank.length;i++){const a=answers[i];if(a&&!a.correct)wrongQs.push({i,q:bank[i],a})}let reviewHtml='';if(wrongQs.length>0){reviewHtml=`<div class="review"><h3 style="color:#b32d2e">❌ Wrong Answers (${wrongQs.length})</h3>${wrongQs.map(w=>`<div class="review-item was-wrong"><strong>Q${w.i+1}:</strong> ${esc(w.q.question)}<br><span style="color:#0b5b43">✓ ${esc(w.q.options[w.q.answer])}</span><br><span style="color:#8a2020">✗ ${esc(w.q.options[w.a.idx])}</span></div>`).join('')}</div>`}app.innerHTML=`<section class="card score"><h1>🏆 Finished!</h1><div class="score-big">${s} / ${t}</div><p class="muted">${Math.round(s/t*100)}%</p><div style="display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:16px"><button class="btn primary" onclick="home()">🏠 Home</button><button class="btn green" onclick="retryAll()">🔄 Retry All</button>${wrong>0?`<button class="btn orange" onclick="retryWrong()">🔁 Retry Wrong (${wrong})</button>`:''}<a class="btn" href="nutrition-quiz.html">Adult Nursing Quiz</a></div></section>${reviewHtml}`}
function retryAll(){start('all',originalBank)}
function retryWrong(){const w=[];for(let i=0;i<bank.length;i++){const a=answers[i];if(a&&!a.correct)w.push(bank[i])}if(w.length>0)start('all',w)}
home();
</script>

</html>
