<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nutrition Quiz</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}.wrap{max-width:820px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:16px}.home{text-align:center;padding:34px 16px}.home h1{margin:0 0 8px;color:#216a4f;font-size:26px}.muted{color:#5f6876;font-size:14px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{font-weight:700;color:#216a4f}.bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:12px 0}.fill{height:100%;background:#216a4f}.q{font-size:18px;line-height:1.5;margin:12px 0}.opts{display:grid;gap:8px}.opt{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;text-align:left;cursor:pointer;line-height:1.45;font:inherit}.opt:hover{background:#f4f8f6;border-color:#216a4f}.opt.correct{background:#e9f6f1;border-color:#216a4f;color:#134c38}.opt.wrong{background:#fff0f0;border-color:#b32d2e;color:#8a2020}.btn{border:1px solid #cbd3df;border-radius:6px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block}.btn.primary{background:#216a4f;border-color:#216a4f;color:#fff}.btn:disabled{opacity:.55;cursor:default}.feedback{margin-top:12px;border-radius:8px;padding:12px;line-height:1.45}.feedback.ok{background:#e9f6f1;color:#134c38}.feedback.err{background:#fff0f0;color:#8a2020}.nav{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}.score{text-align:center}.score-big{font-size:44px;font-weight:700;color:#216a4f;margin:8px 0}.review{display:grid;gap:8px;margin-top:14px;text-align:left}.review-item{border:1px solid #d9deea;border-radius:8px;padding:10px;line-height:1.45}@media(max-width:640px){.wrap{padding:12px}.row{align-items:flex-start;flex-direction:column}.q{font-size:16px}.nav .btn{flex:1;min-width:120px}}
  </style>
</head>
<body>
<main class="wrap"><div id="app"></div></main>
<script>
const QUESTIONS=[
 {q:'GO foods:',o:['Called bodybuilding foods','Called energy-giving foods','Protective foods','Vitamin K + vitamin C'],a:1},
 {q:'Keep sodium (salt) daily intake:',o:['4000 mg','Under 2400 mg','Over 3000 mg','Over 4400 mg'],a:1},
 {q:'Patient with liver cirrhosis should receive:',o:['25-30 kcal/kg per day','15-20 kcal/kg per day','25-28 kcal/kg per day','35-40 kcal/kg per day'],a:3},
 {q:'Foods indicated during fever:',o:['Energy increased by 50% - protein diet supplying 1.25-1.5 g protein/kg','Energy increased by 30% - protein diet supplying 2 g protein/kg','Energy decreased by 20% - protein diet supplying 1 g protein/kg','Energy decreased by 40% - protein diet supplying 0.5 g protein/kg'],a:0},
 {q:'The BRAT diet stands for:',o:['Pasta, rice, toast','Apple, pasta and toast','Toast, watermelon and water','Banana, Rice, Applesauce, and Toast'],a:3},
 {q:'Foods indicated during fever:',o:['Energy increased by 50%','Energy increased by 30%','Energy decreased by 20%','Energy decreased by 10%'],a:0},
 {q:'Foods that boost the immune system:',o:['Fried foods','Processed foods','Kiwi and Garlic','Soda'],a:2},
 {q:'The purpose of diet therapy for CKD is:',o:['Maintain good nutritional status','Slow progression','Treat complications','All of the above'],a:3},
 {q:'Limit excessive dietary protein in CKD as:',o:['Nondiabetic: 0.8 g/kg/day & Diabetic: 0.8-1.0 g/kg/day','Nondiabetic: 1 g/kg/day & Diabetic: 1.5 g/kg/day','Nondiabetic: 2 g/kg/day & Diabetic: 1.2 g/kg/day','Nondiabetic: 0.5 g/kg/day & Diabetic: 2 g/kg/day'],a:0},
 {q:'Macronutrients are:',o:['Vitamins and minerals','Protein and water','Carbohydrate, protein and fat','Lipids and protein'],a:2},
 {q:'The classes of nutrients are:',o:['6 classes','8 classes','3 classes','5 classes'],a:0},
 {q:'Vitamin C helps build up the immune system through:',o:['Increase the production of white blood cells','Help lower blood pressure','Slow down hardening of the arteries','Live and active cultures'],a:0},
 {q:'Almonds are a good source of:',o:['Vitamin B','Vitamin D','Vitamin E','Iron'],a:2},
 {q:'Foods that depress the immune system:',o:['Almond','Garlic','A and B','Processed foods'],a:3},
 {q:'True or False: In fever, protein diet supplying 1.25-1.5 g protein/kg.',o:['True','False'],a:0},
 {q:'True or False: Junk, fast and fried foods should be strictly avoided in fever.',o:['True','False'],a:0},
 {q:'True or False: Do not consume red meat, as it is difficult to digest in fever patients.',o:['True','False'],a:0},
 {q:'True or False: Soft texture foods are desirable to promote appetite in fever patients.',o:['True','False'],a:0},
 {q:'True or False: In diarrhea cases, increase foods high in salt and potassium.',o:['True','False'],a:0},
 {q:'True or False: BRAT diet stands for Banana, Rice, Applesauce, and Toast.',o:['True','False'],a:0},
 {q:'True or False: Good nutrition can help reduce the risk of heart disease, diabetes, stroke, and some cancers.',o:['True','False'],a:0},
 {q:'True or False: Increase foods high in salt and potassium in diarrhea cases.',o:['True','False'],a:0},
 {q:'True or False: Increase foods high in soluble fiber in diarrhea cases.',o:['True','False'],a:0},
 {q:'True or False: Probiotics are found naturally in yogurt.',o:['True','False'],a:0},
 {q:'True or False: Lower amount of salt and sodium in hypertension patients.',o:['True','False'],a:0},
 {q:'True or False: In chronic liver patients, lipids could provide 20%-40% of caloric needs.',o:['True','False'],a:0},
 {q:'True or False: Protein requirements are increased in cirrhotic patients.',o:['True','False'],a:0},
 {q:'True or False: Blood pressure control slows progression of CKD and lowers CVD risk.',o:['True','False'],a:0},
 {q:'True or False: Sugar may worsen diarrhea.',o:['True','False'],a:0},
 {q:'True or False: Probiotics are live microbiological dietary supplements.',o:['True','False'],a:0},
 {q:'True or False: In fever, keep diet light and healthy.',o:['True','False'],a:0},
 {q:'True or False: Limit sodium intake by eating in ascites patients.',o:['True','False'],a:0},
 {q:'True or False: Soft diet is recommended and getting enough fluid in patient with esophageal varices.',o:['True','False'],a:0},
 {q:'Match: GLOW foods',o:['Foods rich in carbohydrates and fats','Foods rich in protein','Foods rich in minerals and vitamins; essential for immunity and regulatory functions','The minimum energy needed by the body at rest'],a:2},
 {q:'Match: Thermic effect of food',o:['The energy needed to digest and absorb food','The food and beverages normally eaten and drunk','A measure of nutrients per calories of food','Combination of pro- and prebiotics'],a:0},
 {q:'Match: Nutrition',o:['Foods rich in minerals and vitamins','The process of digestion and absorption of foods and the body use of it for growth and replacement of cells','Foods rich in carbohydrates and fats','The minimum energy needed by the body at rest'],a:1},
 {q:'Match: GO foods',o:['Foods rich in protein','Foods rich in carbohydrates and fats','Live microbiological dietary supplements','The nourishing substances in food'],a:1},
 {q:'Match: Diet',o:['The food and beverages you normally eat and drink','Anything liquid, semi-solid or solid that nourishes the body','A measure of energy in food','The minimum energy needed at rest'],a:0},
 {q:'Match: Food',o:['The food and beverages you normally eat and drink','Anything liquid, semi-solid or solid which contains nutrients and energy and nourishes the body','Foods rich in minerals and vitamins','Combination of pro- and prebiotics'],a:1},
 {q:'Match: GROW foods',o:['Foods rich in protein that help maintain life and promote growth','Foods rich in carbohydrates and fats','Foods rich in minerals and vitamins','A measure of nutrients per calories'],a:0},
 {q:'Match: Nutrients',o:['Carbohydrates, fats, protein, vitamins, minerals, and water','The nourishing substances in food that provide energy and promote growth and maintenance','Foods rich in protein','The food and beverages normally eaten'],a:1},
 {q:'Match: Classes of nutrients',o:['Carbohydrates, fats, protein, vitamins, minerals, and water','The process of digestion and absorption','A measure of the energy in food','Foods rich in minerals and vitamins'],a:0},
 {q:'Match: Basal metabolism',o:['The energy needed to digest and absorb food','The minimum energy needed by the body for vital functions when at rest and awake','A measure of nutrients per calories','Foods rich in carbohydrates and fats'],a:1},
 {q:'Match: Nutrient density',o:['A measure of the nutrients provided per calories of a food','A measure of the energy in food','Combination of pro- and prebiotics','The process of digestion and absorption'],a:0},
 {q:'Match: Prebiotics',o:['Live microbiological dietary supplements','Combination of pro- and prebiotics','Stimulate the growth and activity of beneficial bacteria within the intestinal flora','Foods rich in protein'],a:2},
 {q:'Match: Kilocalorie',o:['A measure of the energy in food, specifically the energy-yielding nutrients','The minimum energy needed at rest','A measure of nutrients per calories','Foods rich in minerals and vitamins'],a:0},
 {q:'Match: Symbiotics',o:['Combination of pro- and prebiotics','Live microbiological dietary supplements','The nourishing substances in food','Foods rich in carbohydrates and fats'],a:0},
 {q:'Match: Nutrition',o:['The food and beverages normally eaten','The process of digestion and absorption of foods and the body use of it for growth and replacement of cells','The minimum energy needed at rest','A measure of the energy in food'],a:1},
 {q:'Match: Kilocalorie',o:['A measure of nutrients per calories','Foods rich in carbohydrates and fats','A measure of the energy in food, specifically the energy-yielding nutrients','Combination of pro- and prebiotics'],a:2},
 {q:'Match: Probiotics',o:['Stimulate the growth of beneficial bacteria within intestinal flora','Live microbiological dietary supplements with beneficial effects beyond nutritional properties','Foods rich in minerals and vitamins','The process of digestion and absorption'],a:1}
];
let current=0,answers={};
const app=document.getElementById('app');
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
let bank=shuffle(QUESTIONS);
function score(){return Object.values(answers).filter(x=>x.correct).length}
function home(){current=0;answers={};bank=shuffle(QUESTIONS);app.innerHTML=`<section class="card home"><h1>Nutrition Quiz</h1><p class="muted">${QUESTIONS.length} questions from pages 1-5: MCQ, True/False, and matching.</p><button class="btn primary" onclick="start(20)">20 questions</button> <button class="btn primary" onclick="start(50)">50 questions</button> <button class="btn" onclick="start('all')">All questions</button><br><a class="btn" href="nutrition-part2.html">Part 2</a></section>`}
function start(count){current=0;answers={};const pool=shuffle(QUESTIONS);bank=count==='all'?pool:pool.slice(0,Math.min(Number(count),pool.length));render()}
function render(){const q=bank[current];if(!q){finish();return}const ans=answers[current];const done=Object.keys(answers).length;app.innerHTML=`<section class="card"><div class="row"><div><div class="title">Nutrition Quiz</div><div class="muted">Question ${current+1} of ${bank.length}</div></div><div class="muted">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${Math.round(done/bank.length*100)}%"></div></div><div class="q">${esc(q.q)}</div><div class="opts">${q.o.map((o,i)=>option(q,i,ans)).join('')}</div>${ans?feedback(q,ans):''}<div class="nav"><button class="btn" onclick="prev()" ${current===0?'disabled':''}>Previous</button><button class="btn" onclick="home()">Home</button><button class="btn primary" onclick="next()" ${ans?'':'disabled'}>Next</button></div></section>`}
function option(q,i,ans){let cls='opt';if(ans&&i===q.a)cls+=' correct';if(ans&&ans.choice===i&&i!==q.a)cls+=' wrong';return `<button class="${cls}" onclick="choose(${i})" ${ans?'disabled':''}><b>${String.fromCharCode(65+i)}.</b> ${esc(q.o[i])}</button>`}
function choose(i){const q=bank[current];answers[current]={choice:i,correct:i===q.a};render()}
function feedback(q,ans){return `<div class="feedback ${ans.correct?'ok':'err'}">${ans.correct?'Correct':'Wrong'} - correct answer: <b>${String.fromCharCode(65+q.a)}. ${esc(q.o[q.a])}</b></div>`}
function next(){if(!answers[current])return;current++;render()}
function prev(){current=Math.max(0,current-1);render()}
function finish(){const wrong=bank.map((q,i)=>({q,i})).filter(x=>!answers[x.i]||!answers[x.i].correct);app.innerHTML=`<section class="card score"><h1>Quiz complete</h1><div class="score-big">${score()}/${bank.length}</div><p class="muted">${Math.round(score()/bank.length*100)}% correct</p><div class="nav" style="justify-content:center"><button class="btn primary" onclick="home()">Restart</button></div><div class="review">${wrong.map(({q})=>`<div class="review-item">${esc(q.q)}<br><span class="muted">Correct: ${esc(q.o[q.a])}</span></div>`).join('')}</div></section>`}
home();
</script>
</body>
</html>
