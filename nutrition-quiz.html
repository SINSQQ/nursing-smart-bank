<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Nutrition Quiz - Part 1</title>
  <style>
    *{box-sizing:border-box}body{margin:0;font-family:Arial,sans-serif;background:#f7f8fb;color:#20232a}.wrap{max-width:860px;margin:0 auto;padding:16px}.card{background:#fff;border:1px solid #d9deea;border-radius:8px;padding:16px}.home{text-align:center;padding:34px 16px}.home h1{margin:0 0 8px;color:#216a4f;font-size:26px}.muted{color:#5f6876;font-size:14px}.row{display:flex;justify-content:space-between;gap:10px;align-items:center;margin-bottom:12px}.title{font-weight:700;color:#216a4f}.bar{height:7px;background:#e7ebf1;border-radius:999px;overflow:hidden;margin:12px 0}.fill{height:100%;background:#216a4f}.q{font-size:18px;line-height:1.5;margin:12px 0}.opts{display:grid;gap:8px}.opt{border:1px solid #cbd3df;border-radius:8px;background:#fff;padding:12px;text-align:left;cursor:pointer;line-height:1.45;font:inherit}.opt:hover{background:#f4f8f6;border-color:#216a4f}.opt.correct{background:#e9f6f1;border-color:#216a4f;color:#134c38}.opt.wrong{background:#fff0f0;border-color:#b32d2e;color:#8a2020}.btn{border:1px solid #cbd3df;border-radius:6px;background:#fff;padding:10px 14px;cursor:pointer;font:inherit;text-decoration:none;color:#20232a;display:inline-block;margin:4px}.btn.primary{background:#216a4f;border-color:#216a4f;color:#fff}.btn:disabled{opacity:.55;cursor:default}.feedback{margin-top:12px;border-radius:8px;padding:12px;line-height:1.45}.feedback.ok{background:#e9f6f1;color:#134c38}.feedback.err{background:#fff0f0;color:#8a2020}.nav{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:14px;flex-wrap:wrap}.score{text-align:center}.score-big{font-size:44px;font-weight:700;color:#216a4f;margin:8px 0}.review{display:grid;gap:8px;margin-top:14px;text-align:left}.review-item{border:1px solid #d9deea;border-radius:8px;padding:10px;line-height:1.45}@media(max-width:640px){.wrap{padding:12px}.row{align-items:flex-start;flex-direction:column}.q{font-size:16px}.nav .btn{flex:1;min-width:120px}.home .btn{display:block;width:100%;margin:8px 0}}
  </style>
</head>
<body>
<main class="wrap"><div id="app"></div></main>
<script>
const QUESTIONS=[
 {type:'MCQ',question:'GO foods:',options:['Called bodybuilding foods','Called energy-giving foods','Protective foods','Vitamin K + vitamin C'],answer:1,id:'q1'},
 {type:'MCQ',question:'Keep sodium (salt) daily intake:',options:['4000 mg','Under 2400 mg','Over 3000 mg','Over 4400 mg'],answer:1,id:'q2'},
 {type:'MCQ',question:'Patient with liver cirrhosis should receive:',options:['25-30 kcal/kg per day','15-20 kcal/kg per day','25-28 kcal/kg per day','35-40 kcal/kg per day'],answer:3,id:'q3'},
 {type:'MCQ',question:'Foods indicated during fever:',options:['Energy increased by 50% - protein diet supplying 1.25-1.5 g protein/kg','Energy increased by 30% - protein diet supplying 2 g protein/kg','Energy decreased by 20% - protein diet supplying 1 g protein/kg','Energy decreased by 40% - protein diet supplying 0.5 g protein/kg'],answer:0,id:'q4'},
 {type:'MCQ',question:'The BRAT diet stands for:',options:['Pasta, rice, toast','Apple, pasta and toast','Toast, watermelon and water','Banana, Rice, Applesauce, and Toast'],answer:3,id:'q5'},
 {type:'MCQ',question:'Foods indicated during fever:',options:['Energy increased by 50%','Energy increased by 30%','Energy decreased by 20%','Energy decreased by 10%'],answer:0,id:'q6'},
 {type:'MCQ',question:'Foods that boost the immune system:',options:['Fried foods','Processed foods','Kiwi and Garlic','Soda'],answer:2,id:'q7'},
 {type:'MCQ',question:'The purpose of diet therapy for CKD is:',options:['Maintain good nutritional status','Slow progression','Treat complications','All of the above'],answer:3,id:'q8'},
 {type:'MCQ',question:'Limit excessive dietary protein in CKD as:',options:['Nondiabetic: 0.8 g/kg/day & Diabetic: 0.8-1.0 g/kg/day','Nondiabetic: 1 g/kg/day & Diabetic: 1.5 g/kg/day','Nondiabetic: 2 g/kg/day & Diabetic: 1.2 g/kg/day','Nondiabetic: 0.5 g/kg/day & Diabetic: 2 g/kg/day'],answer:0,id:'q9'},
 {type:'MCQ',question:'Macronutrients are:',options:['Vitamins and minerals','Protein and water','Carbohydrate, protein and fat','Lipids and protein'],answer:2,id:'q10'},
 {type:'MCQ',question:'The classes of nutrients are:',options:['6 classes','8 classes','3 classes','5 classes'],answer:0,id:'q11'},
 {type:'MCQ',question:'Vitamin C helps build up the immune system through:',options:['Increase the production of white blood cells','Help lower blood pressure','Slow down hardening of the arteries','Live and active cultures'],answer:0,id:'q12'},
 {type:'MCQ',question:'Almonds are a good source of:',options:['Vitamin B','Vitamin D','Vitamin E','Iron'],answer:2,id:'q13'},
 {type:'MCQ',question:'Foods that depress the immune system:',options:['Almond','Garlic','A and B','Processed foods'],answer:3,id:'q14'},
 {type:'True/False',question:'True or False: In fever, protein diet supplying 1.25-1.5 g protein/kg.',options:['True','False'],answer:0,id:'q15'},
 {type:'True/False',question:'True or False: Junk, fast and fried foods should be strictly avoided in fever.',options:['True','False'],answer:0,id:'q16'},
 {type:'True/False',question:'True or False: Do not consume red meat, as it is difficult to digest in fever patients.',options:['True','False'],answer:0,id:'q17'},
 {type:'True/False',question:'True or False: Soft texture foods are desirable to promote appetite in fever patients.',options:['True','False'],answer:0,id:'q18'},
 {type:'True/False',question:'True or False: In diarrhea cases, increase foods high in salt and potassium.',options:['True','False'],answer:0,id:'q19'},
 {type:'True/False',question:'True or False: BRAT diet stands for Banana, Rice, Applesauce, and Toast.',options:['True','False'],answer:0,id:'q20'},
 {type:'True/False',question:'True or False: Good nutrition can help reduce the risk of heart disease, diabetes, stroke, and some cancers.',options:['True','False'],answer:0,id:'q21'},
 {type:'True/False',question:'True or False: Increase foods high in salt and potassium in diarrhea cases.',options:['True','False'],answer:0,id:'q22'},
 {type:'True/False',question:'True or False: Increase foods high in soluble fiber in diarrhea cases.',options:['True','False'],answer:0,id:'q23'},
 {type:'True/False',question:'True or False: Probiotics are found naturally in yogurt.',options:['True','False'],answer:0,id:'q24'},
 {type:'True/False',question:'True or False: Lower amount of salt and sodium in hypertension patients.',options:['True','False'],answer:0,id:'q25'},
 {type:'True/False',question:'True or False: In chronic liver patients, lipids could provide 20%-40% of caloric needs.',options:['True','False'],answer:0,id:'q26'},
 {type:'True/False',question:'True or False: Protein requirements are increased in cirrhotic patients.',options:['True','False'],answer:0,id:'q27'},
 {type:'True/False',question:'True or False: Blood pressure control slows progression of CKD and lowers CVD risk.',options:['True','False'],answer:0,id:'q28'},
 {type:'True/False',question:'True or False: Sugar may worsen diarrhea.',options:['True','False'],answer:0,id:'q29'},
 {type:'True/False',question:'True or False: Probiotics are live microbiological dietary supplements.',options:['True','False'],answer:0,id:'q30'},
 {type:'True/False',question:'True or False: In fever, keep diet light and healthy.',options:['True','False'],answer:0,id:'q31'},
 {type:'True/False',question:'True or False: Limit sodium intake by eating in ascites patients.',options:['True','False'],answer:0,id:'q32'},
 {type:'True/False',question:'True or False: Soft diet is recommended and getting enough fluid in patient with esophageal varices.',options:['True','False'],answer:0,id:'q33'}
];
let current=0,answers={},bank=[];
const app=document.getElementById('app');
function shuffle(a){return [...a].sort(()=>Math.random()-.5)}
function esc(s){return String(s??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function score(){return Object.values(answers).filter(x=>x.correct).length}
function home(){current=0;answers={};bank=shuffle(QUESTIONS);app.innerHTML=`<section class="card home"><h1>Nutrition Quiz - Part 1</h1><p class="muted">${QUESTIONS.length} questions.</p><button class="btn primary" onclick="start(20)">20 questions</button><button class="btn primary" onclick="start(50)">50 questions</button><button class="btn green" onclick="start('all')">All questions</button></section>`}
function start(count){current=0;answers={};const pool=shuffle(QUESTIONS);bank=count==='all'?pool:pool.slice(0,Math.min(Number(count),pool.length));render()}
function render(){const q=bank[current];if(!q){finish();return}const ans=answers[q.id];const done=Object.keys(answers).length;app.innerHTML=`<section class="card"><div class="row"><div><div class="title">Nutrition Quiz - Part 1</div><div class="muted">${q.type} | Question ${current+1} of ${bank.length}</div></div><div class="muted">Score ${score()} / ${done}</div></div><div class="bar"><div class="fill" style="width:${Math.round(done/bank.length*100)}%"></div></div><div class="q">${esc(q.question)}</div><div class="opts">${q.options.map((o,i)=>option(q,i,ans)).join('')}</div>${ans?feedback(q,ans):''}<div class="nav"><button class="btn" onclick="prev()" ${current===0?'disabled':''}>Previous</button><button class="btn" onclick="home()">Home</button><button class="btn primary" onclick="next()" ${ans?'':'disabled'}>Next</button></div></section>`}
function option(q,i,ans){let cls='opt';if(ans&&i===q.answer)cls+=' correct';if(ans&&ans.choice===i&&i!==q.answer)cls+=' wrong';return `<button class="${cls}" onclick="choose(${i})" ${ans?'disabled':''}><b>${String.fromCharCode(65+i)}.</b> ${esc(q.options[i])}</button>`}
function choose(i){const q=bank[current];answers[q.id]={choice:i,correct:i===q.answer};render()}
function feedback(q,ans){return `<div class="feedback ${ans.correct?'ok':'err'}">${ans.correct?'Correct':'Wrong'} - correct answer: <b>${String.fromCharCode(65+q.answer)}. ${esc(q.options[q.answer])}</b></div>`}
function next(){if(!answers[bank[current].id])return;current++;render()}
function prev(){current=Math.max(0,current-1);render()}
function finish(){const wrong=bank.filter(q=>!answers[q.id]||!answers[q.id].correct);app.innerHTML=`<section class="card score"><h1>Quiz complete</h1><div class="score-big">${score()}/${bank.length}</div><p class="muted">${Math.round(score()/bank.length*100)||0}% correct</p><div class="nav" style="justify-content:center"><button class="btn primary" onclick="start(bank.length)">Restart</button><button class="btn green" onclick="retryWrong()" ${wrong.length?'':'disabled'}>Wrong only</button><button class="btn" onclick="home()">Home</button></div><div class="review">${wrong.map(q=>`<div class="review-item"><b>${esc(q.type)}</b><br>${esc(q.question)}<br><span class="muted">Correct: ${esc(q.options[q.answer])}</span></div>`).join('')}</div></section>`}
function retryWrong(){bank=shuffle(bank.filter(q=>!answers[q.id]||!answers[q.id].correct));current=0;answers={};render()}
home();
</script>
</body>
</html>
